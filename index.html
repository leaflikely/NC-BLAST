  const CROSSOVER_BLADES_ALL = ["Bumblebee","Captain America","Chewbacca","Darth Vader","Draciel Shield","Dragoon Storm","Dranzer Spiral","Driger S","General Grievous","Green Goblin","Iron Man","Lightning L-Drago","Luke Skywalker","Megatron","Miles Morales","Moff Gideon","Mosasaurus","Obi-Wan Kenobi","Optimus Primal","Optimus Prime","Quetzalcoatlus","Red Hulk","Rock Leone","Soundwave","Spider-Man","Spinosaurus","Starscream","Storm Pegasus","Storm Spriggan","Storm Trooper","T.Rex","Thanos","The Mandalorian","Venom","Victory Valkyrie","Xeno Xcalibur"];
  const filteredRest = search ? rest.filter(n=>!CROSSOVER_BLADES_ALL.includes(n)&&n.toLowerCase().includes(search.toLowerCase())) : rest.filter(n=>!CROSSOVER_BLADES_ALL.includes(n));
  const filteredTop = search ? top10.filter(n=>n.toLowerCase().includes(search.toLowerCase())) : top10;
  const filteredCross = search ? CROSSOVER_BLADES_ALL.filter(n=>n.toLowerCase().includes(search.toLowerCase())) : CROSSOVER_BLADES_ALL;

  const pick = (name) => {
    setPart(slot,cat,name);
    if(returnToReview){ setStep(null); stepHistory.current=[]; return; }
    advanceAfter(slot,cat,name);
  };

  const totalSteps = 18;
  const stepNum = slot*3 + ["blade","ratchet","bit"].indexOf(cat);
  const pct = Math.round((stepNum/totalSteps)*100);

  return (
    <div style={{position:"fixed",inset:0,background:"var(--bg)",display:"flex",flexDirection:"column",zIndex:10}}>
      {/* Header */}
      <div style={{padding:"12px 14px 10px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <button onClick={goBack} style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif"}}>← Back</button>
          <div style={{flex:1,height:4,background:"var(--surface3)",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:"var(--accent)",borderRadius:2,transition:"width 0.2s"}}/>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <p style={{fontSize:10,fontWeight:700,color:"var(--text-faint)",letterSpacing:1,textTransform:"uppercase",marginBottom:1}}>{comboLabel} Combo</p>
            <h2 style={{fontSize:18,fontWeight:900,color:"var(--accent2)",margin:0}}>Pick {cat.charAt(0).toUpperCase()+cat.slice(1)}</h2>
          </div>
          {cat==="blade"&&(
            <button onClick={()=>setStep({cx:true,slot,cxStep:"chip",chip:null,blade:null,returnToReview})}
              style={{padding:"6px 12px",borderRadius:8,border:"2px solid #0D948860",background:"#0D948818",color:"#0D9488",fontSize:11,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
              CX →
            </button>
          )}
        </div>
      </div>

      {/* Search */}
      <div style={{padding:"8px 14px",flexShrink:0,borderBottom:"1px solid var(--border)"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder={`Search ${cat}s...`}
          style={{width:"100%",padding:"8px 12px",borderRadius:9,border:"2px solid var(--border2)",background:"var(--surface2)",color:"var(--text-primary)",fontSize:13,fontFamily:"'Outfit',sans-serif",outline:"none"}}/>
      </div>

      {/* Parts grid */}
      <div style={{flex:1,overflowY:"auto",padding:"10px 14px"}}>

        {/* Quick combos (blade only, no search) */}
        {cat==="blade"&&!search&&(
          <div style={{marginBottom:10}}>
            <p style={{fontSize:9,fontWeight:700,color:"var(--text-faint)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>⚡ Quick Combos</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {QUICK_COMBOS.map((qc,i)=>{
                // Check all three parts against other slots — no duplicates allowed across any part type
                const takenBlades = deck.filter((_,si)=>si!==slot).map(c=>c.blade).filter(Boolean);
                const takenRatchets = deck.filter((_,si)=>si!==slot).map(c=>c.ratchet).filter(Boolean);
                const takenBits = deck.filter((_,si)=>si!==slot).map(c=>c.bit).filter(Boolean);
                const anyTaken = takenBlades.includes(qc.blade)
                  || (qc.ratchet && takenRatchets.includes(qc.ratchet))
                  || takenBits.includes(qc.bit);
                return (
                  <button key={i} disabled={anyTaken} onClick={()=>{
                    if(anyTaken)return;
                    const nd=[...deck];
                    nd[slot]={blade:qc.blade,ratchet:qc.ratchet,bit:qc.bit};
                    setDeck(nd);
                    if(returnToReview){setStep(null);stepHistory.current=[];}
                    else advanceAfter(slot,"bit");
                  }}
                    style={{padding:"8px 8px",borderRadius:9,border:"2px solid #EA580C30",background:"#EA580C0A",color:anyTaken?"var(--text-faint)":"var(--text-primary)",fontSize:10,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:anyTaken?"not-allowed":"pointer",textAlign:"left",opacity:anyTaken?0.4:1}}>
                    <div style={{fontSize:11,fontWeight:800}}>{qc.blade}</div>
                    <div style={{fontSize:9,color:"var(--text-muted)",marginTop:1}}>{qc.ratchet} · {qc.bit}</div>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Top 10 */}
        {filteredTop.length>0&&(
          <div style={{marginBottom:10}}>
            {!search&&<p style={{fontSize:9,fontWeight:700,color:"var(--text-faint)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>★ Top 10</p>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5}}>
              {filteredTop.map(n=>{
                const bc = cat==="blade"?BLADE_COLORS[n]:null;
                return <PartBtn key={n} name={n} selected={current===n} taken={taken.includes(n)} accent={bc||"#EA580C"} onClick={()=>pick(n)}/>;
              })}
            </div>
          </div>
        )}

        {/* Rest */}
        {filteredRest.length>0&&(
          <div style={{marginBottom:10}}>
            {!search&&cat==="blade"&&<p style={{fontSize:9,fontWeight:700,color:"var(--text-faint)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>All Blades</p>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5}}>
              {filteredRest.map(n=>(
                <PartBtn key={n} name={n} selected={current===n} taken={taken.includes(n)} accent={null} onClick={()=>pick(n)}/>
              ))}
            </div>
          </div>
        )}

        {/* Crossover blades (blade only) */}
        {cat==="blade"&&(
          <div style={{marginTop:8,borderTop:"2px dashed var(--border)",paddingTop:10}}>
            <button onClick={()=>setCrossoverOpen(o=>!o)}
              style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:11,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer",marginBottom:crossoverOpen?8:0}}>
              🌐 Crossover Blades {crossoverOpen?"▲":"▼"}
            </button>
            {crossoverOpen&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5}}>
                {filteredCross.map(n=>(
                  <PartBtn key={n} name={n} selected={current===n} taken={taken.includes(n)} accent={null} onClick={()=>pick(n)}/>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Ratchet/bit list for non-blade */}
        {(cat==="ratchet"||cat==="bit")&&filteredRest.length===0&&filteredTop.length===0&&(
          <p style={{color:"var(--text-faint)",fontSize:13,textAlign:"center",padding:"20px 0"}}>No results for "{search}"</p>
        )}
      </div>
    </div>
  );
}

/* ─── Finish type display helpers ─────────────────────────────── */
const FINISH_META = {
  XTR:  {label:"XTREME FINISH", emoji:"⚡", color:"#F59E0B", pts:"+3"},
  BST:  {label:"BURST FINISH",  emoji:"💥", color:"#EF4444", pts:"+2"},
  OVR:  {label:"OVER FINISH",   emoji:"🌊", color:"#3B82F6", pts:"+2"},
  SPF:  {label:"SPIN FINISH",   emoji:"🌀", color:"#8B5CF6", pts:"+1"},
  OF2:  {label:"OWN FINISH",    emoji:"😬", color:"#6B7280", pts:"+2"},
  OF3:  {label:"OWN FINISH",    emoji:"😬", color:"#6B7280", pts:"+3"},
  LER:  {label:"LAUNCH ERROR",  emoji:"⚠️",  color:"#F97316", pts:"+1"},
  "LER-STRIKE": {label:"LER STRIKE", emoji:"⚠️", color:"#F97316", pts:""},
};

/* ─── Live Score View — long-poll, full viewing experience ────── */
function LiveScoreView({matchId, slot, initialState, onClose}){
  const [state, setState]           = useState(initialState);
  const [etag, setEtag]             = useState(null);
  const [lastUpdated, setLastUpdated] = useState(Date.now());
  const [announcement, setAnnouncement] = useState(null); // {label,emoji,color,pts,scorer,combo}
  const [setWinMsg, setSetWinMsg]   = useState(null); // {winner,set} shown briefly after a set ends
  const abortRef  = useRef(null);
  const annoTimer = useRef(null);
  const setWinTimer = useRef(null);

  // Derive display values safely
  const s = state || {};
  const p1 = s.p1||"Player 1";
  const p2 = s.p2||"Player 2";
  const p1pts = s.pts?.[0]||0, p2pts = s.pts?.[1]||0;
  const p1sets = s.sets?.[0]||0, p2sets = s.sets?.[1]||0;
  const need = s.setsNeeded||2;
  const pointLimit = s.pointLimit||0;

  // Show finish announcement for 2.5s when lastFinish changes
  const lastFinishRef = useRef(null);
  useEffect(()=>{
    if(!s.lastFinish) return;
    const lf = s.lastFinish;
    const key = `${lf.type}-${lf.scorerIdx}-${p1pts}-${p2pts}`;
    if(lastFinishRef.current===key) return;
    lastFinishRef.current = key;
    const meta = FINISH_META[lf.type];
    if(!meta) return;
    const scorerName = lf.scorerIdx===0 ? p1 : p2;
    const scorerColor = lf.scorerIdx===0 ? "#3B82F6" : "#EF4444";
    setAnnouncement({...meta, scorer:scorerName, scorerColor});
    clearTimeout(annoTimer.current);
    annoTimer.current = setTimeout(()=>setAnnouncement(null), 2500);
  },[s.lastFinish, p1pts, p2pts]);

  // Detect set wins by watching sets[]
  const prevSetsRef = useRef([p1sets, p2sets]);
  useEffect(()=>{
    const [prev1, prev2] = prevSetsRef.current;
    if(p1sets > prev1){ setSetWinMsg({winner:p1, color:"#3B82F6", set:p1sets+p2sets}); clearTimeout(setWinTimer.current); setWinTimer.current=setTimeout(()=>setSetWinMsg(null),3000); }
    else if(p2sets > prev2){ setSetWinMsg({winner:p2, color:"#EF4444", set:p1sets+p2sets}); clearTimeout(setWinTimer.current); setWinTimer.current=setTimeout(()=>setSetWinMsg(null),3000); }
    prevSetsRef.current = [p1sets, p2sets];
  },[p1sets, p2sets]);

  // Long-poll loop — holds connection open up to 25s, returns instantly on change
  useEffect(()=>{
    let cancelled = false;
    let currentEtag = etag;

    const poll = async () => {
      if(cancelled) return;
      try {
        abortRef.current = new AbortController();
        const pollParam = matchId
          ? `matchId=${encodeURIComponent(matchId)}`
          : `slot=${slot}`;
        const res = await fetch(
          `${OVERLAY_WORKER}/overlay/poll?${pollParam}&etag=${encodeURIComponent(currentEtag||"")}`,
          { signal: abortRef.current.signal }
        );
        if(cancelled) return;
        if(res.ok){
          const data = await res.json();
          if(data.state){ setState(data.state); setLastUpdated(Date.now()); }
          if(data.etag){ currentEtag = data.etag; setEtag(data.etag); }
        }
      } catch(e){
        if(e.name==="AbortError") return;
        // Network error — wait 500ms then retry
        await new Promise(r=>setTimeout(r,500));
      }
      if(!cancelled) poll(); // loop
    };

    poll();
    return ()=>{
      cancelled = true;
      abortRef.current?.abort();
      clearTimeout(annoTimer.current);
      clearTimeout(setWinTimer.current);
    };
  },[slot]);

  // ── Match Over Screen ──
  if(s.matchOver){
    const p1won = p1sets >= need;
    const winner = p1won ? p1 : p2;
    const loser  = p1won ? p2 : p1;
    const winColor = p1won ? "#3B82F6" : "#EF4444";
    return (
      <div style={{position:"fixed",inset:0,background:"var(--bg)",zIndex:200,display:"flex",flexDirection:"column",overflowY:"auto"}}>
        <div style={{padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"flex-end",flexShrink:0}}>
          <button onClick={onClose} style={{background:"var(--surface2)",border:"2px solid var(--border)",borderRadius:8,padding:"5px 12px",color:"var(--text-muted)",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>← Back</button>
        </div>
        {/* Winner hero */}
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px",textAlign:"center"}}>
          <div style={{fontSize:56,marginBottom:12}}>🏆</div>
          <p style={{fontSize:11,fontWeight:800,color:winColor,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Match Over</p>
          <h1 style={{fontSize:36,fontWeight:900,color:winColor,margin:"0 0 6px",lineHeight:1.1}}>{winner}</h1>
          <p style={{fontSize:16,color:"var(--text-muted)",marginBottom:24}}>defeats {loser}</p>
          {/* Set score */}
          <div style={{display:"flex",alignItems:"center",gap:20,marginBottom:24}}>
            <div style={{textAlign:"center"}}>
              <p style={{fontSize:11,fontWeight:700,color:"#3B82F6",marginBottom:4}}>{p1}</p>
              <p style={{fontSize:42,fontWeight:900,color:"#3B82F6",lineHeight:1}}>{p1sets}</p>
            </div>
            <p style={{fontSize:24,color:"var(--text-faint)",fontWeight:700}}>–</p>
            <div style={{textAlign:"center"}}>
              <p style={{fontSize:11,fontWeight:700,color:"#EF4444",marginBottom:4}}>{p2}</p>
              <p style={{fontSize:42,fontWeight:900,color:"#EF4444",lineHeight:1}}>{p2sets}</p>
            </div>
          </div>
          {s.judge&&<p style={{fontSize:12,color:"var(--text-faint)"}}>Judged by {s.judge}</p>}
          {s.tournamentName&&<p style={{fontSize:11,color:"var(--text-faint)",marginTop:4}}>{s.tournamentName}</p>}
        </div>
        {/* Combo history summary */}
        {s.comboHistory?.length>0&&(
          <div style={{padding:"0 16px 24px",flexShrink:0}}>
            <p style={{fontSize:10,fontWeight:800,color:"var(--text-faint)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>Battle Log</p>
            {[...s.comboHistory].reverse().map((h,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid var(--border)"}}>
                <span style={{fontSize:12,fontWeight:700,color:h.scorerIdx===0?"#3B82F6":"#EF4444"}}>{h.scorer}</span>
                <span style={{fontSize:11,color:"var(--text-muted)"}}>{h.typeName} <span style={{color:"#22C55E",fontWeight:700}}>+{h.points}</span></span>
                <span style={{fontSize:10,color:"var(--text-faint)",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.winnerCombo||"—"}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ── Waiting / idle screen (slot exists but no active match) ──
  if(!state){
    return (
      <div style={{position:"fixed",inset:0,background:"var(--bg)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{padding:"12px 14px",position:"absolute",top:0,right:0}}>
          <button onClick={onClose} style={{background:"var(--surface2)",border:"2px solid var(--border)",borderRadius:8,padding:"5px 12px",color:"var(--text-muted)",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>← Back</button>
        </div>
        <div style={{textAlign:"center",padding:"0 32px"}}>
          <div style={{fontSize:48,marginBottom:16}}>⏳</div>
          <h2 style={{fontSize:20,fontWeight:900,color:"var(--text-primary)",marginBottom:8}}>Waiting for Match</h2>
          <p style={{fontSize:13,color:"var(--text-muted)",lineHeight:1.6}}>The judge hasn't started scoring yet. This screen will update automatically when the match begins.</p>
          <div style={{marginTop:20,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <span className="live-dot"/>
            <span style={{fontSize:11,color:"var(--text-faint)"}}>Listening for updates…</span>
          </div>
        </div>
      </div>
    );
  }

  const secAgo = Math.floor((Date.now()-lastUpdated)/1000);

  // ── Set win flash overlay ──
  const SetWinFlash = setWinMsg ? (
    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
      background:"rgba(0,0,0,0.75)",zIndex:10,pointerEvents:"none"}}>
      <div style={{textAlign:"center",padding:"24px 32px",borderRadius:20,border:`2px solid ${setWinMsg.color}`,background:"var(--surface)"}}>
        <p style={{fontSize:11,fontWeight:800,color:setWinMsg.color,letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Set {setWinMsg.set} Won</p>
        <p style={{fontSize:28,fontWeight:900,color:setWinMsg.color,margin:0}}>{setWinMsg.winner}</p>
      </div>
    </div>
  ) : null;

  // ── Finish announcement banner ──
  const AnnouncementBanner = announcement ? (
    <div style={{margin:"0 16px 12px",padding:"12px 16px",borderRadius:16,flexShrink:0,
      background:`${announcement.color}18`,border:`2px solid ${announcement.color}60`,
      textAlign:"center"}}>
      <p style={{fontSize:20,margin:"0 0 2px"}}>{announcement.emoji}</p>
      <p style={{fontSize:15,fontWeight:900,color:announcement.color,letterSpacing:1,margin:"0 0 2px"}}>{announcement.label} {announcement.pts}</p>
      <p style={{fontSize:12,color:"var(--text-muted)",margin:0}}>
        <span style={{color:announcement.scorerColor,fontWeight:700}}>{announcement.scorer}</span> scores
      </p>
    </div>
  ) : null;

  // ── Main live view ──
  return (
    <div style={{position:"fixed",inset:0,background:"var(--bg)",zIndex:200,display:"flex",flexDirection:"column",overflowY:"auto"}}>
      {SetWinFlash}

      {/* Top bar */}
      <div style={{padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid var(--border)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span className="live-dot"/>
          <span style={{fontSize:13,fontWeight:800,color:"#22C55E",letterSpacing:0.5}}>LIVE</span>
          <span style={{fontSize:10,color:"var(--text-faint)"}}>· {secAgo<3?"just updated":`${secAgo}s ago`}</span>
        </div>
        <button onClick={onClose} style={{background:"var(--surface2)",border:"2px solid var(--border)",borderRadius:8,padding:"5px 12px",color:"var(--text-muted)",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
          ← Back
        </button>
      </div>

      {/* Context strip */}
      <div style={{padding:"8px 16px",borderBottom:"1px solid var(--border)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:11,fontWeight:700,color:"var(--text-faint)",textTransform:"uppercase",letterSpacing:0.5}}>{s.tournamentName||"NC BLAST"}</span>
        {s.judge&&<span style={{fontSize:11,color:"var(--text-faint)"}}>Judge: <strong style={{color:"var(--text-muted)"}}>{s.judge}</strong></span>}
      </div>

      {/* Shuffle timer banner */}
      {s.shuffling&&(
        <div style={{padding:"12px 16px",background:"#F59E0B18",borderBottom:"2px solid #F59E0B40",flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>⏱</span>
          <div>
            <p style={{fontSize:13,fontWeight:900,color:"#F59E0B",margin:0,letterSpacing:0.5}}>Shuffle Time</p>
            <p style={{fontSize:11,color:"var(--text-muted)",margin:0}}>Players are selecting their bey order</p>
          </div>
        </div>
      )}

      {/* Set tracker */}
      {need>1&&(
        <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:11,fontWeight:700,color:"#3B82F6"}}>{p1sets} set{p1sets!==1?"s":""}</span>
            <span style={{fontSize:10,fontWeight:700,color:"var(--text-faint)",letterSpacing:1,textTransform:"uppercase"}}>Set {s.curSet||1} of {need}</span>
            <span style={{fontSize:11,fontWeight:700,color:"#EF4444"}}>{p2sets} set{p2sets!==1?"s":""}</span>
          </div>
          <div style={{display:"flex",gap:6}}>
            {Array.from({length:need}).map((_,i)=>(
              <div key={i} style={{flex:1,height:8,borderRadius:4,
                background: i<p1sets ? "#3B82F6" : i<p1sets+p2sets ? "#EF4444" : "var(--surface3)"}}>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Score — main event */}
      <div style={{display:"flex",alignItems:"stretch",justifyContent:"center",padding:"16px",gap:0,flexShrink:0}}>
        {/* P1 */}
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:8,paddingRight:8,borderRight:"1px solid var(--border)"}}>
          <p style={{fontSize:13,fontWeight:800,color:"#3B82F6",textAlign:"center",width:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",margin:0}}>{p1}</p>
          <div style={{fontSize:84,fontWeight:900,color:"#3B82F6",lineHeight:1}}>{p1pts}</div>
          {/* Progress bar */}
          {pointLimit>0&&(
            <div style={{width:"100%",height:6,borderRadius:3,background:"var(--surface3)",overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.min(100,(p1pts/pointLimit)*100)}%`,background:"#3B82F6",borderRadius:3}}/>
            </div>
          )}
          {pointLimit>0&&<p style={{fontSize:10,color:"var(--text-faint)",margin:0}}>{p1pts} / {pointLimit}</p>}
        </div>

        {/* P2 */}
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:8,paddingLeft:8}}>
          <p style={{fontSize:13,fontWeight:800,color:"#EF4444",textAlign:"center",width:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",margin:0}}>{p2}</p>
          <div style={{fontSize:84,fontWeight:900,color:"#EF4444",lineHeight:1}}>{p2pts}</div>
          {/* Progress bar */}
          {pointLimit>0&&(
            <div style={{width:"100%",height:6,borderRadius:3,background:"var(--surface3)",overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.min(100,(p2pts/pointLimit)*100)}%`,background:"#EF4444",borderRadius:3}}/>
            </div>
          )}
          {pointLimit>0&&<p style={{fontSize:10,color:"var(--text-faint)",margin:0}}>{p2pts} / {pointLimit}</p>}
        </div>
      </div>

      {/* Finish announcement — inline below score */}
      {AnnouncementBanner}

      {/* Active combos */}
      {(s.p1ActiveCombo||s.p2ActiveCombo)&&(
        <div style={{padding:"0 16px 12px",flexShrink:0}}>
          <p style={{fontSize:10,fontWeight:800,color:"var(--text-faint)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>Active Combos This Battle</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[{combo:s.p1ActiveCombo,name:p1,color:"#3B82F6"},{combo:s.p2ActiveCombo,name:p2,color:"#EF4444"}].map((item,i)=>(
              <div key={i} style={{padding:"10px",borderRadius:12,background:`${item.color}12`,border:`2px solid ${item.color}30`,textAlign:"center"}}>
                <p style={{fontSize:10,fontWeight:800,color:item.color,marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</p>
                {item.combo?(
                  <>
                    <p style={{fontSize:12,fontWeight:800,color:"var(--text-primary)",margin:0,lineHeight:1.3}}>{item.combo.blade}</p>
                    <p style={{fontSize:10,color:"var(--text-muted)",marginTop:2}}>{item.combo.ratchet} · {normalizeBit(item.combo.bit)}</p>
                  </>
                ):<p style={{fontSize:12,color:"var(--text-faint)",margin:0}}>—</p>}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Combo history trail */}
      {s.comboHistory?.length>0&&(
        <div style={{padding:"0 16px 16px",flexShrink:0}}>
          <p style={{fontSize:10,fontWeight:800,color:"var(--text-faint)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>Recent Battles</p>
          <div style={{display:"flex",flexDirection:"column",gap:0,borderRadius:12,overflow:"hidden",border:"1px solid var(--border)"}}>
            {[...s.comboHistory].reverse().map((h,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:i%2===0?"var(--surface2)":"var(--surface)",borderBottom:i<s.comboHistory.length-1?"1px solid var(--border)":"none"}}>
                <span style={{fontSize:11,fontWeight:800,color:h.scorerIdx===0?"#3B82F6":"#EF4444",minWidth:60,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.scorer}</span>
                <span style={{fontSize:10,color:"var(--text-muted)",flex:1,textAlign:"center",padding:"0 6px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.winnerCombo||"—"}</span>
                <span style={{fontSize:10,fontWeight:700,color:"#22C55E",flexShrink:0}}>{h.typeName} +{h.points}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Pairings Tab ────────────────────────────────────────────── */
function PairingsTab({slug, myName, liveSlots}){
  const [pairings, setPairings] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [liveView, setLiveView] = useState(null);
  const [collapsedRounds, setCollapsedRounds] = useState(new Set());

  const load = useCallback(async()=>{
    if(!slug){setError("No tournament loaded.");return;}
    setLoading(true); setError(null);
    try {
      const data = await workerGet(`/pairings?slug=${encodeURIComponent(slug)}`);
      const pairs = data.pairings||[];
      setPairings(pairs);
      // Auto-collapse only fully-complete rounds that are not the latest round
      const grouped = {};
      pairs.forEach(m=>{ const r=m.round||0; if(!grouped[r]) grouped[r]=[]; grouped[r].push(m); });
      const rounds = Object.keys(grouped).map(Number).sort((a,b)=>a-b);
      const toCollapse = new Set();
      rounds.forEach((r,i)=>{
        const allDone = grouped[r].every(m=>m.state==="complete");
        const isLast = i===rounds.length-1;
        if(allDone && !isLast) toCollapse.add(r);
      });
      setCollapsedRounds(toCollapse);
    } catch(e){ setError("Couldn't load matches. Try again."); }
    finally{ setLoading(false); }
  },[slug]);

  useEffect(()=>{ load(); },[load]);

  // Build lookups so we can light up individual pairing cards:
  // 1. By Challonge match ID (exact, preferred — no name ambiguity)
  // 2. By player name pair as a fallback for non-Challonge matches
  const liveByMatchId = {};
  const liveByPlayers = {};
  liveSlots.forEach(s=>{
    if(!s.state) return;
    if(s.state.challongeMatchId) {
      liveByMatchId[String(s.state.challongeMatchId)] = s;
    }
    const p1 = (s.state.p1||"").toLowerCase().trim();
    const p2 = (s.state.p2||"").toLowerCase().trim();
    if(p1 && p2) {
      liveByPlayers[`${p1}|${p2}`] = s;
      liveByPlayers[`${p2}|${p1}`] = s;
    }
  });

  const getLiveSlot = (m) => {
    // Try match ID first — most reliable
    if(m.id && liveByMatchId[String(m.id)]) return liveByMatchId[String(m.id)];
    // Fall back to name matching
    const n1 = (m.player1_name||"").toLowerCase().trim();
    const n2 = (m.player2_name||"").toLowerCase().trim();
    return liveByPlayers[`${n1}|${n2}`] || liveByPlayers[`${n2}|${n1}`] || null;
  };

  // Only allow toggling collapse on fully-complete rounds
  const toggleRound = (r, allDone) => {
    if(!allDone) return; // active rounds cannot be collapsed
    setCollapsedRounds(prev=>{
      const next = new Set(prev);
      next.has(r) ? next.delete(r) : next.add(r);
      return next;
    });
  };

  // Group by round
  const grouped = {};
  (pairings||[]).forEach(m=>{
    const r = m.round||0;
    if(!grouped[r]) grouped[r]=[];
    grouped[r].push(m);
  });
  const rounds = Object.keys(grouped).map(Number).sort((a,b)=>a-b);

  const isMyMatch = (m) => myName && (
    (m.player1_name&&m.player1_name.toLowerCase()===myName.toLowerCase()) ||
    (m.player2_name&&m.player2_name.toLowerCase()===myName.toLowerCase())
  );

  if(!slug) return <div style={{padding:"32px 16px",textAlign:"center",color:"var(--text-muted)"}}>No tournament linked. Ask your organizer for the tournament link.</div>;

  // If a live view is open, render it full screen instead of this tab
  if(liveView) return <LiveScoreView matchId={liveView.matchId} slot={liveView.slot} initialState={liveView.state} onClose={()=>setLiveView(null)}/>;

  return (
    <div style={{padding:"12px 14px",paddingBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{fontSize:18,fontWeight:900,margin:0}}>Bracket</h2>
        <button onClick={load} disabled={loading} style={{background:"none",border:"2px solid var(--border)",borderRadius:8,padding:"5px 10px",color:"var(--text-muted)",fontSize:11,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
          {loading?"...":"↻ Refresh"}
        </button>
      </div>
      {error&&<p style={{color:"#EF4444",fontSize:13,marginBottom:12}}>{error}</p>}
      {loading&&!pairings&&<p style={{color:"var(--text-muted)",fontSize:13}}>Loading matches…</p>}
      {rounds.map(r=>{
        const allDone = grouped[r].every(m=>m.state==="complete");
        const collapsed = allDone && collapsedRounds.has(r); // only complete rounds can be collapsed
        const hasMyMatch = grouped[r].some(m=>isMyMatch(m));
        const roundLabel = r<0 ? `Top Cut — Round ${Math.abs(r)}` : `Swiss Round ${r}`;
        return (
          <div key={r} style={{marginBottom:12}}>
            {/* Round header */}
            <button
              onClick={()=>toggleRound(r, allDone)}
              style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                width:"100%",padding:"8px 12px",borderRadius:10,marginBottom:collapsed?0:8,
                border:"1px solid var(--border)",
                background:"var(--surface3)",
                cursor:allDone?"pointer":"default",
                fontFamily:"'Outfit',sans-serif",textAlign:"left"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:10,fontWeight:800,color:allDone?"var(--text-faint)":"var(--text-secondary)",letterSpacing:1.5,textTransform:"uppercase"}}>{roundLabel}</span>
                {allDone&&<span style={{fontSize:9,fontWeight:700,color:"#22C55E",background:"#22C55E18",padding:"2px 6px",borderRadius:4}}>COMPLETE</span>}
                {hasMyMatch&&<span style={{fontSize:9,fontWeight:700,color:"var(--accent)",background:"#EA580C18",padding:"2px 6px",borderRadius:4}}>YOUR ROUND</span>}
              </div>
              {/* Only show collapse arrow for complete rounds */}
              {allDone&&<span style={{fontSize:12,color:"var(--text-faint)"}}>{collapsed?"▼":"▲"}</span>}
            </button>

            {!collapsed&&grouped[r].map(m=>{
              const mine = isMyMatch(m);
              const done = m.state==="complete";
              const liveSlot = getLiveSlot(m);
              const isLive = !!liveSlot;
              const isMyLive = isLive && mine;
              const liveState = liveSlot?.state;
              const isShuffling = isLive && !!liveState?.shuffling;
              const p1pts = liveState?.pts?.[0]??null;
              const p2pts = liveState?.pts?.[1]??null;

              // Border/background priority: myLive > live > mine > default
              const borderColor = isMyLive ? "#EA580C80" : isLive ? "#22C55E60" : mine ? "#EA580C60" : "var(--border)";
              const bgColor     = isMyLive ? "#EA580C0C" : isLive ? "#22C55E0C" : mine ? "#EA580C08" : "var(--surface2)";

              const cardInner = (
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{flex:1,minWidth:0}}>
                    {/* Status badges */}
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}}>
                      {mine&&<span style={{fontSize:9,fontWeight:800,color:"var(--accent)",background:"#EA580C20",padding:"2px 6px",borderRadius:4,letterSpacing:0.5}}>YOU</span>}
                      {isLive&&!isShuffling&&(
                        <span style={{display:"flex",alignItems:"center",gap:4,fontSize:9,fontWeight:800,color:"#22C55E",background:"#22C55E18",padding:"2px 7px",borderRadius:4,letterSpacing:0.5}}>
                          <span className="live-dot" style={{marginRight:0}}/>LIVE · Tap to watch
                        </span>
                      )}
                      {isShuffling&&(
                        <span style={{fontSize:9,fontWeight:800,color:"#F59E0B",background:"#F59E0B18",padding:"2px 7px",borderRadius:4,letterSpacing:0.5}}>
                          ⏱ SHUFFLE TIME
                        </span>
                      )}
                      {!isLive&&done&&<span style={{fontSize:9,fontWeight:700,color:"var(--text-faint)",background:"var(--surface3)",padding:"2px 6px",borderRadius:4}}>DONE</span>}
                    </div>
                    {/* Player names */}
                    <p style={{fontSize:14,fontWeight:800,color:"var(--text-primary)",margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {m.player1_name||"TBD"} <span style={{color:"var(--text-faint)",fontWeight:500}}>vs</span> {m.player2_name||"TBD"}
                    </p>
                    {/* Live score preview — only show when not shuffling */}
                    {isLive&&!isShuffling&&p1pts!==null&&(
                      <p style={{fontSize:12,fontWeight:800,color:"var(--text-muted)",marginTop:3}}>
                        <span style={{color:"#3B82F6"}}>{p1pts}</span>
                        <span style={{color:"var(--text-faint)",margin:"0 5px"}}>–</span>
                        <span style={{color:"#EF4444"}}>{p2pts}</span>
                      </p>
                    )}
                    {/* Completed score */}
                    {!isLive&&done&&m.scores_csv&&(
                      <p style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>
                        Score: {m.scores_csv} · Winner: <strong style={{color:"var(--text-secondary)"}}>{String(m.winner_id)===String(m.player1_id)?m.player1_name:m.player2_name}</strong>
                      </p>
                    )}
                  </div>
                  {isLive&&!isShuffling&&<span style={{fontSize:16,flexShrink:0,marginLeft:8}}>👁</span>}
                  {isShuffling&&<span style={{fontSize:16,flexShrink:0,marginLeft:8}}>⏱</span>}
                </div>
              );

              // Live non-shuffling cards are tappable; shuffling and non-live cards are plain divs
              if(isLive&&!isShuffling){
                return (
                  <button key={m.id} className="fade-in"
                    onClick={()=>setLiveView({matchId:liveSlot.matchId, slot:liveSlot.slot, state:liveState})}
                    style={{display:"block",width:"100%",padding:"11px 13px",borderRadius:12,marginBottom:7,
                      border:`2px solid ${borderColor}`,background:bgColor,
                      cursor:"pointer",textAlign:"left",fontFamily:"'Outfit',sans-serif"}}>
                    {cardInner}
                  </button>
                );
              }
              return (
                <div key={m.id} className="fade-in"
                  style={{padding:"11px 13px",borderRadius:12,marginBottom:7,
                    border:`2px solid ${borderColor}`,background:bgColor}}>
                  {cardInner}
                </div>
              );
            })}
          </div>
        );
      })}
      {pairings&&pairings.length===0&&<p style={{color:"var(--text-muted)",fontSize:13}}>No matches found yet.</p>}
    </div>
  );
}

/* ─── Standings Tab ───────────────────────────────────────────── */
function StandingsTab({slug, myName}){
  const [standings, setStandings] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const load = useCallback(async()=>{
    if(!slug){setError("No tournament loaded.");return;}
    setLoading(true); setError(null);
    try {
      const data = await workerGet(`/standings?slug=${encodeURIComponent(slug)}`);
      setStandings(data.standings||[]);
    } catch(e){ setError("Couldn't load standings. Try again."); }
    finally{ setLoading(false); }
  },[slug]);

  useEffect(()=>{ load(); },[load]);

  if(!slug) return <div style={{padding:"32px 16px",textAlign:"center",color:"var(--text-muted)"}}>No tournament linked.</div>;

  return (
    <div style={{padding:"12px 14px",paddingBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{fontSize:18,fontWeight:900,margin:0}}>Standings</h2>
        <button onClick={load} disabled={loading} style={{background:"none",border:"2px solid var(--border)",borderRadius:8,padding:"5px 10px",color:"var(--text-muted)",fontSize:11,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
          {loading?"...":"↻ Refresh"}
        </button>
      </div>
      {error&&<p style={{color:"#EF4444",fontSize:13,marginBottom:12}}>{error}</p>}
      {loading&&!standings&&<p style={{color:"var(--text-muted)",fontSize:13}}>Loading…</p>}
      {standings&&standings.map((p,i)=>{
        const isMe = myName&&p.name.toLowerCase()===myName.toLowerCase();
        const medals = ["🥇","🥈","🥉"];
        return (
          <div key={p.id} className="fade-in"
            style={{display:"flex",alignItems:"center",gap:12,padding:"11px 13px",borderRadius:12,marginBottom:6,
              border:`2px solid ${isMe?"#EA580C60":"var(--border)"}`,
              background:isMe?"#EA580C08":"var(--surface2)"}}>
            <div style={{width:28,textAlign:"center",flexShrink:0}}>
              {i<3?<span style={{fontSize:18}}>{medals[i]}</span>:<span style={{fontSize:13,fontWeight:800,color:"var(--text-faint)"}}>{i+1}</span>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                {isMe&&<span style={{fontSize:9,fontWeight:800,color:"var(--accent)",background:"#EA580C20",padding:"2px 5px",borderRadius:4}}>YOU</span>}
                <p style={{fontSize:14,fontWeight:800,color:"var(--text-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",margin:0}}>{p.name}</p>
              </div>
              <p style={{fontSize:11,color:"var(--text-muted)",marginTop:1}}>
                {p.wins}W – {p.losses}L <span style={{color:"var(--text-faint)",marginLeft:6}}>+{p.pointDiff} pts</span>
              </p>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <p style={{fontSize:16,fontWeight:900,color:"var(--text-primary)",margin:0}}>{p.wins}-{p.losses}</p>
              {p.finalRank&&<p style={{fontSize:9,color:"var(--text-faint)",marginTop:1}}>Rank #{p.finalRank}</p>}
            </div>
          </div>
        );
      })}
      {standings&&standings.length===0&&<p style={{color:"var(--text-muted)",fontSize:13}}>No standings yet.</p>}
    </div>
  );
}

/* ─── Combo Registration Tab ──────────────────────────────────── */
function ComboTab({myName, myDeck, onDeckSaved, slug, onCombosFound}){
  const [building, setBuilding] = useState(false);
  const [workerCombos, setWorkerCombos] = useState(null); // null=loading, []=loaded empty
  const [pushStatus, setPushStatus] = useState(null);

  useEffect(()=>{
    if(!myName){ setWorkerCombos([]); onCombosFound&&onCombosFound(false); return; }
    setWorkerCombos(null);
    (async()=>{
      try {
        const kvName = tn(myName); // match the key the judge uses (truncated for long names)
        const data = await workerGet(`/combos/get?player=${encodeURIComponent(kvName)}`);
        const fetched = Array.isArray(data.combos) ? data.combos.map(normalizeCombo).filter(c=>c.blade) : [];
        setWorkerCombos(fetched);
        onCombosFound&&onCombosFound(fetched.length>0);
      } catch(_){
        setWorkerCombos([]);
        onCombosFound&&onCombosFound(false);
      }
    })();
  },[myName]);

  const handleSave = async(deck) => {
    // Only push combos that are fully built — incomplete slots get dropped
    const readyCombos = deck.filter(comboReady).map(normalizeCombo);
    setBuilding(false); setPushStatus(null); onDeckSaved(readyCombos);
    try {
      await fetch(`${OVERLAY_WORKER}/combos/push`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({player:tn(myName),combos:readyCombos,updatedAt:Date.now()}), // tn() matches judge-side key
        signal:AbortSignal.timeout(8000),
      });
      setPushStatus("ok");
      setWorkerCombos(readyCombos);
      onCombosFound&&onCombosFound(readyCombos.length>0);
    } catch(_){ setPushStatus("error"); }
  };

  const loading = workerCombos===null;
  const displayCombos = (workerCombos&&workerCombos.length>0)
    ? workerCombos
    : (myDeck&&myDeck.some(c=>c?.blade) ? myDeck.map(normalizeCombo) : []);
  const hasCombos = displayCombos.some(c=>c.blade);
  const labels = ["First","Second","Third"];

  if(building){
    return <DeckBuilder playerName={myName} initialDeck={hasCombos?displayCombos:myDeck} onSave={handleSave} onCancel={()=>setBuilding(false)} savedCombos={displayCombos.filter(c=>c.blade&&c.bit)}/>;
  }

  return (
    <div style={{padding:"12px 14px",paddingBottom:20}}>
      <h2 style={{fontSize:18,fontWeight:900,marginBottom:4}}>Deck Registry</h2>

      {!myName&&(
        <div style={{padding:"12px 14px",borderRadius:10,background:"#EA580C15",border:"1px solid #EA580C40",fontSize:12,color:"var(--accent2)",marginBottom:16}}>
          ⚠ Select your name first to view your deck.
        </div>
      )}

      {pushStatus==="ok"&&(
        <div style={{padding:"10px 14px",borderRadius:10,background:"#22C55E15",border:"1px solid #22C55E40",fontSize:12,fontWeight:700,color:"#22C55E",marginBottom:14}}>
          ✓ Deck saved and shared to all judge devices
        </div>
      )}
      {pushStatus==="error"&&(
        <div style={{padding:"10px 14px",borderRadius:10,background:"#EF444415",border:"1px solid #EF444440",fontSize:12,fontWeight:700,color:"#EF4444",marginBottom:14}}>
          ⚠ Saved locally — couldn't sync to network
        </div>
      )}

      {myName&&loading&&(
        <p style={{fontSize:13,color:"var(--text-muted)",marginBottom:16}}>Loading your deck…</p>
      )}

      {myName&&!loading&&!hasCombos&&(
        <div style={{padding:"20px 16px",borderRadius:14,background:"#EF444408",border:"2px dashed #EF444440",textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:36,marginBottom:10}}>📋</div>
          <p style={{fontSize:14,fontWeight:800,color:"var(--text-primary)",marginBottom:8}}>No combos saved.</p>
          <p style={{fontSize:12,color:"var(--text-muted)",lineHeight:1.6,margin:0}}>
            Help your judge by building your deck here for faster deck verification!
          </p>
        </div>
      )}

      {myName&&!loading&&hasCombos&&(
        <>
          <p style={{fontSize:12,color:"var(--text-muted)",marginBottom:12,lineHeight:1.6}}>
            This is your most recently saved deck. It was registered by either you from right here or by a judge from your last match. If you don't plan to play this deck next round, try editing it here to help your next match run smoother and more quickly!
          </p>
          <div style={{marginBottom:16}}>
            {displayCombos.slice(0,3).map((c,i)=>{
              const nc = normalizeCombo(c);
              const isNoRatchet = NO_RATCHET_BLADES.includes(nc.blade);
              const ready = nc.blade&&nc.bit&&(nc.ratchet||isNoRatchet);
              return (
                <div key={i} style={{padding:"10px 13px",borderRadius:11,marginBottom:6,
                  border:`2px solid ${ready?"#22C55E40":"var(--border)"}`,
                  background:ready?"#22C55E08":"var(--surface2)"}}>
                  <p style={{fontSize:10,fontWeight:700,color:ready?"#22C55E":"var(--text-faint)",marginBottom:ready?4:0,letterSpacing:0.5,textTransform:"uppercase"}}>{labels[i]} Combo</p>
                  {ready
                    ?<p style={{fontSize:13,fontWeight:800,color:"var(--text-primary)",margin:0}}>{comboStr(nc)}</p>
                    :<p style={{fontSize:12,color:"var(--text-faint)",margin:0}}>Not built</p>}
                </div>
              );
            })}
          </div>
        </>
      )}

      {myName&&!loading&&(
        <button onClick={()=>setBuilding(true)}
          style={{display:"block",width:"100%",padding:"14px 0",borderRadius:12,
            background:hasCombos?"var(--surface3)":"var(--accent)",
            color:hasCombos?"var(--text-secondary)":"#fff",
            fontSize:15,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer",marginBottom:10,
            border:`2px solid ${hasCombos?"var(--border)":"transparent"}`}}>
          {hasCombos?"✏ Edit Deck":"Build Your Deck →"}
        </button>
      )}
    </div>
  );
}



/* ═══════════════════════════════════════
   PIN MODAL — on-screen 4-digit keypad
═══════════════════════════════════════ */
function PinModal({title, subtitle, onSubmit, onCancel, error, loading}) {
  const [digits, setDigits] = useState(["","","",""]);

  const pressDigit = (d) => {
    setDigits(prev => {
      const filled = prev.filter(x => x !== "").length;
      if(filled >= 4) return prev;
      const next = [...prev];
      next[filled] = String(d);
      return next;
    });
  };

  const pressBack = () => {
    setDigits(prev => {
      const next = [...prev];
      for(let i = 3; i >= 0; i--) {
        if(next[i] !== "") { next[i] = ""; break; }
      }
      return next;
    });
  };

  const pin = digits.join("");
  const ready = pin.length === 4;

  const handleSubmit = () => { if(ready && !loading) onSubmit(pin); };

  const keys = [1,2,3,4,5,6,7,8,9,"",0,"⌫"];

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.8)",zIndex:800,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
      <div style={{background:"var(--surface)",borderRadius:20,padding:"24px 20px 20px",maxWidth:300,width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,0.4)",border:"1px solid var(--border)"}}>
        <p style={{fontSize:17,fontWeight:900,color:"var(--text-primary)",margin:"0 0 4px",textAlign:"center"}}>{title}</p>
        {subtitle&&<p style={{fontSize:11,color:"var(--text-muted)",textAlign:"center",margin:"0 0 20px",lineHeight:1.5}}>{subtitle}</p>}
        {!subtitle&&<div style={{height:16}}/>}

        {/* Dot display */}
        <div style={{display:"flex",gap:14,justifyContent:"center",marginBottom:16}}>
          {digits.map((d,i)=>(
            <div key={i} style={{
              width:14,height:14,borderRadius:"50%",
              background: d ? "#EA580C" : "var(--border2)",
              transition:"background 0.1s",
              border: error ? "2px solid #EF4444" : "none",
            }}/>
          ))}
        </div>

        {error&&<p style={{fontSize:12,color:"#EF4444",textAlign:"center",marginBottom:12,fontWeight:600}}>{error}</p>}

        {/* Keypad */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
          {keys.map((k,i)=>{
            const isEmpty = k === "";
            const isBack = k === "⌫";
            return (
              <button key={i}
                onClick={isEmpty ? undefined : (isBack ? pressBack : ()=>pressDigit(k))}
                disabled={loading || isEmpty}
                style={{
                  height:52, borderRadius:12,
                  border: isBack ? "2px solid var(--border2)" : "2px solid var(--border)",
                  background: isEmpty ? "transparent" : isBack ? "var(--surface2)" : "var(--surface3)",
                  color: isBack ? "var(--text-secondary)" : "var(--text-primary)",
                  fontSize: isBack ? 20 : 22,
                  fontWeight:700, fontFamily:"'Outfit',sans-serif",
                  cursor: isEmpty || loading ? "default" : "pointer",
                  opacity: isEmpty ? 0 : 1,
                }}
              >{k}</button>
            );
          })}
        </div>

        <button onClick={handleSubmit} disabled={!ready||loading}
          style={{display:"block",width:"100%",padding:"13px 0",borderRadius:12,border:"none",
            background:ready&&!loading?"#EA580C":"var(--surface3)",
            color:ready&&!loading?"#fff":"var(--text-disabled)",
            fontSize:15,fontWeight:800,fontFamily:"'Outfit',sans-serif",
            cursor:ready&&!loading?"pointer":"not-allowed",marginBottom:8}}>
          {loading?"Checking…":"Confirm"}
        </button>
        <button onClick={onCancel} disabled={loading}
          style={{display:"block",width:"100%",padding:"9px 0",borderRadius:12,
            border:"2px solid var(--border)",background:"none",
            color:"var(--text-muted)",fontSize:13,fontWeight:700,
            fontFamily:"'Outfit',sans-serif",cursor:loading?"not-allowed":"pointer"}}>
          Cancel
        </button>
      </div>
    </div>
  );
}

function OrgConfirmUsername({ auth }) {
  const [input, setInput] = React.useState(() => {
    try { return localStorage.getItem("ncblast-saved-username") || ""; } catch(_) { return ""; }
  });
  return (
    <div style={{marginBottom:14}}>
      <div style={{background:"var(--surface)",borderRadius:14,padding:"16px",border:"2px solid #EA580C",marginBottom:10}}>
        <p style={{fontSize:13,fontWeight:700,color:"var(--text-primary)",margin:"0 0 4px"}}>✅ Challonge login successful!</p>
        <p style={{fontSize:12,color:"var(--text-muted)",margin:"0 0 12px",lineHeight:1.5}}>Enter your Challonge username to finish.</p>
        <input type="text" placeholder="your-challonge-username" value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && input.trim()) auth.confirm(input.trim()); }}
          style={{width:"100%",padding:"10px 12px",borderRadius:10,boxSizing:"border-box",
            border:"1.5px solid var(--border2)",background:"var(--surface2)",
            color:"var(--text-primary)",fontSize:13,fontFamily:"'Outfit',sans-serif",
            outline:"none",marginBottom:10}} autoFocus />
