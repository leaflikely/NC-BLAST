          style={{width:"100%",padding:"12px 0",borderRadius:10,border:"none",
            background:input.trim()?"#EA580C":"var(--border2)",
            color:"#fff",fontSize:13,fontWeight:800,fontFamily:"'Outfit',sans-serif",
            cursor:input.trim()?"pointer":"default"}}>Confirm</button>
      </div>
    </div>
  );
}

function OrgApp({onSwitchRole}) {
  const [slug, setSlug] = useState(null);           // active tournament slug
  const [tourneyName, setTourneyName] = useState(""); // display name
  const [pings, setPings] = useState([]);            // queued ping list
  const [activePing, setActivePing] = useState(null);// currently shown ping notification
  const [liveSlots, setLiveSlots] = useState([]);    // active judged matches
  const [pairings, setPairings] = useState(null);    // all matches for current round
  const [loadingPairings, setLoadingPairings] = useState(false);
  const [pairingsError, setPairingsError] = useState(null);
  const pingPollRef = useRef(null);
  const liveSlotRef = useRef(null);
  const afterRef = useRef(0); // timestamp: only poll for pings newer than this

  // ── Head judge management state ───────────────────────────────────
  const [headJudges, setHeadJudges] = useState([]);
  const [orgOwnerUsername, setOrgOwnerUsername] = useState(null); // the tournament owner
  const [hjLoading, setHjLoading] = useState(false);
  const [hjError, setHjError] = useState(null);
  const [newHJInput, setNewHJInput] = useState("");

  const loadHeadJudges = async (s) => {
    setHjLoading(true); setHjError(null);
    try {
      const res = await workerGet(`/judges/get?slug=${encodeURIComponent(s)}`);
      setHeadJudges(res.headJudges || []);
      setOrgOwnerUsername(res.orgUsername || null);
    } catch(e) { setHjError(e.message || "Failed to load head judges."); }
    finally { setHjLoading(false); }
  };

  const saveHeadJudges = async (newList) => {
    const token = sessionStorage.getItem("ncblast-auth-token");
    setHjLoading(true); setHjError(null);
    try {
      const res = await fetch(`${OVERLAY_WORKER}/judges/set`, {
        method:"POST",
        headers:{"Content-Type":"application/json","X-Auth-Token":token||""},
        body: JSON.stringify({ slug, headJudges: newList, username: sessionStorage.getItem("ncblast-auth-user") }),
        signal: AbortSignal.timeout(8000),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error||"Save failed");
      setHeadJudges(newList);
    } catch(e) { setHjError(e.message); }
    finally { setHjLoading(false); }
  };

  useEffect(() => {
    if (!slug) return;

    // Load pairings and judge meta once
    const loadPairings = async () => {
      setLoadingPairings(true); setPairingsError(null);
      try {
        const data = await workerGet(`/pairings?slug=${encodeURIComponent(slug)}`);
        setPairings(data.pairings || []);
      } catch(e) { setPairingsError(e.message||"Failed to load pairings."); setPairings([]); }
      finally { setLoadingPairings(false); }
    };
    loadPairings();
    loadHeadJudges(slug);

    // Poll live match slots every 5s
    const pollLive = async () => {
      try {
        const data = await workerGet("/overlay/all");
        if((data.slots||[]).length > 0) console.log("[BLAST] org liveSlots", data.slots);
        setLiveSlots(data.slots || []);
      } catch(e) { console.error("[BLAST] pollLive failed", e); }
    };
    pollLive();
    liveSlotRef.current = setInterval(pollLive, 5000);

    // Long-poll for pings
    const pollPings = async () => {
      try {
        const data = await workerGet(`/pings/poll?slug=${encodeURIComponent(slug)}&after=${afterRef.current}`);
        const fresh = data.pings || [];
        if (fresh.length > 0) {
          // Move afterRef forward so we don't re-receive these
          afterRef.current = Math.max(...fresh.map(p => p.sentAt));
          setPings(prev => {
            // Deduplicate by id
            const ids = new Set(prev.map(p => p.id));
            return [...prev, ...fresh.filter(p => !ids.has(p.id))];
          });
        }
      } catch(_) {}
      // Immediately re-open the long-poll
      pingPollRef.current = setTimeout(pollPings, 2000);
    };
    pingPollRef.current = setTimeout(pollPings, 0);

    return () => {
      clearInterval(liveSlotRef.current);
      clearTimeout(pingPollRef.current);
    };
  }, [slug]);

  // ── When pings arrive, surface the first one if none showing ─────
  useEffect(() => {
    if (!activePing && pings.length > 0) {
      setActivePing(pings[0]);
    }
  }, [pings, activePing]);

  // ── Dismiss a ping ───────────────────────────────────────────────
  const dismissPing = async (ping) => {
    // Remove from local queue immediately
    setPings(prev => prev.filter(p => p.id !== ping.id));
    setActivePing(null);
    // Tell the server to remove it too (fire and forget)
    try {
      await fetch(`${OVERLAY_WORKER}/pings/dismiss`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({slug, id: ping.id}),
      });
    } catch(_) {}
  };

  // Poll for event deletion every 20s
  const [orgEventDeleted, setOrgEventDeleted] = React.useState(false);
  const orgDeletionRef = React.useRef(null);
  React.useEffect(()=>{
    if(!slug) return;
    const check = async () => {
      try {
        const data = await workerGet("/list");
        const slugs = (data.tournaments||[]).map(t=>t.slug);
        if(!slugs.includes(slug)) setOrgEventDeleted(true);
      } catch(_){}
    };
    orgDeletionRef.current = setInterval(check, 20000);
    return ()=>clearInterval(orgDeletionRef.current);
  },[slug]);

  // ── Tournament select screen ──────────────────────────────────────
  if (!slug) {
    return <OrgTournamentSelect onSelect={(s, name) => { setSlug(s); setTourneyName(name); }} onSwitchRole={onSwitchRole}/>;
  }

  // ── Figure out the current round from pairings ───────────────────
  // Treat anything that isn't explicitly "complete" as still in play
  const openMatches = (pairings||[]).filter(m => m.state !== "complete");
  // Use Number() to avoid type mismatches (KV/JSON can return strings or numbers)
  const openRoundNums = openMatches
    .map(m => m.round)
    .filter(r => r != null && r !== 0 && isFinite(Number(r)))
    .map(Number);
  const currentRound = openRoundNums.length > 0 ? Math.min(...openRoundNums) : null;
  // Show all matches in the current round (including completed ones in that round)
  // String comparison guards against "1" === 1 type mismatches
  let roundMatches = currentRound !== null
    ? (pairings||[]).filter(m => String(m.round) === String(currentRound))
    : (pairings||[]);
  // Safety fallback: if round filter yields nothing but open matches exist, show them
  if (roundMatches.length === 0 && openMatches.length > 0) roundMatches = openMatches;

  // Build live lookups: by Challonge match ID (exact, preferred) and by name pair (fallback)
  const liveByMatchId = {};
  const liveByPlayersOrg = {};
  liveSlots.forEach(s => {
    if (!s.state) return;
    if (s.state.challongeMatchId) {
      liveByMatchId[String(s.state.challongeMatchId)] = s.state;
    }
    const p1 = (s.state.p1||"").toLowerCase().trim();
    const p2 = (s.state.p2||"").toLowerCase().trim();
    if (p1 && p2) {
      const key = [p1, p2].sort().join("|");
      liveByPlayersOrg[key] = s.state;
    }
  });

  const getLiveState = (m) => {
    if (m.id && liveByMatchId[String(m.id)]) return liveByMatchId[String(m.id)];
    const key = [(m.player1_name||"").toLowerCase().trim(), (m.player2_name||"").toLowerCase().trim()].sort().join("|");
    return liveByPlayersOrg[key] || null;
  };

  const roundLabel = currentRound !== null
    ? (currentRound < 0 ? `Top Cut Round ${Math.abs(currentRound)}` : `Swiss Round ${currentRound}`)
    : pairings && pairings.length > 0 ? "All Matches" : "No matches loaded";

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",fontFamily:"'Outfit',sans-serif",display:"flex",flexDirection:"column"}}>

      {/* Event deleted notification */}
      {orgEventDeleted&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.85)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
          <div style={{background:"var(--surface)",borderRadius:20,padding:"28px 22px",maxWidth:320,width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,0.4)",border:"2px solid #EF4444",textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
            <p style={{fontSize:17,fontWeight:900,color:"var(--text-primary)",marginBottom:8}}>Event Removed</p>
            <p style={{fontSize:13,color:"var(--text-secondary)",marginBottom:22,lineHeight:1.5}}>This tournament has been removed from the NC BLAST cache.</p>
            <button onClick={()=>{setOrgEventDeleted(false);setSlug(null);setTourneyName("");}}
              style={{width:"100%",padding:"13px 0",borderRadius:12,border:"none",background:"#EA580C",color:"#fff",fontSize:15,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
              Back to Event Select
            </button>
          </div>
        </div>
      )}

      {/* ── Header ─────────────────────────────────────────────── */}
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"12px 16px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={onSwitchRole} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",lineHeight:1,padding:"2px 4px"}}>←</button>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontSize:11,fontWeight:700,color:"var(--text-faint)",textTransform:"uppercase",letterSpacing:0.8,margin:0}}>Organizer View</p>
          <p style={{fontSize:14,fontWeight:900,color:"var(--text-primary)",margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tourneyName||slug}</p>
        </div>
        {pings.length > 0 && (
          <div style={{background:"#DC2626",color:"#fff",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,flexShrink:0}}>
            {pings.length}
          </div>
        )}
        <button onClick={()=>setSlug(null)} style={{background:"none",border:"1px solid var(--border)",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,color:"var(--text-muted)",fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
          ⇄ Switch
        </button>
      </div>



      {/* ── Body ───────────────────────────────────────────────── */}
      <div style={{flex:1,overflowY:"auto",padding:"12px 14px 32px"}}>

      {/* ── Head Judges ────────────────────────────────────────── */}
      {(() => {
        const currentUser = (() => { try { return (sessionStorage.getItem("ncblast-auth-user") || "").toLowerCase(); } catch(_) { return ""; } })();
        const isOwner = orgOwnerUsername && currentUser === orgOwnerUsername.toLowerCase();
        // Build participant name list from pairings data
        const rosterNames = [...new Set(
          (pairings||[]).flatMap(m => [m.player1_name, m.player2_name].filter(Boolean))
        )].sort();
        return (
          <div style={{marginBottom:16,padding:"12px 14px",borderRadius:12,background:"var(--surface2)",border:"1px solid var(--border)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <p style={{fontSize:12,fontWeight:800,color:"var(--text-primary)",margin:0}}>Head Judges</p>
              {orgOwnerUsername && <p style={{fontSize:10,color:"var(--text-faint)",margin:0}}>Owner: {orgOwnerUsername}</p>}
            </div>
            <p style={{fontSize:10,color:"var(--text-muted)",margin:"0 0 10px",lineHeight:1.5}}>
              Can access Organizer View for this event. Only the tournament owner can manage this list.
            </p>
            {hjLoading && <p style={{fontSize:12,color:"var(--text-muted)"}}>Saving…</p>}
            {hjError && <p style={{fontSize:11,color:"#EF4444",marginBottom:6}}>⚠ {hjError}</p>}
            {headJudges.length === 0 && !hjLoading && (
              <p style={{fontSize:11,color:"var(--text-faint)",marginBottom:8}}>No head judges set.</p>
            )}
            {headJudges.map(u => (
              <div key={u} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",borderRadius:8,background:"var(--surface)",marginBottom:5,border:"1px solid var(--border)"}}>
                <span style={{fontSize:12,fontWeight:700,color:"var(--text-primary)"}}>{u}</span>
                {isOwner && (
                  <button onClick={()=>saveHeadJudges(headJudges.filter(x=>x!==u))} disabled={hjLoading}
                    style={{fontSize:11,fontWeight:700,color:"#EF4444",background:"none",border:"none",cursor:"pointer",padding:"2px 6px"}}>
                    Remove
                  </button>
                )}
              </div>
            ))}
            {isOwner && (
              <div style={{marginTop:10}}>
                {/* Roster picker */}
                {rosterNames.length > 0 && (
                  <>
                    <p style={{fontSize:10,fontWeight:700,color:"var(--text-faint)",textTransform:"uppercase",letterSpacing:0.8,margin:"0 0 6px"}}>Add from roster</p>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                      {rosterNames.filter(n => !headJudges.includes(n.toLowerCase())).map(n => (
                        <button key={n} onClick={()=>{
                          const u = n.toLowerCase();
                          if (!headJudges.includes(u)) saveHeadJudges([...headJudges, u]);
                        }} disabled={hjLoading} style={{
                          padding:"6px 12px",borderRadius:9,border:"1.5px solid var(--border2)",
                          background:"var(--surface)",color:"var(--text-secondary)",
                          fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"
                        }}>+ {n}</button>
                      ))}
                      {rosterNames.filter(n => !headJudges.includes(n.toLowerCase())).length === 0 && (
                        <p style={{fontSize:11,color:"var(--text-faint)",margin:0}}>All roster players are already head judges.</p>
                      )}
                    </div>
                  </>
                )}
                {/* Manual username input for non-roster judges */}
                <p style={{fontSize:10,fontWeight:700,color:"var(--text-faint)",textTransform:"uppercase",letterSpacing:0.8,margin:"0 0 6px"}}>Add by Challonge username</p>
                <div style={{display:"flex",gap:8}}>
                  <input value={newHJInput} onChange={e=>setNewHJInput(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter"&&newHJInput.trim()){const u=newHJInput.trim().toLowerCase();if(!headJudges.includes(u))saveHeadJudges([...headJudges,u]);setNewHJInput("");}}}
                    placeholder="challonge username"
                    style={{flex:1,padding:"8px 10px",borderRadius:9,border:"1px solid var(--border2)",background:"var(--input-bg)",color:"var(--text-primary)",fontSize:12,fontFamily:"'Outfit',sans-serif",outline:"none"}}
                  />
                  <button onClick={()=>{const u=newHJInput.trim().toLowerCase();if(u&&!headJudges.includes(u))saveHeadJudges([...headJudges,u]);setNewHJInput("");}}
                    disabled={!newHJInput.trim()||hjLoading}
                    style={{padding:"0 12px",borderRadius:9,border:"none",background:"#22C55E",color:"#fff",fontSize:12,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                    Add
                  </button>
                </div>
              </div>
            )}
            {!isOwner && orgOwnerUsername && (
              <p style={{fontSize:10,color:"var(--text-faint)",marginTop:6,fontStyle:"italic"}}>Only {orgOwnerUsername} can edit this list.</p>
            )}
          </div>
        );
      })()}

      {/* ── Matches ────────────────────────────────────────────── */}
      <React.Fragment>

        {/* Round header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <p style={{fontSize:10,fontWeight:700,color:"var(--text-faint)",textTransform:"uppercase",letterSpacing:1,margin:0}}>Current Round</p>
            <h2 style={{fontSize:18,fontWeight:900,color:"var(--text-primary)",margin:0}}>{roundLabel}</h2>
          </div>
          <button onClick={async()=>{
            setLoadingPairings(true);
            try { const d = await workerGet(`/pairings?slug=${encodeURIComponent(slug)}`); setPairings(d.pairings||[]); } catch(_){}
            finally { setLoadingPairings(false); }
          }} disabled={loadingPairings} style={{background:"none",border:"2px solid var(--border)",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,color:"var(--text-muted)",fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
            {loadingPairings?"…":"↻"}
          </button>
        </div>

        {/* Stats row */}
        {roundMatches.length > 0 && (() => {
          const judgedCount = roundMatches.filter(m => getLiveState(m) !== null).length;
          const doneCount = roundMatches.filter(m => m.state === "complete").length;
          const openCount = roundMatches.filter(m => m.state !== "complete").length;
          return (
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {[
                {label:"Total",val:roundMatches.length,color:"var(--text-secondary)"},
                {label:"Live",val:judgedCount,color:"#22C55E"},
                {label:"Waiting",val:openCount-judgedCount,color:"#F59E0B"},
                {label:"Done",val:doneCount,color:"var(--text-faint)"},
              ].map(s=>(
                <div key={s.label} style={{flex:1,padding:"8px 0",borderRadius:10,background:"var(--surface)",border:"1px solid var(--border)",textAlign:"center"}}>
                  <p style={{fontSize:18,fontWeight:900,color:s.color,margin:0}}>{s.val}</p>
                  <p style={{fontSize:9,color:"var(--text-faint)",fontWeight:700,margin:0,textTransform:"uppercase",letterSpacing:0.5}}>{s.label}</p>
                </div>
              ))}
            </div>
          );
        })()}

        {/* Match list */}
        {loadingPairings && !pairings && <p style={{color:"var(--text-muted)",fontSize:13}}>Loading matches…</p>}
        {pairingsError && (
          <div style={{textAlign:"center",padding:"24px 0"}}>
            <p style={{fontSize:13,color:"#EF4444",fontWeight:600,marginBottom:8}}>⚠ {pairingsError}</p>
            <p style={{fontSize:11,color:"var(--text-faint)"}}>Check that the slug is correct and the tournament is public on Challonge.</p>
          </div>
        )}

        {roundMatches.map(m => {
          const live = getLiveState(m);
          const done = m.state === "complete";
          const isShuffling = live && !!live.shuffling;
          const borderColor = live ? "#22C55E" : done ? "var(--border)" : "var(--border2)";
          const bgColor = live ? "#22C55E0A" : "var(--surface)";

          return (
            <div key={m.id} style={{borderRadius:12,marginBottom:8,border:`2px solid ${borderColor}`,background:bgColor,padding:"11px 13px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                    {live && !isShuffling && <><span className="live-dot"/><span style={{fontSize:9,fontWeight:800,color:"#22C55E",textTransform:"uppercase",letterSpacing:0.8}}>LIVE</span></>}
                    {isShuffling && <span style={{fontSize:9,fontWeight:800,color:"#F59E0B",textTransform:"uppercase",letterSpacing:0.8}}>⏱ SHUFFLE TIME</span>}
                    {done && <span style={{fontSize:9,fontWeight:700,color:"var(--text-faint)",textTransform:"uppercase",letterSpacing:0.8}}>Complete</span>}
                    {!live && !done && <span style={{fontSize:9,fontWeight:700,color:"#F59E0B",textTransform:"uppercase",letterSpacing:0.8}}>Waiting</span>}
                  </div>
                  <p style={{fontSize:14,fontWeight:800,color:"var(--text-primary)",margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {m.player1_name||"?"} <span style={{color:"var(--text-faint)",fontWeight:400}}>vs</span> {m.player2_name||"?"}
                  </p>
                  {live && !isShuffling && (
                    <p style={{fontSize:12,fontWeight:700,color:"#22C55E",margin:"3px 0 0"}}>
                      {(live.pts||[0,0])[0]} – {(live.pts||[0,0])[1]}
                      {live.judge && <span style={{fontSize:10,fontWeight:500,color:"var(--text-muted)",marginLeft:8}}>Judge: {live.judge}</span>}
                    </p>
                  )}
                  {isShuffling && live && live.judge && (
                    <p style={{fontSize:11,fontWeight:500,color:"var(--text-muted)",margin:"3px 0 0"}}>Judge: {live.judge}</p>
                  )}
                  {done && m.scores_csv && (
                    <p style={{fontSize:11,color:"var(--text-muted)",margin:"2px 0 0"}}>Final: {m.scores_csv}</p>
                  )}
                </div>
              </div>
            </div>
          );
        })}

        {pairings && roundMatches.length === 0 && (
          <div style={{textAlign:"center",padding:"40px 0",color:"var(--text-muted)"}}>
            <p style={{fontSize:32,marginBottom:12}}>🏁</p>
            <p style={{fontSize:14,fontWeight:700}}>No open matches found.</p>
            <p style={{fontSize:12,color:"var(--text-faint)"}}>All matches may be complete, or the round hasn't started yet.</p>
          </div>
        )}
      </React.Fragment>
      </div>

      {/* ── Ping notification modal (must be manually dismissed) ── */}
      {activePing && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 20px"}}>
          <div style={{background:"var(--surface)",borderRadius:18,width:"100%",maxWidth:360,boxShadow:"0 16px 48px rgba(0,0,0,0.5)",border:"3px solid #DC2626",overflow:"hidden"}}>
            {/* Red header */}
            <div style={{background:"#DC2626",padding:"14px 18px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:24}}>🚨</span>
              <div style={{flex:1}}>
                <p style={{fontSize:14,fontWeight:900,color:"#fff",margin:0}}>Judge Calling TO</p>
                {pings.length > 1 && <p style={{fontSize:10,color:"rgba(255,255,255,0.75)",margin:0}}>{pings.length - 1} more ping{pings.length > 2 ? "s" : ""} waiting</p>}
              </div>
            </div>
            {/* Ping details */}
            <div style={{padding:"16px 18px"}}>
              <div style={{background:"var(--surface2)",borderRadius:10,padding:"10px 12px",marginBottom:12,border:"1px solid var(--border)"}}>
                <p style={{fontSize:10,fontWeight:700,color:"var(--text-faint)",textTransform:"uppercase",letterSpacing:0.8,margin:"0 0 4px"}}>Match</p>
                <p style={{fontSize:15,fontWeight:900,color:"var(--text-primary)",margin:0}}>{activePing.p1||"?"} vs {activePing.p2||"?"}</p>
                {activePing.judge && <p style={{fontSize:11,color:"var(--text-muted)",margin:"3px 0 0"}}>Judge: {activePing.judge}</p>}
              </div>
              {activePing.comment && (
                <div style={{background:"#FEF3C7",borderRadius:10,padding:"10px 12px",marginBottom:12,border:"1px solid #FCD34D"}}>
                  <p style={{fontSize:10,fontWeight:700,color:"#92400E",textTransform:"uppercase",letterSpacing:0.8,margin:"0 0 4px"}}>Note from Judge</p>
                  <p style={{fontSize:13,color:"#78350F",margin:0,lineHeight:1.5}}>{activePing.comment}</p>
                </div>
              )}
              <p style={{fontSize:10,color:"var(--text-faint)",margin:"0 0 12px",textAlign:"right"}}>
                {new Date(activePing.sentAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
              </p>
              <button onClick={()=>dismissPing(activePing)} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"var(--surface3)",color:"var(--text-primary)",fontSize:13,fontWeight:900,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                ✕ Dismiss {pings.length > 1 ? `(${pings.length - 1} more)` : ""}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Org Tournament Select ────────────────────────────────────────── */
function OrgTournamentSelect({onSelect, onSwitchRole}) {
  // ── Auth state ────────────────────────────────────────────────────
  // On mount, check if there's already a valid session from this browser session.
  const [authStep, setAuthStep] = useState("checking"); // checking | login | verified | not_org
  const [orgUsername, setOrgUsername] = useState(null);
  const auth = useChallongeAuth();

  // On mount, try to reuse a session token if one was stored
  useEffect(() => {
    const token = sessionStorage.getItem("ncblast-auth-token");
    const user  = sessionStorage.getItem("ncblast-auth-user");
    if (token && user) {
      // Verify it's still an authorized org user
      fetch(`${OVERLAY_WORKER}/org/verify`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({token, username: user}), signal: AbortSignal.timeout(8000),
      }).then(r => r.json()).then(d => {
        if (d.ok) { setOrgUsername(d.username); setAuthStep("verified"); }
        else { sessionStorage.removeItem("ncblast-auth-token"); sessionStorage.removeItem("ncblast-auth-user"); setAuthStep("login"); }
      }).catch(() => setAuthStep("login"));
    } else {
      setAuthStep("login");
    }
  }, []);

  // When the OAuth flow completes, verify the user is on the org whitelist
  useEffect(() => {
    if (auth.state !== "done" || !auth.username) return;
    const token = sessionStorage.getItem("ncblast-auth-token");
    fetch(`${OVERLAY_WORKER}/org/verify`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({token, username: auth.username}), signal: AbortSignal.timeout(8000),
    }).then(r => r.json()).then(d => {
      if (d.ok) { setOrgUsername(d.username); setAuthStep("verified"); }
      else { setAuthStep("not_org"); }
    }).catch(() => { setAuthStep("not_org"); });
  }, [auth.state, auth.username]);

  // ── Tournament list state ─────────────────────────────────────────
  const [cachedList, setCachedList]     = useState([]);
  const [loadingList, setLoadingList]   = useState(false);
  const [linkInput, setLinkInput]       = useState("");
  const [loadingLink, setLoadingLink]   = useState(false);
  const [linkError, setLinkError]       = useState(null);
  const [displayName, setDisplayName]   = useState("");
  const [addStep, setAddStep]           = useState(null); // null | "name" | "adding"
  const [pendingSlug, setPendingSlug]   = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null); // slug | null
  const [deleting, setDeleting]         = useState(false);
  // Whitelist management
  const [whitelistPanel, setWhitelistPanel] = useState(false);
  const [whitelistData, setWhitelistData]   = useState(null);
  const [masterKeyInput, setMasterKeyInput] = useState("");
  const [wlError, setWlError]               = useState(null);
  const [wlLoading, setWlLoading]           = useState(false);
  const [newOrgInput, setNewOrgInput]       = useState("");

  const refreshList = async () => {
    setLoadingList(true);
    try { const d = await workerGet("/list"); setCachedList(d.tournaments || []); }
    catch(_) { setCachedList([]); }
    finally { setLoadingList(false); }
  };

  useEffect(() => { if (authStep === "verified") refreshList(); }, [authStep]);

  // ── Parse slug from Challonge URL ────────────────────────────────
  const parseSlug = (raw) => {
    let slug = raw.trim();
    try {
      const u = new URL(slug.startsWith("http") ? slug : "https://" + slug);
      const cleanPath = u.pathname.replace(/\/(participants|standings|teams|matches).*$/i, "");
      const parts = cleanPath.replace(/^\/|\/$/g, "").split("/").filter(Boolean);
      const subdomain = u.hostname.split(".")[0];
      const isCommunity = subdomain !== "challonge" && subdomain !== "www";
      const pathSlug = parts[parts.length - 1] || parts[0];
      slug = isCommunity ? `${subdomain}-${pathSlug}` : pathSlug;
    } catch(_) {}
    return slug;
  };

  const handleLinkSubmit = () => {
    setLinkError(null);
    const slug = parseSlug(linkInput);
    if (!slug) { setLinkError("Enter a valid Challonge link."); return; }
    setPendingSlug(slug);
    setDisplayName("");
    setAddStep("name");
  };

  const handleAddTournament = async () => {
    const name = displayName.trim();
    if (!name) { setLinkError("Enter a display name."); return; }
    setAddStep("adding"); setLinkError(null);
    const token = sessionStorage.getItem("ncblast-auth-token");
    try {
      const res = await fetch(`${OVERLAY_WORKER}/org/tournament/add`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ slug: pendingSlug, name, orgToken: token, username: sessionStorage.getItem("ncblast-auth-user") }),
        signal: AbortSignal.timeout(15000),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || `HTTP ${res.status}`);
      setAddStep(null); setLinkInput(""); setPendingSlug(null); setDisplayName("");
      await refreshList();
      onSelect(pendingSlug, name);
    } catch(e) { setLinkError("Couldn't add tournament: " + e.message); setAddStep("name"); }
  };

  const handleDelete = async (slug) => {
    setDeleting(true);
    const token = sessionStorage.getItem("ncblast-auth-token");
    try {
      const res = await fetch(`${OVERLAY_WORKER}/delete`, {
        method:"POST", headers:{"Content-Type":"application/json","X-Auth-Token":token},
        body: JSON.stringify({ slug }),
        signal: AbortSignal.timeout(10000),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || "Delete failed");
      setCachedList(prev => prev.filter(t => t.slug !== slug));
      setDeleteConfirm(null);
    } catch(e) { alert("Delete failed: " + e.message); }
    finally { setDeleting(false); }
  };

  // ── Whitelist management ─────────────────────────────────────────
  const loadWhitelist = async (key) => {
    setWlLoading(true); setWlError(null);
    try {
      const res = await fetch(`${OVERLAY_WORKER}/org/whitelist`, {
        headers:{"X-Master-Key": key}, signal: AbortSignal.timeout(8000),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Unauthorized");
      setWhitelistData(data.whitelist || []);
    } catch(e) { setWlError(e.message); setWhitelistData(null); }
    finally { setWlLoading(false); }
  };

  const handleWlAdd = async () => {
    const username = newOrgInput.trim().toLowerCase();
    if (!username) return;
    setWlLoading(true); setWlError(null);
    try {
      const res = await fetch(`${OVERLAY_WORKER}/org/whitelist/add`, {
        method:"POST", headers:{"Content-Type":"application/json","X-Master-Key":masterKeyInput},
        body: JSON.stringify({username}), signal: AbortSignal.timeout(8000),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || "Failed");
      setNewOrgInput("");
      await loadWhitelist(masterKeyInput);
    } catch(e) { setWlError(e.message); setWlLoading(false); }
  };

  const handleWlRemove = async (username) => {
    setWlLoading(true); setWlError(null);
    try {
      const res = await fetch(`${OVERLAY_WORKER}/org/whitelist/remove`, {
        method:"POST", headers:{"Content-Type":"application/json","X-Master-Key":masterKeyInput},
        body: JSON.stringify({username}), signal: AbortSignal.timeout(8000),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || "Failed");
      await loadWhitelist(masterKeyInput);
    } catch(e) { setWlError(e.message); setWlLoading(false); }
  };

  // ── Auth screens ──────────────────────────────────────────────────
  if (authStep === "checking") {
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
        <p style={{color:"var(--text-muted)",fontSize:14}}>Checking session…</p>
      </div>
    );
  }

  if (authStep === "login") {
    return (
      <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px",fontFamily:"'Outfit',sans-serif"}}>
        <div style={{width:"100%",maxWidth:340}}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:40,marginBottom:10}}>🔗</div>
            <h2 style={{fontSize:22,fontWeight:900,color:"var(--text-primary)",margin:"0 0 6px"}}>Organizer Login</h2>
            <p style={{fontSize:13,color:"var(--text-muted)",margin:0,lineHeight:1.5}}>Log in with your Challonge account to access Organizer View.</p>
          </div>
          {/* DIAGNOSTIC — shows exact state so we can debug */}
          <div style={{background:"#0F172A",borderRadius:10,padding:"10px 12px",marginBottom:14,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#94A3B8",lineHeight:1.8}}>
            <div>auth.state: <span style={{color:"#F59E0B"}}>{auth.state}</span></div>
            <div>auth.username: <span style={{color:"#F59E0B"}}>{String(auth.username)}</span></div>
            <div>auth.errorMsg: <span style={{color:"#EF4444"}}>{auth.errorMsg || "—"}</span></div>
          </div>
          {auth.state === "idle" && (
            <button onClick={auth.start} style={{
              width:"100%",padding:"18px 0",borderRadius:14,border:"none",
              background:"linear-gradient(135deg,#EA580C,#DC2626)",
              color:"#fff",fontSize:16,fontWeight:900,
              fontFamily:"'Outfit',sans-serif",cursor:"pointer",
              boxShadow:"0 8px 24px rgba(234,88,12,0.35)",marginBottom:14,
            }}>Log in with Challonge</button>
          )}
          {(auth.state === "navigating" || auth.state === "exchanging") && (
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{width:36,height:36,margin:"0 auto 12px",borderRadius:"50%",
                border:"3px solid var(--border2)",borderTopColor:"#EA580C",
                animation:"spin 1s linear infinite"}}/>
              <p style={{fontSize:13,color:"var(--text-muted)"}}>
                {auth.state === "navigating" ? "Opening Challonge…" : "Completing login…"}
              </p>
            </div>
          )}
          {auth.state === "confirm" && (
            <OrgConfirmUsername auth={auth} />
          )}
          {auth.state === "error" && (
            <div style={{marginBottom:14}}>
              <p style={{fontSize:13,color:"#EF4444",textAlign:"center",fontWeight:600,marginBottom:12}}>⚠ {auth.errorMsg}</p>
              <button onClick={auth.start} style={{
                width:"100%",padding:"14px 0",borderRadius:12,border:"none",
                background:"#EA580C",color:"#fff",fontSize:14,fontWeight:800,
                fontFamily:"'Outfit',sans-serif",cursor:"pointer",marginBottom:10,
              }}>Try Again</button>
            </div>
          )}
          {auth.state === "done" && (
            <p style={{fontSize:13,color:"#22C55E",textAlign:"center",fontWeight:700,marginBottom:14}}>✅ {auth.username} — verifying…</p>
          )}
          <button onClick={onSwitchRole} style={{
            width:"100%",padding:"12px 0",borderRadius:12,
            border:"2px solid var(--border)",background:"none",
            color:"var(--text-muted)",fontSize:13,fontWeight:700,
            fontFamily:"'Outfit',sans-serif",cursor:"pointer",
          }}>← Back</button>
        </div>
      </div>
    );
  }

  if (authStep === "not_org") {
    return (
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",padding:"32px 24px",fontFamily:"'Outfit',sans-serif"}}>
        <div style={{fontSize:40,marginBottom:12}}>🚫</div>
        <h2 style={{fontSize:20,fontWeight:900,color:"var(--text-primary)",margin:"0 0 8px",textAlign:"center"}}>Not Authorized</h2>
        <p style={{fontSize:13,color:"var(--text-muted)",textAlign:"center",lineHeight:1.6,maxWidth:300,marginBottom:24}}>
          Your Challonge account (<strong style={{color:"var(--text-primary)"}}>{auth.username}</strong>) is not on the organizer list. Ask a dev team member to add you.
        </p>
        <button onClick={() => { auth.reset(); setAuthStep("login"); }} style={{padding:"13px 28px",borderRadius:12,border:"none",background:"#EA580C",color:"#fff",fontSize:14,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer",marginBottom:12}}>
          Try a Different Account
        </button>
        <button onClick={onSwitchRole} style={{padding:"10px 28px",borderRadius:12,border:"2px solid var(--border)",background:"none",color:"var(--text-muted)",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
          ← Back
        </button>
      </div>
    );
  }

  // ── "Name tournament" modal ───────────────────────────────────────
  if (addStep === "name" || addStep === "adding") {
    return (
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",padding:"32px 24px",fontFamily:"'Outfit',sans-serif"}}>
        <div style={{width:"100%",maxWidth:340}}>
          <h2 style={{fontSize:20,fontWeight:900,color:"var(--text-primary)",margin:"0 0 6px"}}>Name This Tournament</h2>
          <p style={{fontSize:12,color:"var(--text-muted)",marginBottom:6,lineHeight:1.5}}>Slug: <code style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#EA580C"}}>{pendingSlug}</code></p>
          <p style={{fontSize:12,color:"var(--text-muted)",marginBottom:16,lineHeight:1.5}}>This name is shown to judges in the app.</p>
          <input
            autoFocus
            value={displayName}
            onChange={e=>setDisplayName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleAddTournament()}
            placeholder="e.g. NorCal Spring Open 2025"
            style={{width:"100%",padding:"11px 13px",borderRadius:10,border:`2px solid ${linkError?"#EF4444":"var(--border2)"}`,background:"var(--surface2)",color:"var(--text-primary)",fontSize:14,fontFamily:"'Outfit',sans-serif",outline:"none",marginBottom:8,boxSizing:"border-box"}}
          />
          {linkError && <p style={{fontSize:11,color:"#EF4444",marginBottom:8}}>{linkError}</p>}
          <button onClick={handleAddTournament} disabled={!displayName.trim()||addStep==="adding"}
            style={{width:"100%",padding:"13px 0",borderRadius:11,border:"none",background:displayName.trim()&&addStep!=="adding"?"#EA580C":"var(--surface3)",color:displayName.trim()&&addStep!=="adding"?"#fff":"var(--text-faint)",fontSize:14,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:displayName.trim()&&addStep!=="adding"?"pointer":"not-allowed",marginBottom:10}}>
            {addStep==="adding"?"Adding…":"Add to NC BLAST →"}
          </button>
          <button onClick={()=>{setAddStep(null);setLinkError(null);}} style={{width:"100%",padding:"10px 0",borderRadius:10,border:"2px solid var(--border)",background:"none",color:"var(--text-muted)",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
            Cancel
          </button>
        </div>
      </div>
    );
  }

  // ── Main select screen ────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",fontFamily:"'Outfit',sans-serif",display:"flex",flexDirection:"column"}}>

      {/* Delete confirm modal */}
      {deleteConfirm && (
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.8)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
          <div style={{background:"var(--surface)",borderRadius:18,padding:"24px 20px",maxWidth:320,width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,0.4)",border:"2px solid #EF4444"}}>
            <p style={{fontSize:16,fontWeight:900,color:"var(--text-primary)",marginBottom:8}}>Delete Tournament?</p>
            <p style={{fontSize:13,color:"var(--text-muted)",marginBottom:20,lineHeight:1.5}}>This removes <strong>{cachedList.find(t=>t.slug===deleteConfirm)?.name||deleteConfirm}</strong> from the NC BLAST cache. Active judges will be notified.</p>
            <button onClick={()=>handleDelete(deleteConfirm)} disabled={deleting}
              style={{width:"100%",padding:"13px 0",borderRadius:11,border:"none",background:"#EF4444",color:"#fff",fontSize:14,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:deleting?"not-allowed":"pointer",marginBottom:10}}>
              {deleting?"Deleting…":"Yes, Delete"}
            </button>
            <button onClick={()=>setDeleteConfirm(null)} style={{width:"100%",padding:"10px 0",borderRadius:10,border:"2px solid var(--border)",background:"none",color:"var(--text-muted)",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
              Cancel
            </button>
          </div>
        </div>
      )}

      {/* Whitelist manager modal */}
      {whitelistPanel && (
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.85)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 20px",overflowY:"auto"}}>
          <div style={{background:"var(--surface)",borderRadius:18,width:"100%",maxWidth:360,padding:"24px 20px",boxShadow:"0 24px 64px rgba(0,0,0,0.4)",border:"1px solid var(--border)"}}>
            <p style={{fontSize:16,fontWeight:900,color:"var(--text-primary)",marginBottom:4}}>Organizer Whitelist</p>
            <p style={{fontSize:12,color:"var(--text-muted)",marginBottom:14,lineHeight:1.5}}>Paste the master key to view and manage who can access Organizer View.</p>
            {!whitelistData ? (
              <>
                <input
                  type="password"
                  value={masterKeyInput}
                  onChange={e=>setMasterKeyInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&loadWhitelist(masterKeyInput)}
                  placeholder="Master Key"
                  style={{width:"100%",padding:"11px 13px",borderRadius:10,border:`2px solid ${wlError?"#EF4444":"var(--border2)"}`,background:"var(--surface2)",color:"var(--text-primary)",fontSize:14,fontFamily:"'JetBrains Mono',monospace",outline:"none",marginBottom:8,boxSizing:"border-box"}}
                />
                {wlError && <p style={{fontSize:11,color:"#EF4444",marginBottom:8}}>{wlError}</p>}
                <button onClick={()=>loadWhitelist(masterKeyInput)} disabled={!masterKeyInput.trim()||wlLoading}
                  style={{width:"100%",padding:"12px 0",borderRadius:11,border:"none",background:"#EA580C",color:"#fff",fontSize:14,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer",marginBottom:10}}>

                  {whitelistData.map(e => (
                    <div key={e.username} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",borderRadius:8,background:"var(--surface2)",marginBottom:6,border:"1px solid var(--border)"}}>
                      <span style={{fontSize:13,fontWeight:700,color:"var(--text-primary)"}}>{e.username}</span>
                      <button onClick={()=>handleWlRemove(e.username)} disabled={wlLoading}
                        style={{fontSize:11,fontWeight:700,color:"#EF4444",background:"none",border:"none",cursor:"pointer",padding:"2px 6px"}}>
                        Remove

                  ))}

                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  <input
                    value={newOrgInput}
                    onChange={e=>setNewOrgInput(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&handleWlAdd()}
                    placeholder="challonge username"
                    style={{flex:1,padding:"9px 12px",borderRadius:10,border:"1px solid var(--border2)",background:"var(--input-bg)",color:"var(--text-primary)",fontSize:13,fontFamily:"'Outfit',sans-serif",outline:"none"}}
                  />
                  <button onClick={handleWlAdd} disabled={!newOrgInput.trim()||wlLoading}
                    style={{padding:"0 14px",borderRadius:10,border:"none",background:"#22C55E",color:"#fff",fontSize:13,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                    Add
                  </button>
                </div>
                {wlError && <p style={{fontSize:11,color:"#EF4444",marginBottom:8}}>{wlError}</p>}
              </>
            )}
            <button onClick={()=>{setWhitelistPanel(false);setMasterKeyInput("");setWhitelistData(null);setWlError(null);setNewOrgInput("");}}
              style={{width:"100%",padding:"10px 0",borderRadius:10,border:"2px solid var(--border)",background:"none",color:"var(--text-muted)",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>

          </div>
        </div>
      )}

      {/* Header */}
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onSwitchRole} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",lineHeight:1,padding:"2px 4px"}}>←</button>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontSize:11,fontWeight:700,color:"var(--text-faint)",textTransform:"uppercase",letterSpacing:0.8,margin:0}}>Organizer View</p>
          <p style={{fontSize:14,fontWeight:900,color:"var(--text-primary)",margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            Select Tournament <span style={{fontSize:11,color:"#EA580C",fontWeight:700}}>({orgUsername})</span>
          </p>
        </div>
        <button onClick={()=>setWhitelistPanel(true)} title="Manage organizer access"
          style={{background:"none",border:"1px solid var(--border)",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,color:"var(--text-muted)",fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
          🔑 Access
        </button>
      </div>

      <div style={{flex:1,padding:"16px 14px 32px"}}>
        {/* Add tournament */}
        <div style={{background:"var(--surface)",borderRadius:14,padding:"14px",marginBottom:20,border:"1px solid var(--border)"}}>
          <p style={{fontSize:12,fontWeight:800,color:"var(--text-primary)",marginBottom:4}}>Load from Challonge link</p>
          <p style={{fontSize:11,color:"var(--text-muted)",marginBottom:8}}>Logged in as <strong>{orgUsername}</strong> · Will be set as organizer</p>

          <p style={{fontSize:12,color:"var(--text-faint)"}}>No cached tournaments. Use the link field above to add one.</p>
        )}
        {cachedList.map(t => (
          <div key={t.slug} style={{display:"flex",gap:8,marginBottom:8,alignItems:"stretch"}}>
            <button onClick={()=>onSelect(t.slug, t.name||t.slug)}
              style={{flex:1,padding:"12px 14px",borderRadius:12,border:"1px solid var(--border)",background:"var(--surface)",cursor:"pointer",textAlign:"left",fontFamily:"'Outfit',sans-serif"}}>
              <p style={{fontSize:14,fontWeight:800,color:"var(--text-primary)",margin:0}}>{t.name||t.slug}</p>
              <p style={{fontSize:10,color:"var(--text-faint)",margin:"2px 0 0"}}>{t.slug}{t.orgUsername ? ` · org: ${t.orgUsername}` : ""}</p>
            </button>

              style={{padding:"0 14px",borderRadius:12,border:"1px solid #EF444440",background:"#EF444408",cursor:"pointer",color:"#EF4444",fontFamily:"'Outfit',sans-serif",fontSize:12,fontWeight:700,flexShrink:0}}>
              Delete
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── Match History Tab ───────────────────────────────────────── */
function HistoryTab({slug, myName}){
  const [pairings, setPairings] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [expanded, setExpanded] = useState({}); // matchId -> true/false
  const [battleLogs, setBattleLogs] = useState({}); // matchId -> {loading, data, error}

  const load = useCallback(async()=>{
    if(!slug||!myName){setError(!slug?"No tournament loaded.":"Select your name to view history.");return;}
    setLoading(true); setError(null);
    try {
      const data = await workerGet(`/pairings?slug=${encodeURIComponent(slug)}`);
      setPairings(data.pairings||[]);
    } catch(e){ setError("Couldn't load match history."); }
    finally{ setLoading(false); }
  },[slug,myName]);

  useEffect(()=>{ load(); },[load]);

  const myMatches = (pairings||[]).filter(m=>{
    if(!myName) return false;
    return (m.player1_name&&m.player1_name.toLowerCase()===myName.toLowerCase()) ||
           (m.player2_name&&m.player2_name.toLowerCase()===myName.toLowerCase());
  }).filter(m=>m.state==="complete").sort((a,b)=>(a.round||0)-(b.round||0));

  const wins = myMatches.filter(m=>{
    const isP1 = myName&&m.player1_name&&m.player1_name.toLowerCase()===myName.toLowerCase();
    const myId = isP1 ? m.player1_id : m.player2_id;
    return String(m.winner_id)===String(myId);
  }).length;
  const losses = myMatches.length - wins;

  const toggleExpand = async (m) => {
    const id = m.id;
    const nowExpanded = !expanded[id];
    setExpanded(prev=>({...prev,[id]:nowExpanded}));
    // If opening and not yet fetched, fetch the battle log
    if(nowExpanded && !battleLogs[id]){
      setBattleLogs(prev=>({...prev,[id]:{loading:true,data:null,error:null}}));
      try {
        const params = new URLSearchParams();
        if(m.id) params.set("matchId", m.id);
        if(m.player1_name) params.set("p1", m.player1_name);
        if(m.player2_name) params.set("p2", m.player2_name);
        // Use raw fetch instead of workerGet so we can handle 404 gracefully
        const res = await fetch(`${OVERLAY_WORKER}/matchlog?${params.toString()}`, {signal: AbortSignal.timeout(8000)});
        if(res.ok){
          const data = await res.json();
          setBattleLogs(prev=>({...prev,[id]:{loading:false,data:data.found?data:null,error:null}}));
        } else {
          // 404 or other error from worker — treat as no log available
          setBattleLogs(prev=>({...prev,[id]:{loading:false,data:null,error:null}}));
        }
      } catch(e){
        // Network error — treat as no log rather than showing a scary error
        setBattleLogs(prev=>({...prev,[id]:{loading:false,data:null,error:null}}));
      }
    }
  };

  if(!slug||!myName) return (
    <div style={{padding:"32px 16px",textAlign:"center",color:"var(--text-muted)"}}>
      {!slug?"No tournament loaded.":"Select your name to view your match history."}
    </div>
  );

  return (
    <div style={{padding:"12px 14px",paddingBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{fontSize:18,fontWeight:900,margin:0}}>My Matches</h2>
        <button onClick={load} disabled={loading} style={{background:"none",border:"2px solid var(--border)",borderRadius:8,padding:"5px 10px",color:"var(--text-muted)",fontSize:11,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
          {loading?"...":"↻"}
        </button>
      </div>

      {myMatches.length>0&&(
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          {[{label:"Wins",val:wins,color:"#22C55E"},{label:"Losses",val:losses,color:"#EF4444"},{label:"Matches",val:myMatches.length,color:"var(--text-secondary)"}].map(s=>(
            <div key={s.label} style={{flex:1,padding:"10px 0",borderRadius:10,background:"var(--surface2)",border:"1px solid var(--border)",textAlign:"center"}}>
              <p style={{fontSize:22,fontWeight:900,color:s.color,margin:0}}>{s.val}</p>
              <p style={{fontSize:10,color:"var(--text-faint)",fontWeight:600,margin:0}}>{s.label}</p>
            </div>
          ))}
        </div>
      )}

      {error&&<p style={{color:"#EF4444",fontSize:13,marginBottom:12}}>{error}</p>}
      {loading&&!pairings&&<p style={{color:"var(--text-muted)",fontSize:13}}>Loading…</p>}

      {myMatches.map((m,i)=>{
        const isP1 = myName&&m.player1_name&&m.player1_name.toLowerCase()===myName.toLowerCase();
        const opponent = isP1 ? m.player2_name : m.player1_name;
        const myId = isP1 ? m.player1_id : m.player2_id;
        const won = String(m.winner_id)===String(myId);
        const roundLabel = m.round<0 ? `Top Cut R${Math.abs(m.round)}` : `Swiss R${m.round}`;
        const isOpen = !!expanded[m.id];
        const logEntry = battleLogs[m.id];

        return (
          <div key={m.id} className="fade-in" style={{borderRadius:12,marginBottom:8,
            border:`2px solid ${won?"#22C55E40":"#EF444430"}`,
            background:won?"#22C55E08":"#EF444408",overflow:"hidden"}}>

            {/* Match summary row — tap to expand */}
            <button onClick={()=>toggleExpand(m)}
              style={{display:"block",width:"100%",padding:"12px 14px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left",fontFamily:"'Outfit',sans-serif"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:10,fontWeight:700,color:"var(--text-faint)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>{roundLabel}</p>
                  <p style={{fontSize:14,fontWeight:800,color:"var(--text-primary)",margin:0}}>
                    <span style={{color:won?"#22C55E":"#EF4444",marginRight:6}}>{won?"W":"L"}</span>vs {opponent||"Unknown"}
                  </p>
                  {m.scores_csv&&<p style={{fontSize:11,color:"var(--text-muted)",marginTop:3}}>Score: {m.scores_csv}</p>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,marginLeft:8}}>
                  <span style={{fontSize:22}}>{won?"🏆":"💢"}</span>
                  <span style={{fontSize:14,color:"var(--text-faint)",lineHeight:1}}>{isOpen?"▲":"▼"}</span>
                </div>
              </div>
            </button>

            {/* Expanded battle log */}
            {isOpen&&(
              <div style={{borderTop:`1px solid ${won?"#22C55E30":"#EF444430"}`,padding:"10px 14px 12px"}}>
                {logEntry?.loading&&(
                  <p style={{fontSize:12,color:"var(--text-faint)",margin:0}}>Loading battle log…</p>
                )}
                {logEntry?.error&&(
                  <p style={{fontSize:12,color:"#EF4444",margin:0}}>{logEntry.error}</p>
                )}
                {logEntry&&!logEntry.loading&&!logEntry.data&&!logEntry.error&&(
                  <p style={{fontSize:12,color:"var(--text-faint)",margin:0,lineHeight:1.5}}>
                    No battle log available — this match wasn't scored through NC BLAST.
                  </p>
                )}
                {logEntry?.data?.comboHistory?.length>0&&(
                  <div>
                    <p style={{fontSize:9,fontWeight:800,color:"var(--text-faint)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>Battle Log</p>
                    {logEntry.data.comboHistory.map((h,bi)=>{
                      const meta = FINISH_META[h.typeName]||FINISH_META[h.type]||{emoji:"🌀",color:"var(--text-muted)",label:h.typeName||"?"};
                      const isMyBattle = myName&&h.scorer&&h.scorer.toLowerCase()===myName.toLowerCase();
                      return (
                        <div key={bi} style={{
                          display:"flex",alignItems:"center",gap:8,
                          padding:"7px 0",
                          borderBottom:bi<logEntry.data.comboHistory.length-1?"1px solid var(--border)":"none",
                        }}>
                          <span style={{fontSize:16,flexShrink:0,width:22,textAlign:"center"}}>{meta.emoji}</span>
                          <div style={{flex:1,minWidth:0}}>
                            <p style={{fontSize:12,fontWeight:700,color:isMyBattle?"var(--accent2)":"var(--text-primary)",margin:0}}>
                              {h.scorer||"?"}
                              <span style={{fontSize:11,fontWeight:500,color:"var(--text-muted)",marginLeft:5}}>
                                {meta.label} <span style={{color:"#22C55E",fontWeight:800}}>+{h.points}</span>
                              </span>
                            </p>
                            {h.winnerCombo&&<p style={{fontSize:10,color:"var(--text-faint)",margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.winnerCombo}</p>}
                          </div>
                          {h.set>1&&<span style={{fontSize:9,fontWeight:700,color:"var(--text-faint)",flexShrink:0}}>S{h.set}</span>}
                        </div>
                      );
                    })}
                    {logEntry.data.judge&&(
                      <p style={{fontSize:10,color:"var(--text-faint)",marginTop:8,margin:0}}>Judged by {logEntry.data.judge}</p>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}

      {pairings&&myMatches.length===0&&(
        <div style={{textAlign:"center",padding:"32px 0",color:"var(--text-muted)"}}>
          <p style={{fontSize:32,marginBottom:8}}>⏳</p>
          <p style={{fontSize:14,fontWeight:600}}>No completed matches yet</p>
          <p style={{fontSize:12,marginTop:4}}>Your results will appear here as matches finish.</p>
        </div>
      )}
    </div>
  );
}

/* ─── Name Picker ─────────────────────────────────────────────── */
function NamePicker({participants, onSelect, currentName}){
  const [search, setSearch] = useState("");
  const filtered = participants.filter(n=>n.toLowerCase().includes(search.toLowerCase()));

  return (
    <div style={{padding:"16px 14px"}}>
      <h2 style={{fontSize:18,fontWeight:900,marginBottom:4}}>Who are you?</h2>
      <p style={{fontSize:12,color:"var(--text-muted)",marginBottom:12}}>Select your name from the tournament roster.</p>
      <input value={search} onChange={e=>setSearch(e.target.value)}
        placeholder="Search your name..."
        style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"2px solid var(--border2)",background:"var(--surface2)",color:"var(--text-primary)",fontSize:13,fontFamily:"'Outfit',sans-serif",outline:"none",marginBottom:12}}/>
      <div style={{display:"flex",flexDirection:"column",gap:7,maxHeight:320,overflowY:"auto"}}>
        {filtered.map(n=>(
          <button key={n} onClick={()=>onSelect(n)}
            style={{padding:"12px 14px",borderRadius:11,border:`2px solid ${currentName===n?"var(--accent)":"var(--border)"}`,
              background:currentName===n?"#EA580C15":"var(--surface2)",
              color:currentName===n?"var(--accent2)":"var(--text-primary)",
              fontSize:14,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer",textAlign:"left"}}>
            {currentName===n&&<span style={{marginRight:6}}>✓</span>}{n}
          </button>
        ))}
        {filtered.length===0&&<p style={{color:"var(--text-faint)",fontSize:13}}>No results.</p>}
      </div>
    </div>
  );
}

/* ─── Tournament Loader ───────────────────────────────────────── */
function TournamentLoader({onLoaded, onSwitchRole}){
  const [cachedList, setCachedList] = useState([]);
  const [loadingList, setLoadingList] = useState(true);
  const [loadingSlug, setLoadingSlug] = useState(null);
  const [loadError, setLoadError] = useState(null);

  useEffect(() => {
    workerGet("/list").then(d => setCachedList(d.tournaments||[])).catch(()=>{}).finally(()=>setLoadingList(false));
  }, []);

  const handleSelect = async (t) => {
    setLoadingSlug(t.slug); setLoadError(null);
    try {
      const data = await workerGet(`/?slug=${encodeURIComponent(t.slug)}`);
      const extractP = (p) => p.participant || p;
      const participants = (data.participants||[]).map(p=>(extractP(p).display_name||extractP(p).username||extractP(p).name||"").trim()).filter(Boolean);
      if(!participants.length) throw new Error("No participants found for this event.");
      onLoaded(t.slug, participants);
    } catch(e) { setLoadError(e.message||"Failed to load."); }
    finally { setLoadingSlug(null); }
  };

  const refresh = () => {
    setCachedList([]); setLoadingList(true); setLoadError(null);
    workerGet("/list").then(d => setCachedList(d.tournaments||[])).catch(()=>{}).finally(()=>setLoadingList(false));
  };

  return (
    <div style={{padding:"20px 16px"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:40,marginBottom:8}}>⚔️</div>

      <div style={{background:"var(--surface)",borderRadius:16,padding:"18px 16px",border:"1px solid var(--border)",marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <p style={{fontSize:14,fontWeight:800,margin:0}}>Join Your Tournament</p>
          <button onClick={refresh} disabled={loadingList}
            style={{background:"none",border:"1px solid var(--border)",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,color:"var(--text-muted)",fontFamily:"'Outfit',sans-serif",cursor:loadingList?"not-allowed":"pointer",opacity:loadingList?0.5:1}}>
            {loadingList?"…":"↻ Refresh"}
          </button>
        </div>
        <p style={{fontSize:12,color:"var(--text-muted)",marginBottom:12,lineHeight:1.5}}>Select today's event from the list below.</p>
        {loadingList && <p style={{fontSize:13,color:"var(--text-muted)",textAlign:"center",padding:"12px 0"}}>⏳ Loading events…</p>}
        {!loadingList && cachedList.length === 0 && (

          </p>

        {loadError && <p style={{fontSize:12,color:"#EF4444",fontWeight:600,marginBottom:8}}>{loadError}</p>}
        {cachedList.map(t => (
          <button key={t.slug} onClick={()=>!loadingSlug&&handleSelect(t)}
            style={{display:"block",width:"100%",padding:"13px 14px",borderRadius:12,border:"1px solid var(--border)",background:loadingSlug===t.slug?"var(--surface3)":"var(--surface2)",cursor:loadingSlug?"not-allowed":"pointer",textAlign:"left",fontFamily:"'Outfit',sans-serif",marginBottom:8,opacity:loadingSlug&&loadingSlug!==t.slug?0.5:1}}>

function BeyJudgeApp() {
  const sc = useScale();
  S = makeS(sc);
  const [dark,setDark] = useState(()=>{
    try{return localStorage.getItem("ncblast-dark")==="1";}catch{return false;}
  });
  const toggleDark = () => setDark(d=>{
    const next=!d;
    try{localStorage.setItem("ncblast-dark",next?"1":"0");}catch{}
    return next;
  });
  useEffect(()=>{
    document.body.classList.toggle("dark",dark);
  },[dark]);

  // Role — restore from sessionStorage if we just came back from OAuth redirect
  const [role,setRole] = useState(() => {
    try { return sessionStorage.getItem("ncblast-pending-role") || null; } catch(_) { return null; }
  });
  const chooseRole = (r) => {
    setRole(r);
    try { sessionStorage.setItem("ncblast-pending-role", r); } catch(_) {}
  };

  // All judge-side state declared unconditionally (React rules require this)
  const [screen,setScreen] = useState("format");
  const [config,setConfig] = useState({pts:4,bo:3,tm:false,tournamentName:""});
  const [parts,setParts] = useState({blades:[],ratchets:[],bits:[]});
  const [players,setPlayers] = useState([]);
  const [libOpen,setLibOpen] = useState(false);
  const [judge,setJudge] = useState(()=>{ try{return localStorage.getItem(KEYS.lastJudge)||"";}catch{return "";} });
  const [sharedJudges,setSharedJudges] = useState(null); // null | { judgeA:string, judgeB:string }
  const [sheetsStatus,setSheetsStatus] = useState(null);
  const [challongeSlug,setChallongeSlug] = useState("");
  const [challongeParticipants,setChallongeParticipants] = useState({});
  const [judgeEventDeleted,setJudgeEventDeleted] = useState(false);
  const judgeDeletionRef = useRef(null);

  useEffect(()=>{
    if(!challongeSlug) return;
    const check = async () => {
      try {
        const res = await fetch(`${OVERLAY_WORKER}/list`,{signal:AbortSignal.timeout(6000)});
        if(!res.ok) return;
        const data = await res.json();
        const slugs = (data.tournaments||[]).map(t=>t.slug);
        if(!slugs.includes(challongeSlug)) setJudgeEventDeleted(true);
      } catch(_){}
    };
    judgeDeletionRef.current = setInterval(check, 20000);
    return ()=>clearInterval(judgeDeletionRef.current);
  },[challongeSlug]);

  useEffect(()=>{
    const saved=sGet(KEYS.parts,{});
    const merged=mergeWithDefaults(saved);
    setParts(merged); sSave(KEYS.parts,merged);
    setPlayers(sGet(KEYS.players,[]));
    const savedMap = sGet(KEYS.challongeMap, {});
    if(savedMap.slug) setChallongeSlug(savedMap.slug);
    if(savedMap.participants) setChallongeParticipants(savedMap.participants);
  },[]);

  const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzvb5LkqMDXaMVJNFNQSf7dsUJK_0vbTfQ4gRRISGsRWg4mINvawLROxn0SaPqJ5o9E/exec";

  // Download CSV to device — always available, never sends to sheets
  const handleDownloadCSV = (roundLog,meta) => {
    let csv="Round,Set,Shuffle,Judge,Tournament,Winner,WinnerCombo,FinishType,Points,Penalty,P1,P1Side,P1Score,P1Combo,P2,P2Side,P2Score,P2Combo,Timestamp\n";
    roundLog.forEach(r=>{csv+=`${r.round},${r.set},${r.shuffle},"${r.judge||""}","${meta.config?.tournamentName||""}","${r.scorer}","${r.winnerCombo}",${r.type},${r.points},${r.penalty?1:0},"${r.p1Name}",${r.p1Side||""},"${r.p1Score}","${comboStr(r.p1Combo)}","${r.p2Name}",${r.p2Side||""},"${r.p2Score}","${comboStr(r.p2Combo)}",${r.time}\n`;});
    const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`ncblast_${meta.p1||"p1"}_vs_${meta.p2||"p2"}_${new Date().toISOString().slice(0,10)}.csv`; a.click(); URL.revokeObjectURL(url);
  };

  // Send to Google Sheets only — no CSV download
  const handleSendSheets = async (roundLog,meta) => {
    // Sheet 1: existing summary rows
    const rows = roundLog.map(r=>[
      r.time,
      r.judge||"",
      meta.config?.tournamentName||"",
      `${r.p1Name} vs ${r.p2Name}`,
      r.p1Name, r.p1Side||"", r.p2Name, r.p2Side||"",
      r.set, r.shuffle, r.round,
      r.scorer, r.winnerCombo,
      r.typeName, r.points,
      r.penalty?1:0,
      r.p1Score, r.p2Score,
      comboStr(r.p1Combo), comboStr(r.p2Combo)
    ]);

    // Sheet 2: one row per battle with specific battle-level detail
    const battleRows = roundLog.map(r=>{
      // Format time as PST XX:XXam/pm
      const d = new Date(r.time);
      const pst = new Date(d.toLocaleString("en-US",{timeZone:"America/Los_Angeles"}));
      const h = pst.getHours(); const m = pst.getMinutes();
      const ampm = h>=12?"pm":"am";
      const h12 = h%12||12;
      const mm = String(m).padStart(2,"0");
      const mo = String(pst.getMonth()+1).padStart(2,"0");
      const dy = String(pst.getDate()).padStart(2,"0");
      const yr = pst.getFullYear();
      const dateTime = `${mo}/${dy}/${yr} ${h12}:${mm}${ampm}`;

      // Win condition: e.g. "XTR+3", "OVR+2", "OF+2", "LER+1"
      const winCondition = r.penalty
        ? `${r.type===("OF2")||r.type===("OF3")?"OF":"LER"}+${r.points}`
        : `${r.type}+${r.points}`;

      const winnerIsP1 = r.scorerIdx===0;
      const winnerName = winnerIsP1 ? r.p1Name : r.p2Name;
      const loserName  = winnerIsP1 ? r.p2Name : r.p1Name;
      const winnerSide = winnerIsP1 ? (r.p1Side||"") : (r.p2Side||"");
      const loserSide  = winnerIsP1 ? (r.p2Side||"") : (r.p1Side||"");
      const winnerCombo = r.winnerCombo;
      const loserCombo  = winnerIsP1 ? comboStr(r.p2Combo) : comboStr(r.p1Combo);

      return [
        dateTime,
        r.judge||"",
        r.p1Name, r.p1Side||"", comboStr(r.p1Combo),
        r.p2Name, r.p2Side||"", comboStr(r.p2Combo),
        winnerName, winnerCombo,
        winCondition,
        loserCombo, loserName
      ];
    });

    try {
      const resp = await fetch(SHEETS_URL, {
        method:"POST",
        body: JSON.stringify({rows, battleRows}),
      });
      const result = await resp.json();
      setSheetsStatus(result.status==="ok"?"success":"error");
    } catch(err) {
      setSheetsStatus("error");
    }
  };


  // Branch on role in the render — no early returns before hooks
  if(!role) return <RolePicker onSelect={chooseRole} judge={judge} sharedJudges={sharedJudges} onLogout={()=>{
    setJudge(""); setSharedJudges(null);
    setChallongeSlug(""); setChallongeParticipants({});
    setConfig(c=>({...c,tournamentName:""}));
    sSave(KEYS.challongeMap,{});
    try{sessionStorage.removeItem("ncblast-auth-token");sessionStorage.removeItem("ncblast-auth-user");}catch{}
  }}/>;
  if(role==="player") return <PlayerApp onSwitchRole={()=>chooseRole(null)}/>;
  if(role==="org") return <OrgApp onSwitchRole={()=>chooseRole(null)}/>;

  return (
    <div style={{background:"var(--bg)",minHeight:"100vh",fontFamily:"'Outfit',sans-serif"}}>
      {libOpen&&<LibraryManager parts={parts} setParts={setParts} onClose={()=>setLibOpen(false)}/>}
      {judgeEventDeleted&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.85)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
          <div style={{background:"var(--surface)",borderRadius:20,padding:"28px 22px",maxWidth:320,width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,0.4)",border:"2px solid #EF4444",textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
            <p style={{fontSize:17,fontWeight:900,color:"var(--text-primary)",marginBottom:8}}>Event Removed</p>
            <p style={{fontSize:13,color:"var(--text-secondary)",marginBottom:22,lineHeight:1.5}}>This tournament has been removed from the NC BLAST cache by the organizer.</p>
            <button onClick={()=>{setJudgeEventDeleted(false);setChallongeSlug("");setChallongeParticipants({});sSave(KEYS.challongeMap,{});setPlayers([]);sSave(KEYS.players,[]);setScreen("format");}}
              style={{width:"100%",padding:"13px 0",borderRadius:12,border:"none",background:"#EA580C",color:"#fff",fontSize:15,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
              Back to Main Menu
            </button>
          </div>
        </div>
      )}
      {screen==="format"&&<FormatScreen config={config} setConfig={setConfig} parts={parts} onNext={()=>setScreen("players")} onOpenLib={()=>setLibOpen(true)} dark={dark} toggleDark={toggleDark} onSwitchRole={()=>chooseRole(null)} challongeSlug={challongeSlug} onChallongeImport={(slug,pmap,names)=>{setJudgeEventDeleted(false);setChallongeSlug(slug);setChallongeParticipants(pmap);sSave(KEYS.challongeMap,{slug,participants:pmap});if(names&&names.length){const fresh=[...new Set(names)];setPlayers(fresh);sSave(KEYS.players,fresh);}}} onJudgeVerified={(payload)=>{
        if (payload && typeof payload === "object" && payload.mode === "shared") {
          setSharedJudges({ judgeA: payload.judgeA, judgeB: payload.judgeB });
          setJudge(""); // will be chosen per-match
          try{localStorage.setItem(KEYS.lastJudge, payload.judgeA);}catch{}
        } else {
          setSharedJudges(null);
          setJudge(payload||"");
          try{localStorage.setItem(KEYS.lastJudge, payload||"");}catch{}
        }
      }}/>}
      {screen==="players"&&<PlayersScreen players={players} setPlayers={setPlayers} onNext={()=>setScreen("match")} onBack={()=>setScreen("format")} toggleDark={toggleDark} dark={dark} onChallongeImport={(slug,pmap)=>{setChallongeSlug(slug);setChallongeParticipants(pmap);sSave(KEYS.challongeMap,{slug,participants:pmap});}} tournamentMode={config.tm}/>}
      {screen==="match"&&<MatchScreen config={config} parts={parts} players={players} judge={judge} setJudge={setJudge} sharedJudges={sharedJudges} sheetsStatus={sheetsStatus} setSheetsStatus={setSheetsStatus} onBack={()=>setScreen("players")} onMainMenu={()=>setScreen("format")} onDownloadCSV={handleDownloadCSV} onSendSheets={handleSendSheets} onOpenLib={()=>setLibOpen(true)} dark={dark} toggleDark={toggleDark} challongeSlug={challongeSlug} challongeParticipants={challongeParticipants}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BeyJudgeApp/>);
</script>
</body>
</html>
