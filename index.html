function useScale() {
  const [scale, setScale] = useState(1);
  useEffect(() => {
    // Use layout width/height only — never the visual viewport (which shrinks when keyboard opens).
    // This means we only ever scale based on the true screen dimensions, not the keyboard-adjusted view.
    function update() {
      const w = window.screen.width;
      const h = window.screen.height;
      // Use the smaller screen dimension as width (handles landscape correctly)
      const sw = Math.min(w, h);
      const sh = Math.max(w, h);
      const wScale = Math.min(sw / 480, 2.2);
      const hScale = Math.min(sh / 700, 2.0);
      const s = Math.min(wScale, hScale);
      const clamped = Math.max(0.7, Math.min(2.0, s));
      setScale(clamped);
      document.documentElement.style.fontSize = (16 * clamped) + "px";
    }
    update();
    // Only re-scale on orientation change — resize fires on keyboard open and causes input blur
    window.addEventListener("orientationchange", update);
    return () => window.removeEventListener("orientationchange", update);
  }, []);
  return scale;
}

const COMBO_CACHE_TTL = 60 * 60 * 1000; // 1 hour in ms

// Push a player's combos to the Worker KV so other devices can load them
async function pushComboCacheToWorker(playerName, combos) {
  if(!playerName || !combos?.length) return;
  try {
    await fetch(`${OVERLAY_WORKER}/combos/push`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ player: playerName, combos, updatedAt: Date.now() }),
      signal: AbortSignal.timeout(5000),
    });
  } catch(_) {}
}

// Fetch a player's combos from the Worker KV (returns [] on miss/error)
async function fetchComboCacheFromWorker(playerName) {
  if(!playerName) return [];
  try {
    const res = await fetch(`${OVERLAY_WORKER}/combos/get?player=${encodeURIComponent(playerName)}`, {
      signal: AbortSignal.timeout(5000),
    });
    if(!res.ok) return [];
    const data = await res.json();
    if(!Array.isArray(data.combos)) return [];
    // Respect TTL client-side too
    if(data.updatedAt && Date.now() - data.updatedAt > COMBO_CACHE_TTL) return [];
    return data.combos.filter(c=>c?.blade&&c?.ratchet&&c?.bit).map(normalizeCombo);
  } catch(_) { return []; }
}

function mergeWithDefaults(saved) {
  // Merge: defaults keep their order (pinned first), user extras appended alphabetically
  function mergeList(defaults, saved) {
    const extras = (saved||[]).filter(x => !defaults.includes(x)).sort();
    return [...new Set([...defaults, ...extras])];
  }
  return {
    blades: mergeList(DEFAULT_PARTS.blades, saved.blades),
    ratchets: mergeList(DEFAULT_PARTS.ratchets, saved.ratchets),
    bits: mergeList(DEFAULT_PARTS.bits, saved.bits),
  };
}

function LibraryManager({parts,setParts,onClose}) {
  const [tab,setTab] = useState("blades");
  const [inp,setInp] = useState("");
  const [libSearch,setLibSearch] = useState("");
  const fRef = useRef();
  const TABS = [{k:"blades",l:"Blades",c:"#EA580C"},{k:"ratchets",l:"Ratchets",c:"#1D4ED8"},{k:"bits",l:"Bits",c:"#15803D"}];
  const ac = TABS.find(t=>t.k===tab)?.c||"#EA580C";
  const add = () => { const v=inp.trim(); if(!v||parts[tab].includes(v))return; const n={...parts,[tab]:[...parts[tab],v].sort()}; setParts(n); sSave(KEYS.parts,n); setInp(""); };
  const del = (cat,i) => { const n={...parts,[cat]:parts[cat].filter((_,j)=>j!==i)}; setParts(n); sSave(KEYS.parts,n); };
  const onFile = (e) => {
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=(ev)=>{
      const txt=ev.target.result;
      try { const j=JSON.parse(txt); if(j.blades||j.ratchets||j.bits){ const m={blades:[...new Set([...parts.blades,...(j.blades||[])])].sort(),ratchets:[...new Set([...parts.ratchets,...(j.ratchets||[])])].sort(),bits:[...new Set([...parts.bits,...(j.bits||[])])].sort()}; setParts(m); sSave(KEYS.parts,m); return; } } catch{}
      const lines=txt.split(/[\r\n]+/).map(l=>l.trim()).filter(Boolean);
      const np={blades:[...parts.blades],ratchets:[...parts.ratchets],bits:[...parts.bits]};
      lines.forEach(line=>{ const [pre,...rest]=line.split(":"); if(rest.length){ const c=pre.toLowerCase().trim(); const name=rest.join(":").trim(); if(c.startsWith("blade")&&!np.blades.includes(name))np.blades.push(name); else if(c.startsWith("ratchet")&&!np.ratchets.includes(name))np.ratchets.push(name); else if(c.startsWith("bit")&&!np.bits.includes(name))np.bits.push(name); } else { if(!np[tab].includes(line))np[tab].push(line); } });
      np.blades.sort(); np.ratchets.sort(); np.bits.sort();
      setParts(np); sSave(KEYS.parts,np);
    };
    r.readAsText(f); e.target.value="";
  };
  const total=parts.blades.length+parts.ratchets.length+parts.bits.length;
  return (
    <div style={{position:"fixed",inset:0,background:"var(--bg-solid)",zIndex:200,overflowY:"auto"}}>
      <div style={{maxWidth:S.page.maxWidth,margin:"0 auto",padding:`20px 16px 40px`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:"#EA580C"}}>{IC.db}</span><h1 style={{margin:0,fontSize:22,fontWeight:800,color:"var(--text-primary)"}}>Parts Library</h1></div>
          <button onClick={onClose} style={{background:"#F1F5F9",border:"none",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#64748B"}}>{IC.x}</button>
        </div>
        <div style={{background:"#EA580C10",border:"1px solid #EA580C30",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#9A3412",fontWeight:500,lineHeight:1.5}}>
          <strong>{total} parts</strong> saved in your library.
        </div>
        <div style={S.tBar}>{TABS.map(t=>(<button key={t.k} onClick={()=>{setTab(t.k);setLibSearch("");}} style={{...S.tBtn,color:tab===t.k?t.c:"#94A3B8",fontWeight:tab===t.k?700:500,borderBottom:tab===t.k?`3px solid ${t.c}`:"3px solid transparent"}}>{t.l} <span style={{...S.bdg,background:t.c,opacity:tab===t.k?1:0.3}}>{parts[t.k].length}</span></button>))}</div>
        {/* Search bar */}
        <div style={{marginBottom:10,position:"relative"}}>
          <input
            style={{...S.inp,width:"100%",paddingLeft:32,borderColor:ac+"40"}}
            placeholder={`Search ${tab}...`}
            value={libSearch}
            onChange={e=>setLibSearch(e.target.value)}
            autoComplete="off"
          />
          <svg style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",opacity:0.35}} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={ac} strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          {libSearch&&<button onClick={()=>setLibSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#94A3B8",cursor:"pointer",fontSize:14,lineHeight:1}}>✕</button>}
        </div>
        <div style={S.addR}><input style={S.inp} placeholder={`Add ${tab.slice(0,-1)}...`} value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/><button style={{...S.addB,background:ac}} onClick={add}>{IC.plus}</button></div>
        <input type="file" ref={fRef} accept=".json,.csv,.txt" style={{display:"none"}} onChange={onFile}/>
        <button style={S.upBtn} onClick={()=>fRef.current.click()}>{IC.upload} Import Parts File</button>
        <p style={S.hint}>{'JSON: {"blades":[], "ratchets":[], "bits":[]} or text one per line'}</p>
        <div style={{...S.card,marginTop:8}}>
          {(()=>{
            const filtered = libSearch ? parts[tab].filter(p=>p.toLowerCase().includes(libSearch.toLowerCase())) : parts[tab];
            if(filtered.length===0) return <p style={S.empty}>{libSearch?`No matches for "${libSearch}"`:(`No ${tab} in library`)}</p>;
            return <div style={S.chs}>{filtered.map((p,i)=>{
              const realIdx=parts[tab].indexOf(p);
              return (<span key={i} style={{...S.ptag,borderColor:ac+"40",background:ac+"0C",color:ac}}>{p}<button style={S.xBtn} onClick={()=>del(tab,realIdx)}>{IC.trash}</button></span>);
            })}</div>;
          })()}
        </div>
        <button style={{...S.pri,marginTop:12}} onClick={onClose}>Done</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════

function PlayersScreen({players,setPlayers,onNext,onBack,onChallongeImport}) {
  const [inp,setInp] = useState("");
  const [challongeUrl,setChallongeUrl] = useState("");
  const [challongeStatus,setChallongeStatus] = useState(null); // null | "loading" | "ok" | "error"
  const [challongeMsg,setChallongeMsg] = useState("");
  const [challongeSource,setChallongeSource] = useState(null); // null | "live" | "cached"
  const [csvFallback,setCsvFallback] = useState(null); // null | {names:[]} when all proxies fail
  const [cachedTournaments,setCachedTournaments] = useState(null); // null | "loading" | []
  const [cachedOpen,setCachedOpen] = useState(false);
  const [deleteConfirmSlug,setDeleteConfirmSlug] = useState(null); // slug pending delete confirmation
  const csvRef = useRef();
  const [confirmClear,setConfirmClear] = useState(false);
  const pRef = useRef();

  const add = () => {
    // Support pasting multiple names at once (newline or comma separated)
    const lines = inp.split(/[\n,]+/).map(l=>l.trim()).filter(Boolean);
    if(!lines.length) return;
    const next = [...new Set([...players,...lines.filter(l=>!players.includes(l))])];
    setPlayers(next); sSave(KEYS.players,next); setInp("");
  };

  const del = (i) => {
    const name = players[i];
    const n=players.filter((_,j)=>j!==i); setPlayers(n); sSave(KEYS.players,n);
    // Remove saved combos for this player
    const saved = sGet(KEYS.combos, {}); delete saved[name]; sSave(KEYS.combos, saved);
  };
  const clearAll = () => { setPlayers([]); sSave(KEYS.players,[]); sSave(KEYS.combos,{}); setConfirmClear(false); };

  const onFile = (e) => {
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=(ev)=>{ const lines=ev.target.result.split(/[\r\n,]+/).map(l=>l.trim()).filter(Boolean); const m=[...new Set([...players,...lines])]; setPlayers(m); sSave(KEYS.players,m); };
    r.readAsText(f); e.target.value="";
  };

  const refreshCachedList = async () => {
    try {
      const res = await fetch("https://challonge-proxy.danny61734.workers.dev/list", {
        signal: AbortSignal.timeout(8000),
      });
      if(!res.ok) throw new Error("Failed");
      const data = await res.json();
      setCachedTournaments(Array.isArray(data.tournaments) ? data.tournaments : []);
    } catch {
      setCachedTournaments(prev => Array.isArray(prev) ? prev : []);
    }
  };

  // Silently pre-fetch the cached list on mount so the dropdown is ready immediately
  useEffect(() => { refreshCachedList(); }, []);

  const fetchCachedTournaments = async () => {
    setCachedTournaments("loading");
    setCachedOpen(false);
    try {
      const res = await fetch("https://challonge-proxy.danny61734.workers.dev/list", {
        signal: AbortSignal.timeout(8000),
      });
      if(!res.ok) throw new Error("Failed to fetch");
      const data = await res.json();
      setCachedTournaments(Array.isArray(data.tournaments) ? data.tournaments : []);
      setCachedOpen(true);
    } catch {
      setCachedTournaments([]);
      setCachedOpen(true);
    }
  };

  const deleteCachedTournament = async (slug) => {
    setDeleteConfirmSlug(null);
    // Immediately remove from the visible list so the UI responds instantly
    setCachedTournaments(prev => Array.isArray(prev) ? prev.filter(t=>t.slug!==slug) : prev);
    // Clear from device localStorage
    try {
      const store = JSON.parse(localStorage.getItem("bx-challonge-cache-v1")||"{}");
      delete store[slug];
      localStorage.setItem("bx-challonge-cache-v1", JSON.stringify(store));
    } catch {}
    // Tell the Worker to delete from KV (fire and forget — UI already updated)
    try {
      await fetch(`https://challonge-proxy.danny61734.workers.dev/delete`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ slug }),
        signal: AbortSignal.timeout(8000),
      });
    } catch(e) { console.warn("Delete fetch failed:", e.message); }
    // Refresh after a short delay to confirm server state
    await new Promise(r => setTimeout(r, 800));
    await refreshCachedList();
  };

  const loadFromCache = async (slug) => {
    setCachedOpen(false);
    setChallongeStatus("loading");
    setChallongeMsg("Loading from NC BLAST server cache...");
    try {
      const res = await fetch(`https://challonge-proxy.danny61734.workers.dev/?slug=${slug}`, {
        signal: AbortSignal.timeout(8000),
      });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if(data.errors) throw new Error(data.errors[0]);
      const participants = data.participants || [];
      const names = participants.map(p=>(p.participant?.display_name||p.participant?.name||"").trim()).filter(Boolean);
      if(!names.length) throw new Error("No participants found in cache");
      const merged = [...new Set([...players,...names])];
      setPlayers(merged); sSave(KEYS.players, merged);
      const participantMap = {};
      participants.forEach(p => {
        const name = (p.participant?.display_name||p.participant?.name||"").trim();
        const id = p.participant?.id;
        if(name && id) {
          participantMap[name] = id;
          participantMap[tn(name)] = id;
          // Also map group_player_ids -> participant.id so group-stage submit works
          if(Array.isArray(p.participant?.group_player_ids)) {
            p.participant.group_player_ids.forEach(gid => {
              if(gid) participantMap[`__gid__${gid}`] = id;
            });
          }
        }
      });
      if(onChallongeImport) onChallongeImport(slug, participantMap);
      setChallongeStatus("ok");
      setChallongeSource(data.fromCache ? "cached" : "live");
      setChallongeMsg(data.fromCache
        ? `✓ ${names.length} players loaded from NC BLAST cache for "${slug}"`
        : `✓ ${names.length} players imported live from Challonge for "${slug}"`
      );
      // Refresh list so age timers stay current after loading
      refreshCachedList();
    } catch(err) {
      setChallongeStatus("error");
      setChallongeMsg(`Failed to load: ${err.message}`);
    }
  };

  const importChallonge = async () => {
    const raw = challongeUrl.trim();
    let slug = "";
    try {
      const url = new URL(raw.startsWith("http") ? raw : "https://"+raw);
      const cleanPath = url.pathname.replace(/\/(participants|standings|teams|matches).*$/i,"");
      const parts = cleanPath.replace(/^\/|\/$/g,"").split("/").filter(Boolean);
      const subdomain = url.hostname.split(".")[0];
      const isCommunity = subdomain !== "challonge" && subdomain !== "www";
      const pathSlug = parts[parts.length-1] || parts[0];
      slug = isCommunity ? `${subdomain}-${pathSlug}` : pathSlug;
    } catch {
      slug = raw.replace(/.*challonge\.com\//,"").replace(/\/(participants|standings).*/i,"").replace(/\/$/,"").split("/").pop();
    }
    if(!slug){ setChallongeStatus("error"); setChallongeMsg("Couldn't read a tournament slug from that URL."); return; }

    setChallongeStatus("loading"); setChallongeMsg("Checking NC BLAST server cache...");
    const API_KEY = "68330566a844961951645c6e25c48a7619d0f21c2d4b0f4a";
    const apiUrl = `https://api.challonge.com/v1/tournaments/${slug}/participants.json?api_key=${API_KEY}`;

    // ── Device-level localStorage cache (30 min TTL) ─────────────────────────
    const LC_KEY = "bx-challonge-cache-v1";
    const LC_TTL = 30 * 60 * 1000;
    const lcGet = (s) => {
      try {
        const store = JSON.parse(localStorage.getItem(LC_KEY) || "{}");
        const e = store[s];
        if(e && (Date.now() - e.fetchedAt) < LC_TTL) return e.names;
      } catch {}
      return null;
    };
    const lcSet = (s, names) => {
      try {
        const store = JSON.parse(localStorage.getItem(LC_KEY) || "{}");
        store[s] = { names, fetchedAt: Date.now() };
        Object.keys(store).forEach(k => { if(Date.now() - store[k].fetchedAt >= LC_TTL) delete store[k]; });
        localStorage.setItem(LC_KEY, JSON.stringify(store));
      } catch {}
    };

    // Device cache hit — zero network calls
    const lcHit = lcGet(slug);
    if(lcHit) {
      const merged = [...new Set([...players,...lcHit])];
      setPlayers(merged); sSave(KEYS.players, merged);
      setChallongeStatus("ok");
      setChallongeSource("cached");
      setChallongeMsg(`✓ ${lcHit.length} players loaded from NC BLAST cache for "${slug}"`);
      return;
    }

    // Helper: parse response — Cloudflare Worker returns { participants:[], fromCache:bool }
    const parseResponse = (text, raw) => {
      const wrapper = JSON.parse(text);
      let data = (!raw && wrapper && wrapper.contents !== undefined)
        ? JSON.parse(wrapper.contents) : wrapper;
      if(!data) throw new Error("Empty response");
      if(data.errors) throw new Error(Array.isArray(data.errors) ? data.errors.join(", ") : String(data.errors));
      let fromServerCache = false;
      if(data.participants !== undefined) {
        fromServerCache = data.fromCache === true;
        data = data.participants;
      }
      if(!Array.isArray(data)) throw new Error("Unexpected response format");
      return { data, fromServerCache };
    };

    const attempt = async (url, timeout=10000) => {
      const res = await fetch(url, {signal: AbortSignal.timeout(timeout)});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.text();
    };

    const withRetry = async (fn, retries=2, delayMs=800) => {
      let lastErr;
      for(let i=0; i<=retries; i++){
        try { return await fn(); }
        catch(e){ lastErr=e; if(i<retries) await new Promise(r=>setTimeout(r,delayMs*(i+1))); }
      }
      throw lastErr;
    };

    // Cloudflare Worker: 3 attempts. Public fallbacks: 1 shot each.
    const proxyConfigs = [
      { name:"cloudflare",    buildUrl:()=>`https://challonge-proxy.danny61734.workers.dev/?slug=${slug}`, raw:true, retries:2 },
      { name:"allorigins",    buildUrl:()=>`https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`, retries:0 },
      { name:"corsproxy.io",  buildUrl:()=>`https://corsproxy.io/?${encodeURIComponent(apiUrl)}`, retries:0 },
      { name:"allorigins-raw",buildUrl:()=>`https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`, retries:0 },
      { name:"cors-anywhere", buildUrl:()=>`https://cors-anywhere.herokuapp.com/${apiUrl}`, retries:0 },
    ];

    const proxyMessages = {
      "cloudflare":     ["Checking NC BLAST server cache...", "Connecting to NC BLAST server...", "Last try on NC BLAST server..."],
      "allorigins":     ["Trying backup proxy..."],
      "corsproxy.io":   ["Switching to corsproxy.io..."],
      "allorigins-raw": ["Trying alternate route..."],
      "cors-anywhere":  ["Trying final fallback..."],
    };

    let lastErr = "";
    for(const proxy of proxyConfigs){
      let proxyAttempt = 0;
      try {
        setChallongeMsg(proxyMessages[proxy.name]?.[0] || `Trying ${proxy.name}...`);
        const text = await withRetry(async () => {
          setChallongeMsg(proxyMessages[proxy.name]?.[proxyAttempt] || "Retrying...");
          proxyAttempt++;
          return attempt(proxy.buildUrl());
        }, proxy.retries, 600);
        const { data, fromServerCache } = parseResponse(text, proxy.raw);
        const names = data.map(p=>(p.participant?.display_name||p.participant?.name||"").trim()).filter(Boolean);
        if(!names.length) throw new Error("No participants found — is this tournament public with entrants added?");
        const merged = [...new Set([...players,...names])];
        setPlayers(merged); sSave(KEYS.players, merged);
        lcSet(slug, names);
        // Build participant ID map — store both full name and truncated name as keys
        const participantMap = {};
        data.forEach(p => {
          const name = (p.participant?.display_name||p.participant?.name||"").trim();
          const id = p.participant?.id;
          if(name && id) {
            participantMap[name] = id;
            participantMap[tn(name)] = id;
            // Also map group_player_ids -> participant.id so group-stage submit works
            if(Array.isArray(p.participant?.group_player_ids)) {
              p.participant.group_player_ids.forEach(gid => {
                if(gid) participantMap[`__gid__${gid}`] = id;
              });
            }
          }
        });
        if(onChallongeImport) onChallongeImport(slug, participantMap);
        setChallongeStatus("ok");
        setChallongeSource(fromServerCache ? "cached" : "live");
        setChallongeMsg(fromServerCache
          ? `✓ ${names.length} players loaded from NC BLAST cache for "${slug}"`
          : `✓ ${names.length} players imported live from Challonge for "${slug}"`
        );
        // Refresh the cached list immediately so the dropdown reflects the new entry
        refreshCachedList();
        return;
      } catch(err) {
        lastErr = err.message;
        if(err.message.includes("HTTP 403")||err.message.includes("HTTP 404")||err.message.includes("No participants")) break;
      }
    }
    setChallongeStatus("error");
    setChallongeMsg("Direct import failed. You can still get names via CSV — see below.");
    setCsvFallback({names:[]});
  };

  const handleCsvFile = (e) => {
    const f = e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = (ev) => {
      const text = ev.target.result;
      const lines = text.split(/[\r\n]+/).filter(Boolean);
      if(!lines.length) return;
      const header = lines[0].split(",").map(h=>h.replace(/"/g,"").trim().toLowerCase());
      const nameCol = header.findIndex(h=>h.includes("name")||h.includes("display"));
      const names = lines.slice(1).map(line=>{
        const cols = line.split(",").map(c=>c.replace(/"/g,"").trim());
        return nameCol>=0 ? cols[nameCol] : cols[0];
      }).filter(Boolean);
      setCsvFallback({names});
    };
    r.readAsText(f);
    e.target.value = "";
  };

  return (
    <div style={{...S.page,height:"100dvh",overflowY:"auto"}}>
      <button style={S.back} onClick={onBack}>{IC.back} Format</button>
      <h1 style={S.title}>Player Roster</h1>
      <p style={S.sub}>Players are saved between sessions</p>

      {/* Challonge import */}
      <div style={{...S.card,border:"2px solid #EA580C40",marginBottom:12}}>
        <h2 style={{...S.label,color:"#C2410C",marginBottom:8}}>Import from Challonge</h2>

        {/* Cached tournaments dropdown */}
        <div style={{marginBottom:10}}>
          <button
            type="button"
            onClick={()=>{ if(cachedOpen){ setCachedOpen(false); } else { fetchCachedTournaments(); } refreshCachedList(); }}
            disabled={cachedTournaments==="loading"}
            style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"9px 12px",borderRadius:10,border:"2px solid #7C3AED30",background:"#7C3AED15",color:"#7C3AED",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:cachedTournaments==="loading"?"not-allowed":"pointer",opacity:cachedTournaments==="loading"?0.7:1}}>
            <span>{cachedTournaments==="loading" ? "⏳ Checking server cache..." : "⚡ Cached Tournaments"}</span>
            {cachedTournaments!=="loading"&&<span style={{fontSize:10,opacity:0.7}}>{cachedOpen ? "▲ Hide" : "▼ Show"}</span>}
          </button>
          {cachedOpen&&(
            <div style={{marginTop:4,border:"2px solid #7C3AED20",borderRadius:10,background:"var(--surface)",overflow:"hidden"}}>
              {/* Delete confirmation modal */}
              {deleteConfirmSlug&&(
                <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.5)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
                  <div style={{background:"var(--surface)",borderRadius:18,padding:"24px 20px",maxWidth:320,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",border:"1px solid var(--border)"}}>
                    <p style={{fontSize:16,fontWeight:800,color:"var(--text-primary)",marginBottom:8,textAlign:"center"}}>Delete Cache?</p>
                    <p style={{fontSize:13,color:"var(--text-secondary)",textAlign:"center",marginBottom:6,lineHeight:1.5}}>
                      This will remove <strong style={{color:"#DC2626"}}>{deleteConfirmSlug}</strong> from the server cache for all devices.
                    </p>
                    <p style={{fontSize:11,color:"var(--text-muted)",textAlign:"center",marginBottom:20,lineHeight:1.4}}>Players can still be imported again by pasting the Challonge URL.</p>
                    <div style={{display:"flex",gap:10}}>
                      <button type="button" onClick={()=>setDeleteConfirmSlug(null)}
                        style={{flex:1,padding:"12px 0",borderRadius:10,border:"2px solid var(--border)",background:"var(--surface)",color:"var(--text-secondary)",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                        Cancel
                      </button>
                      <button type="button" onClick={()=>deleteCachedTournament(deleteConfirmSlug)}
                        style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:"#DC2626",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                        Delete
                      </button>
                    </div>
                  </div>
                </div>
              )}
              {Array.isArray(cachedTournaments)&&cachedTournaments.length===0&&(
                <p style={{fontSize:12,color:"var(--text-muted)",fontWeight:500,padding:"12px 14px",margin:0,fontStyle:"italic"}}>No tournaments currently cached. Import one via the URL field below.</p>
              )}
              {Array.isArray(cachedTournaments)&&cachedTournaments.map((t,ti)=>{
                const minsAgo = Math.floor(t.ageSeconds / 60);
                const minsLeft = Math.max(0, 30 - minsAgo);
                return (
                  <div key={ti} style={{display:"flex",alignItems:"center",borderTop:ti>0?"1px solid var(--border)":"none"}}>
                    <button type="button" onClick={()=>loadFromCache(t.slug)}
                      style={{flex:1,padding:"10px 14px",border:"none",background:"none",cursor:"pointer",textAlign:"left",fontFamily:"'Outfit',sans-serif"}}>
                      <div style={{fontSize:12,fontWeight:700,color:"var(--text-primary)"}}>{t.slug}</div>
                      <div style={{fontSize:10,color:"var(--text-muted)",marginTop:1}}>{t.participantCount} players · cached {minsAgo}m ago · expires in {minsLeft}m</div>
                    </button>
                    <button type="button" onClick={()=>setDeleteConfirmSlug(t.slug)}
                      style={{padding:"10px 12px",border:"none",background:"none",cursor:"pointer",color:"#DC2626",opacity:0.6,flexShrink:0}}
                      title="Delete from cache">
                      {IC.trash}
                    </button>
                  </div>
                );
              })}
          </div>
        )}

      </div>

        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <input
            style={{...S.inp,flex:1,borderColor:"#EA580C40",fontSize:12}}
            placeholder="https://ncbl.challonge.com/TOURNAMENTNAME/participants"
            value={challongeUrl}
            onChange={e=>{setChallongeUrl(e.target.value);setChallongeStatus(null);setCsvFallback(null);setChallongeSource(null);}}
            onKeyDown={e=>e.key==="Enter"&&challongeUrl.trim()&&importChallonge()}
          />
          <button
            onClick={importChallonge}
            disabled={!challongeUrl.trim()||challongeStatus==="loading"}
            style={{padding:"0 14px",borderRadius:10,border:"none",background:challongeUrl.trim()?"#EA580C":"var(--surface3)",color:challongeUrl.trim()?"#fff":"var(--text-disabled)",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:challongeUrl.trim()?"pointer":"not-allowed",flexShrink:0}}>
            {challongeStatus==="loading"?"..." :"Import"}
          </button>
        </div>
        {challongeStatus==="ok"&&<p style={{fontSize:11,color:"#15803D",fontWeight:600,marginTop:4}}>✓ {challongeMsg}</p>}
        {challongeStatus==="ok"&&challongeSource&&(
          <div style={{display:"inline-flex",alignItems:"center",gap:5,marginTop:5,padding:"3px 9px",borderRadius:20,border:"1px solid",
            borderColor: challongeSource==="cached" ? "#7C3AED40" : "#15803D40",
            background:  challongeSource==="cached" ? "#7C3AED15"   : "#15803D15",
          }}>
            <span style={{fontSize:10}}>{challongeSource==="cached" ? "⚡" : "🌐"}</span>
            <span style={{fontSize:10,fontWeight:700,color: challongeSource==="cached" ? "#6D28D9" : "#15803D"}}>
              {challongeSource==="cached" ? "Served from NC BLAST cache" : "Live from Challonge API"}
            </span>
          </div>
        )}
        {challongeStatus==="error"&&<p style={{fontSize:11,color:"#DC2626",fontWeight:600,lineHeight:1.5,marginTop:4}}>{challongeMsg}</p>}
        {challongeStatus==="loading"&&<p style={{fontSize:11,color:"#C2410C",fontWeight:600,marginTop:4,lineHeight:1.5}}>⏳ {challongeMsg}</p>}
        {!challongeStatus&&<p style={S.hint}>e.g. ncbl.challonge.com/TOURNAMENT</p>}

        {/* CSV fallback — shown after all proxies fail */}
        {csvFallback&&(
          <div style={{marginTop:10,borderTop:"1px solid #FED7AA",paddingTop:10}}>
            <p style={{fontSize:12,fontWeight:700,color:"#C2410C",marginBottom:6}}>📋 Manual CSV Fallback</p>
            <p style={{fontSize:11,color:"#92400E",marginBottom:8,lineHeight:1.5}}>
              In Challonge, go to your tournament → <strong>Participants</strong> tab → <strong>Export</strong> → download the CSV. Then upload it here:
            </p>
            <input type="file" ref={csvRef} accept=".csv,.txt" style={{display:"none"}} onChange={handleCsvFile}/>
            {csvFallback.names.length===0?(
              <button onClick={()=>csvRef.current.click()} style={{...S.upBtn,marginBottom:0}}>
                📂 Upload Challonge CSV export
              </button>
            ):(
              <div>
                <p style={{fontSize:11,color:"#15803D",fontWeight:600,marginBottom:6}}>✓ Found {csvFallback.names.length} names — copy all and paste into Add Players:</p>
                <div style={{position:"relative"}}>
                  <textarea
                    readOnly
                    value={csvFallback.names.join(", ")}
                    style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"2px solid #15803D40",background:"#15803D0D",color:"var(--text-primary)",fontSize:11,fontFamily:"'Outfit',sans-serif",resize:"none",height:72,outline:"none"}}
                    onFocus={e=>e.target.select()}
                  />
                  <button
                    onClick={()=>{navigator.clipboard?.writeText(csvFallback.names.join(", ")).catch(()=>{});}}
                    style={{position:"absolute",top:6,right:6,padding:"4px 8px",borderRadius:6,border:"none",background:"#15803D",color:"#fff",fontSize:10,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                    Copy
                  </button>
                </div>
                <button onClick={()=>{
                  const merged=[...new Set([...players,...csvFallback.names])];
                  setPlayers(merged); sSave(KEYS.players,merged);
                  setChallongeStatus("ok");
                  setChallongeMsg(`✓ ${csvFallback.names.length} players added from CSV`);
                  setCsvFallback(null);
                }} style={{...S.pri,marginTop:8,fontSize:12,padding:"10px 0"}}>
                  Add All to Roster →
                </button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Manual add */}
      <div style={S.card}>
        <h2 style={S.label}>Add Players</h2>
        <div style={S.addR}>
          <input style={S.inp} placeholder="Name, or paste multiple names..." value={inp}
            onChange={e=>setInp(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&inp.trim()&&add()}
            onPaste={e=>{
              // On paste, immediately parse and add all pasted names
              e.preventDefault();
              const pasted = e.clipboardData.getData("text");
              const lines = pasted.split(/[\n\r,]+/).map(l=>l.trim()).filter(Boolean);
              if(lines.length>1){
                const next=[...new Set([...players,...lines.filter(l=>!players.includes(l))])];
                setPlayers(next); sSave(KEYS.players,next);
              } else {
                setInp(prev=>prev+pasted);
              }
            }}
          />
          <button style={{...S.addB,background:"#1D4ED8"}} onClick={add}>{IC.plus}</button>
        </div>
        <p style={S.hint}>Paste multiple names separated by commas or new lines to add them all at once</p>
        <input type="file" ref={pRef} accept=".csv,.txt" style={{display:"none"}} onChange={onFile}/>
        <button style={S.upBtn} onClick={()=>pRef.current.click()}>{IC.upload} Import from File</button>
      </div>

      {/* Roster */}
      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <h2 style={{...S.label,margin:0}}>Roster ({players.length})</h2>
          {players.length>0&&<button onClick={()=>setConfirmClear(true)} style={{background:"none",border:"none",color:"#EF4444",fontSize:12,fontWeight:600,fontFamily:"'Outfit',sans-serif",cursor:"pointer",opacity:0.7}}>Clear all</button>}
        </div>
        {players.length===0&&<p style={S.empty}>No players yet</p>}
        <div style={S.chs}>
          {[...players].sort((a,b)=>a.localeCompare(b)).map((p,i)=>(
            <span key={p} style={{...S.ptag,borderColor:"#1D4ED840",background:"#1D4ED80C",color:"#1D4ED8"}}>
              {p}<button style={S.xBtn} onClick={()=>del(players.indexOf(p))}>{IC.trash}</button>
            </span>
          ))}
        </div>
      </div>

      <button style={{...S.pri,opacity:players.length>=2?1:0.4}} disabled={players.length<2} onClick={onNext}>Start Matches →</button>
      {players.length<2&&<p style={S.hint}>Need at least 2 players</p>}

      {/* In-app clear all confirmation modal */}
      {confirmClear&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
          <div style={{background:"var(--surface)",borderRadius:18,padding:"24px 20px",maxWidth:320,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",border:"1px solid var(--border)"}}>
            <p style={{fontSize:16,fontWeight:800,color:"var(--text-primary)",marginBottom:8,textAlign:"center"}}>Clear Roster?</p>
            <p style={{fontSize:13,color:"var(--text-secondary)",textAlign:"center",marginBottom:20,lineHeight:1.5}}>This will remove all <strong style={{color:"#EF4444"}}>{players.length} players</strong> from the roster. This cannot be undone.</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmClear(false)}
                style={{flex:1,padding:"12px 0",borderRadius:10,border:"2px solid var(--border)",background:"var(--surface)",color:"var(--text-secondary)",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                Cancel
              </button>
              <button onClick={clearAll}
                style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:"#EF4444",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                Clear All
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function BottomBar({log,future,undo,redo,historyOpen,setHistoryOpen,p1,p2,onOpenLib,onClearLog,dark,toggleDark,matchStartIdx}) {

  return (
    <>
      <div style={{position:"fixed",top:0,right:0,bottom:0,width:historyOpen?Math.min(340,window.innerWidth-40):0,background:"var(--surface)",boxShadow:historyOpen?"-4px 0 24px rgba(0,0,0,0.25)":"none",transition:"width 0.25s ease",overflow:"hidden",zIndex:100}}>

            </div>
          </div>
          {log.length===0&&<p style={{color:"#CBD5E1",fontSize:13,fontStyle:"italic"}}>No battles yet</p>}

          {/* Clear log confirmation modal */}
          {confirmClear&&(
            <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.5)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
              <div style={{background:"var(--surface)",borderRadius:18,padding:"24px 20px",maxWidth:320,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",border:"1px solid var(--border)"}}>
                <p style={{fontSize:16,fontWeight:800,color:"var(--text-primary)",marginBottom:8,textAlign:"center"}}>Clear Match Log?</p>

                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setConfirmClear(false)}
                    style={{flex:1,padding:"12px 0",borderRadius:10,border:"2px solid var(--border)",background:"var(--surface)",color:"var(--text-secondary)",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>

                  <button onClick={()=>{onClearLog();setConfirmClear(false);}}
                    style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:"#EF4444",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                    Clear All
                  </button>
                </div>
              </div>
            </div>
          )}
          {log.slice().reverse().map((e,i)=>(
            <div key={i} style={{padding:"10px 12px",borderRadius:10,marginBottom:8,background:e.scorerIdx===0?"#EFF6FF22":"#FEF2F222",borderLeft:`4px solid ${e.scorerIdx===0?"#2563EB":"#DC2626"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <span style={{fontWeight:700,color:e.scorerIdx===0?"#2563EB":"#DC2626",fontSize:14}}>{e.scorer}</span>
                <span style={{fontSize:11,fontWeight:600,color:"var(--text-muted)"}}>R{log.length-i} · Set {e.set} · Shuf {e.shuffle}</span>
              </div>
              <div style={{fontSize:12,color:"var(--text-secondary)",marginBottom:2}}><span style={{fontWeight:700,color:e.scorerIdx===0?"#2563EB":"#DC2626"}}>{e.typeName}</span> (+{e.points})</div>
              <div style={{fontSize:11,color:"var(--text-muted)"}}>Won with: <span style={{fontWeight:600}}>{e.winnerCombo}</span></div>

function JudgeInput({value, onCommit, onClear, style, placeholder}) {
  const [local, setLocal] = React.useState(value||"");
  // Sync if parent clears it externally
  React.useEffect(()=>{ if(!value) setLocal(""); },[value]);
  return (
    <input
      autoFocus
      style={style}
      placeholder={placeholder||"Enter judge name..."}
      value={local}
      onChange={e=>setLocal(e.target.value)}
      onBlur={()=>{ if(local.trim()) onCommit(local.trim()); }}
      onKeyDown={e=>{ if(e.key==="Enter"&&local.trim()){ onCommit(local.trim()); } }}
    />
  );
}

/* ═══════════════════════════════════════
   ERROR BOUNDARY — catches render crashes so the app shows
   a recovery UI instead of a blank white screen.
═══════════════════════════════════════ */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {err:null}; }
  static getDerivedStateFromError(e) { return {err:e}; }
  componentDidCatch(e,info) { console.error("NC BLAST render error:", e, info); }
  render() {
    if(this.state.err) return (
      <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:24,background:"#F8FAFC",fontFamily:"'Outfit',sans-serif"}}>
        <div style={{fontSize:36}}>⚠️</div>
        <div style={{fontWeight:800,fontSize:18,color:"#1E293B"}}>Something went wrong</div>
        <div style={{fontSize:13,color:"#64748B",textAlign:"center",maxWidth:280}}>{String(this.state.err?.message||this.state.err)}</div>
        <button onClick={()=>this.setState({err:null})} style={{background:"#2563EB",color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",fontWeight:700,fontSize:14,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>Try Again</button>
      </div>
    );
    return this.props.children;
  }
}

/* ═══════════════════════════════════════
   SCALED BUTTON CONTENT
   Fills 100% of its parent button's height with the largest
   possible text, no clipping, no kerning overflow.
   Pass children as a render function: children(scaledFontSize)
═══════════════════════════════════════ */
/* ScaledBtn — button whose renderContent(frac) receives a multiplier
   frac = currentHeight / naturalHeight, where naturalHeight is the first
   measured height (the "designed" size before any drag resize).
   Text should be written at frac=1 sizes; everything scales from there. */
function ScaledBtn({baseStyle, disabled, onClick, renderContent}) {
  const btnRef = useRef(null);
  const naturalH = useRef(null); // first measured height = designed baseline
  const [frac, setFrac] = useState(1);
  useEffect(()=>{
    const el = btnRef.current;
    if(!el) return;
    const ro = new ResizeObserver(()=>{
      const h = el.offsetHeight;
      if(h <= 0) return;
      if(naturalH.current === null) { naturalH.current = h; return; } // record baseline on first paint
      const f = h / naturalH.current;
      setFrac(Math.max(0.25, Math.min(4, f)));
    });
    ro.observe(el);
    return ()=>ro.disconnect();
  },[]);
  return (
    <button ref={btnRef} type="button" disabled={disabled} onClick={onClick} style={baseStyle}>
      {renderContent(frac)}
    </button>
  );
}

/* FitText — scales text to fill its container.
   ratio: fraction of container height → starting font-size target.
   wrap: allow line-breaks at spaces only. NEVER splits within a word.
   Uses canvas.measureText so the longest word always provably fits in width. */
const _fitCanvas = document.createElement("canvas");
function measureWordPx(word, fontPx, fontFamily) {
  const ctx = _fitCanvas.getContext("2d");
  ctx.font = `900 ${fontPx}px ${fontFamily}`;
  return ctx.measureText(word).width;
}
function FitText({children, style, ratio=0.38, wrap=false}) {
  const ref = useRef(null);
  const [fs, setFs] = useState(null);
  const childStr = typeof children === "string" ? children : String(children ?? "");
  useEffect(()=>{
    const el = ref.current;
    if(!el) return;
    function compute() {
      const h = el.offsetHeight;
      const w = el.offsetWidth;
      if(h <= 0 || w <= 0) return;
      // Start from height-based target
      let size = Math.max(7, h * ratio);
      if(wrap && childStr.length > 0) {
        // Binary-search the largest size where every word fits in width
        const words = childStr.split(/\s+/).filter(Boolean);
        const fontFamily = "'Outfit',sans-serif";
        const availW = w - 4; // 2px each side
        let lo = 7, hi = size, best = lo;
        for(let iter = 0; iter < 14; iter++) {
          const mid = (lo + hi) / 2;
          const maxWordW = Math.max(...words.map(wd => measureWordPx(wd, mid, fontFamily)));
          if(maxWordW <= availW) { best = mid; lo = mid; }
          else { hi = mid; }
        }
        size = best;
      }
      setFs(Math.max(7, size));
    }
    const ro = new ResizeObserver(compute);
    ro.observe(el);
    return ()=>ro.disconnect();
  },[ratio, wrap, childStr]);
  return (
    <div ref={ref} style={{display:"flex",alignItems:"center",justifyContent:"center",width:"100%",height:"100%",overflow:"hidden",...style}}>
      <span style={{
        fontSize:fs||"inherit",
        lineHeight:wrap?1.2:1,
        whiteSpace:wrap?"normal":"nowrap",
        wordBreak:"normal",       // never break within a word
        overflowWrap:"normal",    // never break within a word
        overflow:"hidden",
        maxWidth:"100%",
        display:"block",
        textAlign:"center",
      }}>
        {children}
      </span>
    </div>
  );
}

/* ComboLabel — renders blade / ratchet / bit as one tight proportional block.
   Binary-searches blade font size to fit width, then caps so all 3 lines
   fit in height. Sub (ratchet+bit) is 72% of blade. Gap is 0 — line-height
   provides the only breathing room, keeping the combo as one visual unit. */
const _comboCanvas = document.createElement("canvas");
function comboMeasureWord(word, fontPx, weight) {
  const ctx = _comboCanvas.getContext("2d");
  ctx.font = `${weight} ${fontPx}px 'Outfit',sans-serif`;
  return ctx.measureText(word).width;
}
function ComboLabel({blade, ratchet, bit, color, color2, empty, emptyText}) {
  const ref = useRef(null);
  const [sizes, setSizes] = useState(null);

  // Pure measurement function — reads DOM dimensions, calculates font sizes
  const computeSizes = React.useCallback((el) => {
    if(!el) return;
    const h = el.offsetHeight;
    const w = el.offsetWidth;
    if(h <= 0 || w <= 0) return;
    const pad = 8;
    const availW = w - pad;
    const lineH = 1.15;
    const bladeWords = (blade||"\u2014").split(/\s+/).filter(Boolean);
    let lo = 7, hi = h * 0.5, bestBlade = lo;
    for(let i=0;i<16;i++){
      const mid=(lo+hi)/2;
      const maxW=Math.max(...bladeWords.map(wd=>comboMeasureWord(wd,mid,"900")));
      if(maxW<=availW){bestBlade=mid;lo=mid;}else{hi=mid;}
    }
    let sub = bestBlade * 0.72;
    const bladeLines = bladeWords.length > 1 &&
      comboMeasureWord(bladeWords.join(" "), bestBlade, "900") > availW ? 2 : 1;
    const bitWords = (bit||"").split(/\s+/).filter(Boolean);
    const bitLines = bitWords.length > 1 &&
      comboMeasureWord(bitWords.join(" "), sub, "600") > availW ? 2 : 1;
    const totalLines = bladeLines + (ratchet ? 1 : 0) + bitLines;
    if(bestBlade * totalLines * lineH > h - pad) {
      bestBlade = Math.max(7, (h - pad) / (totalLines * lineH));
      sub = bestBlade * 0.72;
    }
    setSizes({blade: Math.max(7, bestBlade), sub: Math.max(7, sub)});
  }, [blade, ratchet, bit]);

  // Fires synchronously before the browser paints — eliminates visible resize flash on combo select
  React.useLayoutEffect(()=>{ computeSizes(ref.current); }, [computeSizes]);

  // Also watch container resize for drag-handle and orientation changes
  useEffect(()=>{
    const el = ref.current;
    if(!el) return;
    const ro = new ResizeObserver(()=>computeSizes(el));
    ro.observe(el);
    return ()=>ro.disconnect();
  },[computeSizes]);

  const fs = sizes || {blade:14, sub:10};
  const lineH = 1.15;

  if(empty) return (
    <div ref={ref} style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",padding:"4px"}}>
      <span style={{fontSize:fs.sub,fontWeight:600,color:color2||"var(--text-faint)",textAlign:"center",lineHeight:lineH,wordBreak:"normal",overflowWrap:"normal"}}>{emptyText||"—"}</span>
    </div>
  );
  return (
    <div ref={ref} style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"hidden",padding:"6px 4px",gap:0}}>
      <span style={{fontSize:fs.blade,fontWeight:900,color,textAlign:"center",lineHeight:lineH,whiteSpace:"normal",wordBreak:"normal",overflowWrap:"normal",maxWidth:"100%"}}>{blade||"—"}</span>
      {ratchet&&<span style={{fontSize:fs.sub,fontWeight:700,color:color2||color,textAlign:"center",lineHeight:lineH,whiteSpace:"nowrap",maxWidth:"100%",opacity:0.9}}>{ratchet}</span>}
      <span style={{fontSize:fs.sub,fontWeight:600,color:color2||color,textAlign:"center",lineHeight:lineH,whiteSpace:"normal",wordBreak:"normal",overflowWrap:"normal",maxWidth:"100%",opacity:0.8}}>{bit||""}</span>
    </div>
  );
}

function MatchScreen({config,parts,players,judge,setJudge,sheetsStatus,setSheetsStatus,onBack,onMainMenu,onDownloadCSV,onSendSheets,onOpenLib,dark,toggleDark,challongeSlug,challongeParticipants}) {
  const [phase,setPhase] = useState("pick");
  const [abandonConfirm,setAbandonConfirm] = useState(false);
  const [overBackConfirm,setOverBackConfirm] = useState(false);
  const [p1,setP1] = useState(null);
  const [p2,setP2] = useState(null);
  const [d1,setD1] = useState([emptyCombo(),emptyCombo(),emptyCombo()]);
  const [d2,setD2] = useState([emptyCombo(),emptyCombo(),emptyCombo()]);
  const [r1,setR1] = useState(null);
  const [r2,setR2] = useState(null);
  const [used1,setUsed1] = useState([]);
  const [used2,setUsed2] = useState([]);
  const [pts,setPts] = useState([0,0]);
  const [sets,setSets] = useState([0,0]);
  const [curSet,setCurSet] = useState(1);
  const [shuf,setShuf] = useState(0);
  const [log,setLog] = useState(()=>sGet(KEYS.matchLog,[]));
  const [future,setFuture] = useState([]);
  const [matchStartIdx,setMatchStartIdx] = useState(0);
  const [picker,setPicker] = useState(null);
  const [pickerHistory,setPickerHistory] = useState([]); // stack of previous picker states for undo
  const openPicker = (val) => {
    setPickerHistory(h => picker ? [...h, picker] : h);
    setPicker(val); setPickerSearch(""); setCrossoverOpen(false); setCxPicker(null);
  };
  const undoPicker = () => {
    if(!pickerHistory.length) return;
    const prev = pickerHistory[pickerHistory.length-1];
    setPickerHistory(h => h.slice(0,-1));
    // Clear the part that was just picked at the current step
    if(picker && !picker.returnToReview) {
      const {who, slot, cat} = picker;
      const deck = who===1?d1:d2;
      const setDeck = who===1?setD1:setD2;
      const nd = [...deck]; nd[slot] = {...nd[slot], [cat]: null}; setDeck(nd);
    }
    setPicker(prev); setPickerSearch(""); setCrossoverOpen(false); setCxPicker(null);
  };
  const [historyOpen,setHistoryOpen] = useState(false);
  const [confirmState,setConfirmState] = useState(null);
  const [manualJudge,setManualJudge] = useState(false);
  const [setScores,setSetScores] = useState([]);
  const [sideAssign,setSideAssign] = useState(null);
  const [sidePicker,setSidePicker] = useState(null);
  const [currentSides,setCurrentSides] = useState({p1Side:"",p2Side:""});
  const [pickerSearch,setPickerSearch] = useState("");
  const [crossoverOpen,setCrossoverOpen] = useState(false);
  const [cxPicker,setCxPicker] = useState(null); // null | {step,who,slot,chip?,blade?,returnToReview?}
  const [deckReview,setDeckReview] = useState(false); // true = show review screen, false = in picker flow
  const [lerStrikes,setLerStrikes] = useState([0,0]); // launch error strike counter per player [p1,p2]
  const [pickTab,setPickTab] = useState(challongeSlug?"active":"roster"); // "roster" | "active"
  const [activeMatches,setActiveMatches] = useState(null); // null | "loading" | []
  const [challongeMatchId,setChallongeMatchId] = useState(null);
  const [challongeP1ParticipantId,setChallongeP1ParticipantId] = useState(null);
  const [challongeP2ParticipantId,setChallongeP2ParticipantId] = useState(null);
  const [challongeSubmitStatus,setChallongeSubmitStatus] = useState(null);
  const [pendingFinish,setPendingFinish] = useState(null); // {pi, fin} — selected but not yet confirmed
  const [overlaySlot,setOverlaySlot] = useState(()=>{ try{return parseInt(localStorage.getItem(KEYS.overlaySlot)||"0",10)||0;}catch{return 0;} }); // 0 = disabled, 1-4 = slot number
  const [workerCombos,setWorkerCombos] = useState({}); // { playerName: [combo,...] } loaded from Worker KV
  const [overlayStatus,setOverlayStatus] = useState(null); // null | "ok" | "error"
  // swapped: purely a display-order flip. When true, p2 is shown on the left (blue side) and p1 on right (red side).
  // sets[], pts[], setScores[] always use canonical index 0=p1 1=p2 regardless of swap.
  const [swapped,setSwapped] = useState(false);
  const [sideSwapConfirm,setSideSwapConfirm] = useState(false); // swap B/X sides modal
  const [swapStadium,setSwapStadium] = useState(true);   // checkbox: swap B/X sides
  const [swapPosition,setSwapPosition] = useState(false); // checkbox: swap p1/p2 in app
  const [historyConfirmClear,setHistoryConfirmClear] = useState(false);
  const [judgeSubmitModal,setJudgeSubmitModal] = useState(false);
  const [submitChallongeCheck,setSubmitChallongeCheck] = useState(true);
  const [submitSheetsCheck,setSubmitSheetsCheck] = useState(true); // clear log confirmation in battle screen history panel
  const [judgeEditMode,setJudgeEditMode] = useState(false); // judge name editable on over screen
  const [layoutEditMode,setLayoutEditMode] = useState(false); // height adjustment mode
  const [overlayModal,setOverlayModal] = useState(false); // stream slot picker modal
  // Section heights in px — null = auto/flex
  const [sectionH,setSectionH] = useState({score:null,combo:null,picker:null,finish:null});
  // Drag state for height sliders
  const dragRef = useRef(null); // {section, startY, startH, startH2} — startH2 = neighbour below
  const rafRef = useRef(null); // requestAnimationFrame handle for drag throttling
  const scoreBlockSectionRef = useRef(null);   // for reliable height read on drag start
  const comboDisplaySectionRef = useRef(null);
  const comboPickerSectionRef = useRef(null);
  const finishSectionRef = useRef(null);
  const scoreBlockRef = useRef(null);
  const scoreBlockCbRef = React.useCallback((el)=>{
    scoreBlockRef.current = el;
    scoreBlockSectionRef.current = el;
  },[]);
  // Portrait vs landscape for combo button layout — recomputed on each render via sc trigger
  const comboAreaRef = useRef(null); // kept for legacy ref safety, not used for measurement

  // ── beforeunload: warn desktop users before they accidentally refresh/close
  //    while a match is in progress. On mobile, pull-to-refresh is blocked via
  //    CSS overscroll-behavior:none, so this mainly covers F5/Cmd+R/browser chrome.
  useEffect(()=>{
    const handler = (e) => {
      const battlesLogged = log.slice(matchStartIdx).filter(en=>en.type!=="LER-STRIKE").length;
      if(phase!=="battle" || battlesLogged === 0) return;
      e.preventDefault();
      e.returnValue = "";
    };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, [log, matchStartIdx, phase]);

  // Auto-fetch active matches if we default to active tab
  useEffect(()=>{ if(challongeSlug) fetchActiveMatches(); },[]);

  // Load combos from Worker KV when player names are known (cross-device cache)
  useEffect(()=>{
    let cancelled = false;
    async function load() {
      const results = {};
      await Promise.all([p1, p2].filter(Boolean).map(async name => {
        const combos = await fetchComboCacheFromWorker(name);
        if(combos.length) results[name] = combos;
      }));
      if(!cancelled) setWorkerCombos(prev => ({...prev, ...results}));
    }
    if(p1 || p2) load();
    return () => { cancelled = true; };
  }, [p1, p2]);
  const need = Math.ceil(config.bo/2);
  const cReady = d1.every(comboReady)&&d2.every(comboReady);

  const doScore = (pi,fin) => {
    // penalty: listed under loser pi, points go to opponent
    const scoringPi = fin.penalty ? 1-pi : pi;

    // Clear any pending finish selection
    setPendingFinish(null);

    // ── Normal scoring ───────────────────────────────────────────────────────
    const raw=[pts[0],pts[1]]; raw[scoringPi]+=fin.p;
    const cap = config.pts > 0 ? config.pts : Infinity;
    const np = [Math.min(raw[0],cap), Math.min(raw[1],cap)];

    const entry = {
      set:curSet,shuffle:shuf,round:log.slice(matchStartIdx).length+1,
      scorer:scoringPi===0?p1:p2,scorerIdx:scoringPi,judge:judge,penalty:fin.penalty||false,
      type:fin.id,typeName:fin.name,points:fin.p,
      p1Score:np[0],p2Score:np[1],p1Name:p1,p2Name:p2,
      p1Combo:{...d1[r1]},p2Combo:{...d2[r2]},
      p1ComboIdx:r1,p2ComboIdx:r2,
      p1Side:currentSides.p1Side||"",p2Side:currentSides.p2Side||"",
      winnerCombo:comboStr(scoringPi===0?d1[r1]:d2[r2]),
      time:new Date().toISOString(),
      _pp:[...pts],_ps:[...sets],_cs:curSet,
      _u1:[...used1],_u2:[...used2],_sh:shuf,_ls:[...lerStrikes],_ss:[...setScores],
    };
    const newLog=[...log,entry];
    setLog(newLog); sSave(KEYS.matchLog, newLog); setFuture([]); setPts(np);
    // Push to stream overlay (fire and forget)
    pushOverlay({lastFinish:{type:fin.id,scorerIdx:scoringPi},pts:np});

    const setWon = config.pts>0 && np[scoringPi]>=config.pts;

    // LER — 1-strike system: first LER adds a strike, second converts to a point
    if(fin.id==="LER"){
      if(setWon){
        const ns=[sets[0],sets[1]]; ns[scoringPi]+=1; setSets(ns);
        setSetScores(ss=>[...ss,{p1:np[0],p2:np[1]}]);
        if(ns[scoringPi]>=need){ saveCombosToStorage(); setPhase("over"); }
        else {
          if(config.tm){const loserPi=1-scoringPi;setSideAssign({pickPriority:loserPi});setSidePicker({priority:loserPi});}
          setCurSet(c=>c+1); setPts([0,0]); setUsed1([]); setUsed2([]); setShuf(s=>s+1);
          setLerStrikes([0,0]);
        }
      }
      // stay on battle screen — combos do not advance
      return;
    }

    // Any score change clears all LER strikes
    setLerStrikes([0,0]);
    const nu1=[...used1,r1]; const nu2=[...used2,r2];
    setUsed1(nu1); setUsed2(nu2); setR1(null); setR2(null);
    if(setWon){
      const ns=[sets[0],sets[1]]; ns[scoringPi]+=1; setSets(ns);
      setSetScores(ss=>[...ss,{p1:np[0],p2:np[1]}]);
      if(ns[scoringPi]>=need){ saveCombosToStorage(); setPhase("over"); }
      else {
        if(config.tm){ const loserPi=1-scoringPi; setSideAssign({pickPriority:loserPi}); setSidePicker({priority:loserPi}); }
        setCurSet(c=>c+1); setPts([0,0]); setUsed1([]); setUsed2([]); setShuf(s=>s+1);
      }
    } else {
      if(nu1.length>=3&&nu2.length>=3){ setUsed1([]); setUsed2([]); setShuf(s=>s+1); }
      // stay on battle screen — combos reset via setR1/setR2 null above
    }
  };

  const undo = () => {
    // Always allow undoing a LER-STRIKE, even across the matchStartIdx boundary
    const lastIsStrike = log.length>0 && log[log.length-1]?.type==="LER-STRIKE";
    if(log.length<=matchStartIdx && !lastIsStrike) return;
    const l=log[log.length-1];
    const undoLog = log.slice(0,-1); setFuture([l,...future]); setLog(undoLog); sSave(KEYS.matchLog, undoLog);
    setPts(l._pp); setSets(l._ps); setCurSet(l._cs);
    setUsed1(l._u1); setUsed2(l._u2); setShuf(l._sh);
    if(l._ls) setLerStrikes(l._ls);
    if(l._ss) setSetScores(l._ss);
    setPendingFinish(null);
    // preserve r1/r2 — do not reset combo selection on undo
    setPhase("battle");
  };

  const redo = () => {
    if(!future.length)return;
    const n=future[0]; setFuture(future.slice(1));
    const redoLog=[...log,n]; setLog(redoLog); sSave(KEYS.matchLog, redoLog); setPts([n.p1Score,n.p2Score]);
    const nu1=[...n._u1,n.p1ComboIdx]; const nu2=[...n._u2,n.p2ComboIdx];
    if(nu1.length>=3&&nu2.length>=3){ setUsed1([]); setUsed2([]); setShuf(n._sh+1); }
    else { setUsed1(nu1); setUsed2(nu2); setShuf(n._sh); }
    if(config.pts>0&&(n.p1Score>=config.pts||n.p2Score>=config.pts)){
      const ns=[sets[0],sets[1]]; ns[n.scorerIdx]+=1; setSets(ns);
      setSetScores(ss=>[...ss,{p1:n.p1Score,p2:n.p2Score}]);
      if(ns[n.scorerIdx]>=need)setPhase("over");
      else { setCurSet(c=>c+1); setPts([0,0]); setUsed1([]); setUsed2([]); setShuf(s=>s+1); }
    }
  };

  const saveCombosToStorage = () => {
    const saved = sGet(KEYS.combos, {});
    [[p1, d1],[p2, d2]].forEach(([name, deck])=>{
      if(!name) return;
      const prev = (saved[name] || []).map(normalizeCombo);

    const stepLabel = step===1?"Select P1":step===2?"Select P2":step===3?"Select Judge on Duty":"Ready";
