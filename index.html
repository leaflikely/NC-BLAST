    const playersSelected = p1 && p2;
    const step = !p1 ? 1 : !p2 ? 2 : (config.tm && !judge.trim()) ? 3 : "done";
    const stepLabel = step===1?"Select P1":step===2?"Select P2":step===3?"Select Judge on Duty":"Ready";
    const stepColor = step===1?"#2563EB":step===2?"#DC2626":step===3?"#B45309":"#15803D";

    const handleNameClick = (name) => {
      const tname = tn(name);
      const isP1 = tname===p1 || name===p1;
      const isP2 = tname===p2 || name===p2;
      const isJudge = config.tm && (name===judge || tname===judge);

      // Always deselect if already assigned — never affects other roles
      if(isP1){ setP1(null); return; }
      if(isP2){ setP2(null); return; }
      if(isJudge){ setJudge(""); setManualJudge(false); return; }

      // Unassigned name: fill first open slot in priority order p1 → p2 → judge
      if(!p1){ setP1(tname); return; }
      if(!p2){ setP2(tname); return; }
      if(config.tm && !judge.trim()){ setJudge(tname); return; }
      // All slots full — do nothing
    };

    const getButtonStyle = (name) => {
      const tname = tn(name);
      const isP1 = tname===p1 || name===p1;
      const isP2 = tname===p2 || name===p2;
      const isJudge = config.tm && (name===judge || tname===judge);
      if(isP1) return {border:"2px solid #2563EB",background:"#2563EB",color:"#fff"};
      if(isP2) return {border:"2px solid #DC2626",background:"#DC2626",color:"#fff"};
      if(isJudge) return {border:"2px solid #B45309",background:"#F59E0B",color:"#fff"};
      return {border:"2px solid var(--border)",background:"var(--surface2)",color:"var(--text-primary)"};
    };

    const canProceed = p1 && p2 && (!config.tm || judge.trim());
    const hasChallonge = !!challongeSlug;

    // Select a pairing from an active Challonge match
    const selectActivePairing = (match) => {
      const idMap = challongeParticipants || {};
      const reverseMap = {};
      Object.entries(idMap).forEach(([name,id])=>{ reverseMap[String(id)]=name; });
      const name1 = match.player1_name || reverseMap[String(match.player1_id)] || `ID:${match.player1_id}`;
      const name2 = match.player2_name || reverseMap[String(match.player2_id)] || `ID:${match.player2_id}`;
      setP1(tn(name1));
      setP2(tn(name2));
      setChallongeMatchId(match.id);
      // For group stage tournaments, winner_id must be player1_id/player2_id (the group player IDs),
      // NOT the real participant.id — Challonge validates winner_id against the match's player IDs directly.
      setChallongeP1ParticipantId(match.player1_id || null);
      setChallongeP2ParticipantId(match.player2_id || null);
      // Shared tablet: ask which judge is handling this match
      if (sharedJudges && config.tm) { setJudge(""); setSharedJudgePicker(true); }
    };

    return (
      <div style={{...S.page,maxHeight:"100dvh",overflowY:"auto"}}><button style={S.back} onClick={goBack}>{IC.back} Back</button>
        <h1 style={S.title}>Select Match</h1>

        {/* Step indicator */}
        <div style={{background:"var(--surface2)",borderRadius:12,padding:"10px 14px",marginBottom:12,border:`2px solid ${stepColor}30`,display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:stepColor,flexShrink:0}}/>
          <span style={{fontSize:13,fontWeight:700,color:stepColor}}>{stepLabel}</span>
          {step!==1&&<span style={{fontSize:11,color:"var(--text-muted)",marginLeft:"auto"}}>
            {p1&&<span style={{color:"#2563EB",fontWeight:600}}>{p1} </span>}
            {p1&&p2&&<span style={{color:"var(--text-muted)"}}>vs </span>}
            {p2&&<span style={{color:"#DC2626",fontWeight:600}}>{p2}</span>}
            {config.tm&&judge&&<span style={{color:"#B45309",fontWeight:600}}> · ⚖️{judge}</span>}
          </span>}
        </div>

        {/* Tabs — only show Active Matches if a Challonge tournament is loaded */}
        {hasChallonge&&!config.tm&&(
          <div style={{display:"flex",gap:0,marginBottom:12,borderRadius:10,overflow:"hidden",border:"2px solid var(--border)"}}>
            {[["roster","👥 Roster"],["active","⚡ Active Matches"]].map(([tab,label])=>(
              <button key={tab} type="button" onClick={()=>{ setPickTab(tab); if(tab==="active") fetchActiveMatches(); }}
                style={{flex:1,padding:"9px 0",border:"none",background:pickTab===tab?"#1D4ED8":"var(--surface)",color:pickTab===tab?"#fff":"var(--text-secondary)",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                {label}
              </button>
            ))}
          </div>
        )}

        {/* ── ROSTER TAB ── */}
        {pickTab==="roster"&&(
          <div style={S.card}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>
              {[...players].sort((a,b)=>a.localeCompare(b)).map(name=>{
                const btnStyle = getButtonStyle(name);
                const tname = tn(name);
                const tag = (p1===name||tname===p1)?"P1":(p2===name||tname===p2)?"P2":(judge===name&&config.tm)?"Judge":null;
                return (
                  <button key={name} onClick={()=>handleNameClick(name)}
                    style={{padding:"12px 8px",borderRadius:10,fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,...btnStyle}}>
                    {tn(name)}
                    {tag&&<span style={{fontSize:9,fontWeight:800,letterSpacing:1,opacity:0.85}}>{tag}</span>}
                  </button>
                );
              })}
            </div>
            {config.tm&&step===3&&(
              <div style={{marginTop:10,borderTop:"1px solid var(--border)",paddingTop:10}}>
                {!manualJudge?(
                  <button onClick={()=>setManualJudge(true)} style={{...S.upBtn,marginBottom:0,justifyContent:"center"}}>
                    Name not present — enter manually
                  </button>
                ):(
                  <JudgeInput style={{...S.inp,width:"100%",borderColor:"#F59E0B60",color:"var(--text-primary)"}} value={judge} onCommit={v=>{setJudge(v);setManualJudge(false);}} onClear={()=>{setJudge("");setManualJudge(false);}}/>
                )}
              </div>
            )}
          </div>
        )}

        {/* ── ACTIVE MATCHES TAB ── */}
        {pickTab==="active"&&(()=>{
          // Judge conflict: judge is one of the selected players
          const judgeIsPlayer = judge.trim() && (judge===p1||judge===p2||tn(judge)===p1||tn(judge)===p2);

          // canProceed: match selected + judge chosen (if tm) + no conflict
          const activeCanProceed = challongeMatchId&&p1&&p2&&(!config.tm||judge.trim())&&!judgeIsPlayer;

          return (
            <div>
              {/* ── Judge picker — always shown first ── */}
              <div style={{...S.card,marginBottom:8}}>
                <p style={{fontSize:11,fontWeight:700,color:"var(--text-muted)",letterSpacing:1,marginBottom:8,textTransform:"uppercase"}}>
                  {config.tm ? "1. Select Judge on Duty" : "Judge (optional)"}
                </p>
                {!manualJudge ? (
                  <div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:6,marginBottom:8}}>
                      {[...players].sort((a,b)=>a.localeCompare(b)).map(name=>{
                        const isJudge = judge===name;
                        return (
                          <button key={name} type="button" onClick={()=>setJudge(isJudge?"":name)}
                            style={{padding:"10px 6px",borderRadius:9,fontSize:12,fontWeight:600,fontFamily:"'Outfit',sans-serif",cursor:"pointer",border:`2px solid ${isJudge?"#B45309":"var(--border)"}`,background:isJudge?"#F59E0B":"var(--surface2)",color:isJudge?"#fff":"var(--text-primary)"}}>
                            {tn(name)}
                          </button>
                        );
                      })}
                    </div>
                    <button type="button" onClick={()=>setManualJudge(true)} style={{...S.upBtn,marginBottom:0,justifyContent:"center",fontSize:11}}>
                      Name not present — enter manually
                    </button>
                  </div>
                ) : (
                  <div style={{display:"flex",gap:8}}>
                    <JudgeInput style={{...S.inp,flex:1,borderColor:"#F59E0B60",color:"var(--text-primary)"}} value={judge} onCommit={v=>{setJudge(v);}} onClear={()=>{setJudge("");setManualJudge(false);}}/>
                    <button type="button" onClick={()=>{setManualJudge(false);setJudge("");}}
                      style={{padding:"0 12px",borderRadius:9,border:"2px solid var(--border)",background:"var(--surface2)",color:"var(--text-muted)",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer",flexShrink:0}}>
                      ✕
                    </button>
                  </div>
                )}
                {judge.trim()&&<p style={{fontSize:11,color:"#B45309",fontWeight:600,marginTop:8}}>⚖️ Judge: {judge}</p>}
              </div>

              {/* ── Match list ── */}
              <div style={{...S.card,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <p style={{fontSize:11,fontWeight:700,color:"var(--text-muted)",letterSpacing:1,textTransform:"uppercase",margin:0}}>
                    {config.tm ? "2. Select Match" : "Select Match"}
                  </p>
                  <button type="button" onClick={fetchActiveMatches}
                    style={{fontSize:12,fontWeight:700,color:"#1D4ED8",background:"#1D4ED820",border:"2px solid #1D4ED840",borderRadius:10,padding:"7px 14px",cursor:"pointer",fontFamily:"'Outfit',sans-serif",display:"flex",alignItems:"center",gap:5}}>
                    ↻ Refresh
                  </button>
                </div>
                {activeMatches==="loading"&&<p style={{fontSize:12,color:"var(--text-muted)",fontStyle:"italic",textAlign:"center",padding:"12px 0"}}>⏳ Loading active matches...</p>}
                {Array.isArray(activeMatches)&&(()=>{
                  const vis=activeMatches.filter(m=>{const n1=m.player1_name||"";const n2=m.player2_name||"";const inR=n=>players.some(p=>p===n||tn(p)===n||p===tn(n)||tn(p)===tn(n));return n1&&n2&&inR(n1)&&inR(n2);});
                  return vis.length===0?(<p style={{fontSize:12,color:"var(--text-muted)",fontStyle:"italic",textAlign:"center",padding:"12px 0"}}>{activeMatches.length===0?"No open matches found.":"No matches found involving your current roster."}</p>):null;
                })()}
                {!activeMatches&&<p style={{fontSize:12,color:"var(--text-muted)",fontStyle:"italic",textAlign:"center",padding:"12px 0"}}>Tap Refresh to load open matches.</p>}
                {Array.isArray(activeMatches)&&activeMatches
                  .filter(match=>{
                    const n1=match.player1_name||""; const n2=match.player2_name||"";
                    const inR=n=>players.some(p=>p===n||tn(p)===n||p===tn(n)||tn(p)===tn(n));
                    return n1&&n2&&inR(n1)&&inR(n2);
                  })
                  .map((match,mi)=>{
                  const name1 = match.player1_name || `ID:${match.player1_id}`;
                  const name2 = match.player2_name || `ID:${match.player2_id}`;
                  const isSelected = challongeMatchId===match.id;
                  const judgeConflict = judge.trim()&&(
                    judge===name1||judge===name2||tn(judge)===tn(name1)||tn(judge)===tn(name2)
                  );
                  return (
                    <div key={mi} style={{marginBottom:mi<activeMatches.length-1?8:0}}>
                      <button type="button"
                        disabled={judgeConflict}
                        onClick={()=>!judgeConflict&&selectActivePairing(match)}
                        style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"12px 14px",borderRadius:10,
                          border:`2px solid ${judgeConflict?"var(--border)":isSelected?"#1D4ED8":"var(--border)"}`,
                          background:judgeConflict?"var(--surface3)":isSelected?"#1D4ED820":"var(--surface2)",
                          opacity:judgeConflict?0.5:1,
                          cursor:judgeConflict?"not-allowed":"pointer",fontFamily:"'Outfit',sans-serif",textAlign:"left"}}>
                        <div>
                          <div style={{fontSize:13,fontWeight:800,color:judgeConflict?"var(--text-disabled)":"var(--text-primary)"}}>{tn(name1)} <span style={{fontWeight:400}}>vs</span> {tn(name2)}</div>
                          <div style={{fontSize:10,color:"var(--text-muted)",marginTop:2}}>Round {match.round} · Match #{match.suggested_play_order||mi+1}</div>
                          {judgeConflict&&<div style={{fontSize:10,color:"#DC2626",fontWeight:700,marginTop:3}}>⚠️ Judge is a player in this match</div>}
                        </div>
                        {!judgeConflict&&(isSelected
                          ? <span style={{fontSize:11,fontWeight:800,color:"#1D4ED8",flexShrink:0,marginLeft:8}}>✓ Selected</span>
                          : <span style={{fontSize:11,fontWeight:700,color:"var(--text-muted)",flexShrink:0,marginLeft:8}}>Select →</span>
                        )}
                      </button>
                    </div>
                  );
                })}
              </div>

              {/* ── Build Decks — shown as soon as a match is selected ── */}
              {challongeMatchId&&(
                <div>
                  {judgeIsPlayer&&(
                    <div style={{padding:"10px 14px",borderRadius:10,background:"#DC262615",border:"1px solid #DC262640",marginBottom:8,fontSize:12,fontWeight:600,color:"#DC2626",textAlign:"center"}}>
                      ⚠️ The selected judge is playing in this match. Please select a different judge.
                    </div>
                  )}
                  <button style={{...S.pri,margin:0,opacity:activeCanProceed?1:0.4}} disabled={!activeCanProceed}
                    onClick={()=>{refreshCombos();setMatchStartIdx(log.length);setFuture([]);setDeckReview(false);setPhase("deck");}}>
                    Build Decks →
                  </button>
                </div>
              )}
            </div>
          );
        })()}

        {pickTab==="roster"&&<button style={{...S.pri,opacity:canProceed?1:0.4}} disabled={!canProceed} onClick={()=>{refreshCombos();setMatchStartIdx(log.length);setFuture([]);setDeckReview(false);setPhase("deck");}}>Build Decks →</button>}
        {pickTab==="roster"&&config.tm&&playersSelected&&!judge.trim()&&<p style={{...S.hint,color:"#D97706"}}>Select the judge on duty to continue</p>}
      </div>
    );
  }

  if(phase==="deck"){
    // If not in review mode and picker is not open, auto-start on P1 first blade
    if(!deckReview&&!picker){
      openPicker({who:1,slot:0,cat:"blade"});
      return null;
    }

    // Review screen — shown when deckReview=true or picker is closed after finishing
    // Show a summary of what has been built so far with option to start or edit
    const comboNames=["First","Second","Third"];
    const allDone=cReady;
    return (
      <div style={{...S.page,maxHeight:"100dvh",overflowY:"auto"}}>
        <button style={S.back} onClick={goBack}>{IC.back} Back</button>
        <h1 style={S.title}>Deck Review</h1>
        <p style={S.sub}>Tap any part to change it</p>
        {[{who:1,name:p1,deck:d1,setDeck:setD1,cl:"#2563EB"},{who:2,name:p2,deck:d2,setDeck:setD2,cl:"#DC2626"}].map(pl=>(
          <div key={pl.who} style={{...S.card,borderLeft:`4px solid ${pl.cl}`,marginBottom:12}}>
            <p style={{fontSize:13,fontWeight:800,color:pl.cl,marginBottom:8}}>{pl.name}</p>
            {[0,1,2].map(slot=>(
              <div key={slot} style={{marginBottom:slot<2?8:0}}>
                <p style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",letterSpacing:1,marginBottom:4}}>{comboNames[slot].toUpperCase()} COMBO</p>
                <div style={{display:"flex",gap:6}}>
                  {["blade","ratchet","bit"].map(cat=>{
                    const cc={blade:"#EA580C",ratchet:"#1D4ED8",bit:"#15803D"}[cat];
                    const val=pl.deck[slot][cat];
                    return (
                      <button key={cat} onClick={()=>openPicker({who:pl.who,slot,cat,returnToReview:true})}
                        style={{flex:1,padding:"8px 4px",borderRadius:8,border:`2px solid ${val?cc:"#E2E8F0"}`,background:val?cc+"14":"var(--surface2)",color:val?cc:"var(--text-faint)",fontFamily:"'Outfit',sans-serif",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:44,gap:0}}>
                        {val ? <PartLabel name={val} size={splitPartName(val,cat!=="bit").length>1?10:12} keepDash={cat!=="bit"}/> : <span style={{fontSize:12,fontWeight:700}}>—</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        ))}
        <button style={{...S.pri,opacity:allDone?1:0.4}} disabled={!allDone} onClick={()=>{
          if(config.tm){setSideAssign({pickPriority:null});setSidePicker({priority:null});}
          setPhase("battle");
        }}>Start Match ⚔️</button>
        {!allDone&&<p style={S.hint}>Tap any missing part above to continue</p>}
      </div>
    );
  }

  // ── Shuffle Timer Screen ────────────────────────────────────────────────────
  if(shuffleTimer){
    const dismissTimer = () => { pushOverlay({shuffling:false}); setShuffleTimer(null); setUsed1([]); setUsed2([]); setShuf(s=>s+1); };
    return <ShuffleTimerInner onDismiss={dismissTimer}/>;
  }

  // ── Side Assignment Modal ──────────────────────────────────────────────────
  if(phase==="battle"&&sidePicker){
    const priorityKnown = sidePicker.priority !== null;
    const priorityName = priorityKnown ? (sidePicker.priority===0?p1:p2) : null;
    const priorityColor = priorityKnown ? (sidePicker.priority===0?"#2563EB":"#DC2626") : "#475569";
    const otherName = priorityKnown ? (sidePicker.priority===0?p2:p1) : null;

    return (
      <div style={{...S.page,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:0,maxHeight:"100dvh",overflowY:"auto"}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <p style={{fontSize:13,fontWeight:700,letterSpacing:2,color:"var(--text-muted)",textTransform:"uppercase",marginBottom:12}}>Set {curSet} · Assign Sides</p>
          <h1 style={{fontSize:38,fontWeight:900,color:"var(--text-primary)",margin:"0 0 10px",lineHeight:1}}>
            {priorityKnown ? "Pick a Side" : "Who Has Priority?"}
          </h1>
          {!priorityKnown&&<p style={{fontSize:16,color:"var(--text-secondary)",fontWeight:500}}>Judge: select the player with pick priority</p>}
          {priorityKnown&&<p style={{fontSize:16,color:"var(--text-secondary)"}}><span style={{color:priorityColor,fontWeight:800}}>{priorityName}</span> has pick priority</p>}
        </div>

        {/* Step 1: pick priority player */}
        {!priorityKnown&&(
          <div style={{width:"100%",marginBottom:16}}>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {[{name:p1,pi:0,cl:"#2563EB"},{name:p2,pi:1,cl:"#DC2626"}].map(pl=>(
                <button key={pl.pi} onClick={()=>setSidePicker({priority:pl.pi})}
                  style={{width:"100%",padding:"28px 0",borderRadius:20,border:`3px solid ${pl.cl}40`,background:`${pl.cl}0D`,color:pl.cl,fontSize:26,fontWeight:900,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                  {pl.name}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Step 2: priority player picks side */}
        {priorityKnown&&(
          <>
            <div style={{width:"100%",marginBottom:24}}>
              <p style={{fontSize:14,fontWeight:700,color:priorityColor,textAlign:"center",marginBottom:14,letterSpacing:0.5}}>{priorityName} — choose your side:</p>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {["B","X"].map(side=>(
                  <button key={side} onClick={()=>{
                    const p1Side = sidePicker.priority===0 ? side : (side==="B"?"X":"B");
                    const p2Side = sidePicker.priority===0 ? (side==="B"?"X":"B") : side;
                    setSideAssign({pickPriority:sidePicker.priority,p1Side,p2Side});
                    setCurrentSides({p1Side,p2Side});
                    setSidePicker(null);
                    setShuffleTimer("active");
                    pushOverlay({shuffling:true, p1Side, p2Side});
                  }} style={{width:"100%",padding:"36px 0",borderRadius:20,border:`3px solid ${priorityColor}40`,background:`${priorityColor}0D`,color:priorityColor,fontSize:48,fontWeight:900,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                    {side} Side
                  </button>
                ))}
              </div>
            </div>
            <div style={{width:"100%",background:"var(--surface2)",borderRadius:14,padding:"16px 20px",border:"1px solid var(--border)",textAlign:"center"}}>
              <p style={{fontSize:14,color:"var(--text-muted)"}}><strong style={{color:"var(--text-primary)"}}>{otherName}</strong> will be assigned the opposite side automatically.</p>
            </div>
          </>
        )}
      </div>
    );
  }


  if(phase==="over"){
    const winner=sets[0]>=need?p1:p2;
    const loserName=winner===p1?p2:p1;
    const cs=confirmState||{p1ok:false,p2ok:false,judgeok:false,voidConfirm:false};
    const allPlayersDone=cs.p1ok&&cs.p2ok;
    const submitted=cs.judgeok;

    // Undo the deciding battle and return to active play
    const undoMatchEnd = () => {
      if(!log.length) return;
      const last = log[log.length-1];
      // Restore all state from the last entry snapshot
      const restoredLog = log.slice(0,-1);
      setLog(restoredLog); sSave(KEYS.matchLog, restoredLog);
      setFuture([last, ...future]);
      setPts(last._pp);
      setSets(last._ps);
      setCurSet(last._cs);
      setUsed1(last._u1);
      setUsed2(last._u2);
      setShuf(last._sh);
      if(last._ss) setSetScores(last._ss); else setSetScores(ss => ss.slice(0,-1));
      setConfirmState(null);
      setOverBackConfirm(false);
      setR1(null); setR2(null); setPendingFinish(null);
      setPhase("battle");
    };

    return (
      <div style={{...S.page,paddingBottom:80}}>

        {/* ── Back button + confirm modal ── */}
        {!submitted&&(
          <button style={S.back} onClick={()=>setOverBackConfirm(true)}>{IC.back} Back</button>
        )}
        {overBackConfirm&&(
          <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.6)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
            <div style={{background:"var(--surface)",borderRadius:18,padding:"24px 20px",maxWidth:320,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}}>
              <p style={{fontSize:16,fontWeight:800,color:"var(--text-primary)",marginBottom:8,textAlign:"center"}}>Go Back?</p>
              <p style={{fontSize:13,color:"var(--text-secondary)",textAlign:"center",marginBottom:6,lineHeight:1.5}}>
                This will undo the last battle and return to the Pick Combo screen for the deciding set.
              </p>
              <p style={{fontSize:12,color:"var(--text-muted)",textAlign:"center",marginBottom:20,lineHeight:1.4}}>
                The match result will be reversed. Use this only if a scoring error was made.
              </p>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setOverBackConfirm(false)}
                  style={{flex:1,padding:"12px 0",borderRadius:10,border:"2px solid #E2E8F0",background:"#fff",color:"#475569",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                  Stay Here
                </button>
                <button onClick={undoMatchEnd}
                  style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:"#EA580C",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                  Undo & Go Back
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ── Winner hero — gradient color matches the winner's canonical player color ── */}
        {(()=>{
          const winnerIsP1 = winner===p1;
          const winnerColor = winnerIsP1 ? {g:"linear-gradient(135deg,#1D4ED8 0%,#2563EB 100%)",shadow:"rgba(37,99,235,0.35)"}
                                         : {g:"linear-gradient(135deg,#B91C1C 0%,#DC2626 100%)",shadow:"rgba(220,38,38,0.35)"};
          return (
            <div style={{background:winnerColor.g,borderRadius:20,padding:"28px 20px 24px",textAlign:"center",marginBottom:12,boxShadow:`0 8px 24px ${winnerColor.shadow}`}}>
              {config.tm&&config.tournamentName&&(
                <p style={{fontSize:10,fontWeight:700,letterSpacing:2,color:"rgba(255,255,255,0.55)",marginBottom:10,textTransform:"uppercase"}}>{config.tournamentName}</p>
              )}
              <p style={{fontSize:10,fontWeight:700,letterSpacing:3,color:"rgba(255,255,255,0.6)",marginBottom:8,textTransform:"uppercase"}}>Winner</p>
              <p style={{fontSize:winner&&winner.length>10?48:72,fontWeight:900,color:"#fff",lineHeight:1,margin:"0 0 10px",fontFamily:"'Outfit',sans-serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"0 8px"}}>{winner}</p>
              <p style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.5)",marginBottom:4,letterSpacing:1,textTransform:"uppercase"}}>defeats</p>
              <p style={{fontSize:loserName&&loserName.length>10?28:42,fontWeight:900,color:"rgba(255,255,255,0.75)",lineHeight:1,fontFamily:"'Outfit',sans-serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"0 8px"}}>{loserName}</p>
            </div>
          );
        })()}

        {/* ── Match score ── */}
        {config.bo>1&&(
          <div style={{...S.card,padding:"16px 20px",marginBottom:12}}>
            <p style={{fontSize:9,fontWeight:700,letterSpacing:2,color:"var(--text-muted)",textAlign:"center",marginBottom:12,textTransform:"uppercase"}}>Match Score</p>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{flex:1,textAlign:"center"}}>
                <p style={{fontSize:20,fontWeight:900,color:"#2563EB",marginBottom:4}}>{p1}{winner===p1?" 🏆":""}</p>
                <p style={{fontSize:52,fontWeight:900,color:winner===p1?"#2563EB":"var(--text-faint)",lineHeight:1}}>{sets[0]}</p>
              </div>
              <p style={{fontSize:22,fontWeight:800,color:"var(--border2)",minWidth:32,textAlign:"center"}}>–</p>
              <div style={{flex:1,textAlign:"center"}}>
                <p style={{fontSize:20,fontWeight:900,color:"#DC2626",marginBottom:4}}>{winner===p2?"🏆 ":""}{p2}</p>
                <p style={{fontSize:52,fontWeight:900,color:winner===p2?"#DC2626":"var(--text-faint)",lineHeight:1}}>{sets[1]}</p>
              </div>
            </div>
            {setScores.length>0&&(
              <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"center",flexWrap:"wrap"}}>
                {setScores.map((ss,i)=>{
                  const p1w=ss.p1>ss.p2;
                  return(
                    <div key={i} style={{textAlign:"center",background:p1w?"#2563EB15":"#DC262615",borderRadius:10,padding:"8px 14px",border:`1px solid ${p1w?"#2563EB40":"#DC262640"}`}}>
                      <p style={{fontSize:8,fontWeight:700,color:p1w?"#3B82F6":"#EF4444",letterSpacing:1,marginBottom:4}}>SET {i+1}</p>
                      <p style={{fontSize:18,fontWeight:900,lineHeight:1}}>
                        <span style={{color:p1w?"#2563EB":"var(--text-faint)"}}>{ss.p1}</span>
                        <span style={{color:"#CBD5E1",margin:"0 4px",fontSize:14}}>–</span>
                        <span style={{color:!p1w?"#DC2626":"var(--text-faint)"}}>{ss.p2}</span>
                      </p>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── Stats row ── */}
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {[{label:"Battles",val:log.slice(matchStartIdx).length},{label:"Shuffles",val:shuf}].map((s,i)=>(
            <div key={i} style={{flex:1,background:"var(--surface2)",borderRadius:12,padding:"10px 8px",textAlign:"center",border:"1px solid var(--border)"}}>
              <p style={{fontSize:9,fontWeight:700,color:"var(--text-muted)",letterSpacing:1,marginBottom:3,textTransform:"uppercase"}}>{s.label}</p>
              <p style={{fontSize:14,fontWeight:800,color:"var(--text-secondary)"}}>{s.val}</p>
            </div>
          ))}
          <div style={{flex:2,background:"var(--surface2)",borderRadius:12,padding:"8px",border:"1px solid var(--border)",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <p style={{fontSize:9,fontWeight:700,color:"var(--text-muted)",letterSpacing:1,textTransform:"uppercase"}}>Judge</p>
            {judgeEditMode ? (
              <div style={{display:"flex",gap:4,width:"100%"}}>
                <JudgeInput style={{...S.inp,flex:1,fontSize:12,padding:"3px 6px",borderRadius:6,minWidth:0}} value={judge} onCommit={v=>{setJudge(v);setJudgeEditMode(false);}} onClear={()=>setJudgeEditMode(false)}/>
                <button onClick={()=>setJudgeEditMode(false)}
                  style={{padding:"3px 8px",borderRadius:6,border:"none",background:"#2563EB",color:"#fff",fontSize:11,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>✓</button>
              </div>
            ) : (
              <button onClick={()=>!submitted&&setJudgeEditMode(true)}
                style={{fontSize:13,fontWeight:800,color:"var(--text-secondary)",background:"none",border:"none",cursor:submitted?"default":"pointer",fontFamily:"'Outfit',sans-serif",padding:0,textDecoration:submitted?"none":"underline dotted"}}>
                {judge||"—"}
              </button>
            )}
          </div>
        </div>

        {/* ── Match history ── */}
        <div style={{...S.card,marginBottom:12}}>
          <p style={{fontSize:12,fontWeight:700,color:"var(--text-primary)",marginBottom:8}}>Match History</p>
          {log.slice(matchStartIdx).map((e,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:i<log.slice(matchStartIdx).length-1?"1px solid #F1F5F9":"none"}}>
              <span style={{fontSize:11,color:"var(--text-muted)"}}>B{e.round} · Set {e.set}{e.p1Side?` · ${e.p1Side}/${e.p2Side}`:""}</span>
              <span style={{fontSize:11,fontWeight:700,color:e.scorerIdx===0?"#2563EB":"#DC2626"}}>{e.scorer} — {e.typeName} +{e.points}{e.penalty?" (pen)":""}</span>
              <span style={{fontSize:11,color:"var(--text-muted)"}}>{e.p1Score}–{e.p2Score}</span>
            </div>
          ))}
        </div>

        {/* ── Tournament mode: player confirms + judge submit modal trigger ── */}
        {config.tm&&!submitted&&(
          <div style={{...S.card,border:"2px solid #7C3AED30",background:"#7C3AED0A",marginBottom:12}}>
            <p style={{fontSize:11,fontWeight:700,color:"#7C3AED",marginBottom:10,textAlign:"center",letterSpacing:1}}>CONFIRM RESULT</p>
            <p style={{fontSize:11,color:"#64748B",textAlign:"center",marginBottom:12}}>Both players confirm, then the judge submits.</p>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <button onClick={()=>setConfirmState({...cs,p1ok:true})} disabled={cs.p1ok}
                style={{flex:1,padding:"11px 0",borderRadius:10,border:"none",background:cs.p1ok?"#15803D":"#2563EB",color:"#fff",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:cs.p1ok?"default":"pointer",opacity:cs.p1ok?0.75:1}}>
                {cs.p1ok?"✓ "+p1:p1+" — Confirm"}
              </button>
              <button onClick={()=>setConfirmState({...cs,p2ok:true})} disabled={cs.p2ok}
                style={{flex:1,padding:"11px 0",borderRadius:10,border:"none",background:cs.p2ok?"#15803D":"#DC2626",color:"#fff",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:cs.p2ok?"default":"pointer",opacity:cs.p2ok?0.75:1}}>
                {cs.p2ok?"✓ "+p2:p2+" — Confirm"}
              </button>
            </div>
            {allPlayersDone&&(
              <button onClick={()=>setJudgeSubmitModal(true)}
                style={{display:"block",width:"100%",padding:"12px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#7C3AED,#6D28D9)",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                ⚖️ Judge Confirms →
              </button>
            )}
            {!allPlayersDone&&<p style={{...S.hint,marginTop:8}}>Both players must confirm before judge can act</p>}
          </div>
        )}

        {/* ── Judge submit modal (checkboxes for Challonge + Sheets) ── */}
        {judgeSubmitModal&&(()=>{
          const winnerIsP1=sets[0]>=need;
          const winnerId=winnerIsP1?challongeP1ParticipantId:challongeP2ParticipantId;
          const p1FinalScore=sets[0]; const p2FinalScore=sets[1];
          const hasChallonge=!!(challongeSlug&&challongeMatchId);
          return (
            <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.7)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
              <div style={{background:"var(--surface)",borderRadius:18,padding:"22px 20px",maxWidth:340,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.4)",border:"1px solid var(--border)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <p style={{fontSize:16,fontWeight:800,color:"var(--text-primary)",margin:0}}>Submit Results</p>
                  <button onClick={()=>setJudgeSubmitModal(false)} style={{background:"var(--surface3)",border:"none",borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"var(--text-muted)"}}>{IC.x}</button>
                </div>
                <p style={{fontSize:12,color:"var(--text-muted)",marginBottom:14,lineHeight:1.5}}>
                  <strong style={{color:"var(--text-primary)"}}>{winner}</strong> defeats {loserName} · {p1FinalScore}–{p2FinalScore}
                </p>
                {[
                  {val:submitSheetsCheck,set:setSubmitSheetsCheck,label:"Submit to Sheets Database",desc:"Sends match data to the NC BLAST stat tracker",disabled:false},
                  {val:submitChallongeCheck,set:setSubmitChallongeCheck,label:"Submit to Challonge",desc:hasChallonge?"Reports result to the active bracket match":"No bracket match selected",disabled:!hasChallonge},
                ].map((opt,oi)=>(
                  <button key={oi} type="button" disabled={opt.disabled} onClick={()=>!opt.disabled&&opt.set(v=>!v)}
                    style={{display:"flex",alignItems:"flex-start",gap:12,width:"100%",padding:"11px 13px",borderRadius:11,border:`2px solid ${opt.val&&!opt.disabled?"#2563EB":"var(--border)"}`,background:opt.val&&!opt.disabled?"#2563EB20":"var(--surface2)",cursor:opt.disabled?"not-allowed":"pointer",marginBottom:8,textAlign:"left",fontFamily:"'Outfit',sans-serif",opacity:opt.disabled?0.45:1}}>
                    <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${opt.val&&!opt.disabled?"#2563EB":"var(--border2)"}`,background:opt.val&&!opt.disabled?"#2563EB":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginTop:1}}>
                      {opt.val&&!opt.disabled&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
                    </div>
                    <div><p style={{fontSize:13,fontWeight:700,color:"var(--text-primary)",margin:"0 0 2px"}}>{opt.label}</p><p style={{fontSize:11,color:"var(--text-muted)",margin:0,lineHeight:1.4}}>{opt.desc}</p></div>
                  </button>
                ))}
                {challongeSubmitStatus==="ok"&&<p style={{fontSize:11,color:"#15803D",fontWeight:600,textAlign:"center",marginBottom:6}}>✓ Challonge submitted</p>}
                {challongeSubmitStatus&&challongeSubmitStatus!=="ok"&&challongeSubmitStatus!=="loading"&&<p style={{fontSize:11,color:"#DC2626",fontWeight:600,textAlign:"center",marginBottom:6}}>✕ Challonge: {challongeSubmitStatus}</p>}
                {sheetsStatus==="success"&&<p style={{fontSize:11,color:"#15803D",fontWeight:600,textAlign:"center",marginBottom:6}}>✓ Sheets submitted</p>}
                {sheetsStatus==="error"&&<p style={{fontSize:11,color:"#DC2626",fontWeight:600,textAlign:"center",marginBottom:6}}>✕ Sheets failed — CSV downloaded</p>}
                <button disabled={challongeSubmitStatus==="loading"}
                  onClick={()=>{
                    setJudgeSubmitModal(false);
                    setConfirmState({...cs,judgeok:true});
                    if(submitSheetsCheck){
                      onSendSheets(log.slice(matchStartIdx),{p1,p2,sets,config,winner,shuffles:shuf});
                    } else {
                      onDownloadCSV(log.slice(matchStartIdx),{p1,p2,sets,config,winner,shuffles:shuf});
                    }
                    if(submitChallongeCheck&&hasChallonge){
                      submitChallongeScore(challongeMatchId,p1FinalScore,p2FinalScore,winnerId);
                    }
                  }}
                  style={{display:"block",width:"100%",padding:"13px 0",borderRadius:11,border:"none",background:"linear-gradient(135deg,#7C3AED,#6D28D9)",color:"#fff",fontSize:14,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer",marginTop:4}}>
                  {challongeSubmitStatus==="loading"?"Submitting…":"Submit"}
                </button>
              </div>
            </div>
          );
        })()}

        {/* ── Actions ── */}
        {submitted&&<button style={S.pri} onClick={()=>{setSheetsStatus(null);reset();}}>New Match</button>}
        {!config.tm&&(
          <>
            {challongeSlug&&challongeMatchId&&(()=>{
              const winnerIsP1=sets[0]>=need;
              const winnerId=winnerIsP1?challongeP1ParticipantId:challongeP2ParticipantId;
              return challongeSubmitStatus==="ok"
                ? <div style={{padding:"10px 14px",borderRadius:10,background:"#15803D15",border:"1px solid #15803D40",fontSize:12,fontWeight:600,color:"#15803D",textAlign:"center",marginBottom:8}}>✓ Submitted to Challonge</div>
                : <button type="button" disabled={challongeSubmitStatus==="loading"}
                    onClick={()=>submitChallongeScore(challongeMatchId,sets[0],sets[1],winnerId)}
                    style={{display:"block",width:"100%",padding:"11px 0",borderRadius:10,border:"none",background:challongeSubmitStatus==="loading"?"#CBD5E1":"#EA580C",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:challongeSubmitStatus==="loading"?"not-allowed":"pointer",marginBottom:8}}>
                    {challongeSubmitStatus==="loading"?"Submitting…":`Submit to Challonge${winnerId?"":" ⚠️"}`}
                  </button>;
            })()}
            <button style={S.pri} onClick={()=>{setSheetsStatus(null);reset();}}>New Match</button>
          </>
        )}
        <button style={{...S.sec,width:"100%",justifyContent:"center"}} onClick={()=>onDownloadCSV(log.slice(matchStartIdx),{p1,p2,sets,config,winner,shuffles:shuf})}>{IC.download} Download CSV</button>
        <button style={{display:"block",width:"100%",padding:"10px 0",borderRadius:10,border:"2px solid var(--border)",background:"var(--surface2)",color:"var(--text-muted)",fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif",cursor:"pointer",marginTop:6,textAlign:"center"}} onClick={()=>{setSheetsStatus(null);reset();onMainMenu();}}>⬅ Main Menu</button>

        {config.tm&&sheetsStatus==="success"&&(
          <div style={{marginTop:10,padding:"10px 14px",borderRadius:10,background:"#15803D15",border:"1px solid #15803D40",fontSize:12,fontWeight:600,color:"#15803D",textAlign:"center"}}>
            ✓ Results submitted to Google Sheets
          </div>
        )}
        {config.tm&&sheetsStatus==="error"&&(
          <div style={{marginTop:10,padding:"10px 14px",borderRadius:10,background:"#DC262615",border:"1px solid #DC262640",fontSize:12,fontWeight:600,color:"#DC2626",textAlign:"center"}}>
            ✕ Sheets submission failed — download CSV manually
          </div>
        )}
      </div>
    );
  }

  // Battle screen (merged: combo pick + scoring in one view)
  const comboOf = (deck, idx) => deck[idx] || {};
  const battlesInThisSet = log.slice(matchStartIdx).filter(e=>e.set===curSet&&e.type!=="LER-STRIKE"&&e.type!=="LER").length + 1;
  const sc2 = S.page.maxWidth / 480;
  const bp = (n) => Math.round(n * sc2);
  const bf = (n) => Math.round(n * sc2);
  // Font scale multipliers — derived directly from sectionH pixel values so text
  // always matches the current bubble size. Natural heights are the defaults when
  // sectionH is null (score ~90px, combo ~44px at base scale).
  const SCORE_NATURAL_H = bp(90);
  const COMBO_NATURAL_H = bp(44);
  const scoreFrac = sectionH.score ? Math.max(0.2, Math.min(4.0, sectionH.score / SCORE_NATURAL_H)) : 1;
  const comboFrac = sectionH.combo ? Math.max(0.2, Math.min(4.0, sectionH.combo / COMBO_NATURAL_H)) : 1;

  // Portrait = taller than wide → stack combos vertically; landscape → side by side
  const comboLayout = window.innerHeight > window.innerWidth ? "column" : "row";

  // Display-order mapping: when swapped, left slot = p2 (canonical), right = p1.
  // Colors ALWAYS stay with the canonical player: p1=blue, p2=red.
  // All scoring state (pts, sets, setScores, scorerIdx) uses canonical indices 0=p1, 1=p2.
  const dA = swapped ? {name:p2,deck:d2,ri:r2,setRi:setR2,used:used2,setUsed:setUsed2,ci:1,cl:"#DC2626",pts:pts[1],sets:sets[1],pending:pendingFinish?.pi===1?pendingFinish.fin:null}
                     : {name:p1,deck:d1,ri:r1,setRi:setR1,used:used1,setUsed:setUsed1,ci:0,cl:"#2563EB",pts:pts[0],sets:sets[0],pending:pendingFinish?.pi===0?pendingFinish.fin:null};
  const dB = swapped ? {name:p1,deck:d1,ri:r1,setRi:setR1,used:used1,setUsed:setUsed1,ci:0,cl:"#2563EB",pts:pts[0],sets:sets[0],pending:pendingFinish?.pi===0?pendingFinish.fin:null}
                     : {name:p2,deck:d2,ri:r2,setRi:setR2,used:used2,setUsed:setUsed2,ci:1,cl:"#DC2626",pts:pts[1],sets:sets[1],pending:pendingFinish?.pi===1?pendingFinish.fin:null};

  const bothCombosSelected = r1 !== null && r2 !== null;
  const pending1 = pendingFinish?.pi===0 ? pendingFinish.fin : null;
  const pending2 = pendingFinish?.pi===1 ? pendingFinish.fin : null;

  // Battle screen: position:fixed full viewport
  const COMBO_ROW_H = bp(54); // fixed height for combo picker row
  const STRIP_H = bp(36);     // top strip height
  return (
    <ErrorBoundary><div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",background:"var(--bg-solid)",boxSizing:"border-box",overflow:"hidden"}}>

      {/* ── Top strip: Back · pills │ 📡 ⠿ (expand) │ history · undo · redo · dark · swap ── */}
      <div style={{height:STRIP_H,display:"flex",alignItems:"center",gap:bp(4),padding:`0 ${bp(8)}px`,flexShrink:0,borderBottom:"1px solid var(--border)",background:config.tm?"#6D28D9":"var(--surface)"}}>
        {/* Left: back + set pills */}
        <button style={{...S.back,marginBottom:0,flexShrink:0,fontSize:bf(12),color:config.tm?"#E9D5FF":undefined}} onClick={goBack}>{IC.back}</button>
        {config.bo>1&&<span style={{...S.pill,flexShrink:0,margin:0,fontSize:bf(9),...(config.tm?{background:"rgba(255,255,255,0.18)",color:"#E9D5FF",border:"1px solid rgba(255,255,255,0.2)"}:{})}}>Set {curSet}/{config.bo}</span>}
        <span style={{...S.pill,flexShrink:0,margin:0,fontSize:bf(9),...(config.tm?{background:"rgba(255,255,255,0.18)",color:"#E9D5FF",border:"1px solid rgba(255,255,255,0.2)"}:{})}}>B{battlesInThisSet}</span>
        {config.bo>1&&<span style={{...S.pill,flexShrink:0,margin:0,fontSize:bf(9),...(config.tm?{background:"rgba(255,255,255,0.18)",color:"#E9D5FF",border:"1px solid rgba(255,255,255,0.2)"}:{})}}>{dA.sets}–{dB.sets}</span>}

        {/* Centre: 📡 + ⠿ — flex:1 so they fill the gap between pills and icon buttons */}
        <div style={{flex:1,display:"flex",alignItems:"center",gap:bp(4),minWidth:0}}>
          {/* Stream overlay button */}
          <button type="button" onClick={()=>setOverlayModal(true)}
            style={{flex:1,height:bp(26),display:"flex",alignItems:"center",justifyContent:"center",background:overlaySlot>0?"#1D4ED8":"none",border:overlaySlot>0?"none":`1px solid ${config.tm?"rgba(255,255,255,0.3)":"var(--border2)"}`,color:overlaySlot>0?"#fff":config.tm?"#E9D5FF":"var(--text-muted)",borderRadius:bp(6),fontSize:bf(overlaySlot>0?9:13),fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer",lineHeight:1,minWidth:0}}
            title="Stream overlay">
            {overlaySlot>0?`📡 ${overlaySlot}`:"📡"}
          </button>
          {/* Contact TO button — only shown when a Challonge match is active */}
          {challongeMatchId&&challongeSlug&&(
            <button type="button" onClick={()=>setPingModal(true)}
              style={{flex:1,height:bp(26),display:"flex",alignItems:"center",justifyContent:"center",background:"#DC2626",border:"none",color:"#fff",borderRadius:bp(6),fontSize:bf(9),fontWeight:900,fontFamily:"'Outfit',sans-serif",cursor:"pointer",lineHeight:1,minWidth:0}}
              title="Contact Tournament Organizer">
              🚨 TO
            </button>
          )}
          {/* Layout edit mode toggle */}
          <button type="button" onClick={()=>setLayoutEditMode(m=>!m)}
            style={{flex:1,height:bp(26),display:"flex",alignItems:"center",justifyContent:"center",background:layoutEditMode?"#7C3AED":"none",border:layoutEditMode?"none":`1px solid ${config.tm?"rgba(255,255,255,0.3)":"var(--border2)"}`,color:layoutEditMode?"#fff":config.tm?"#E9D5FF":"var(--text-muted)",borderRadius:bp(6),fontSize:bf(13),fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer",lineHeight:1,position:"relative",zIndex:160,minWidth:0}}
            title={layoutEditMode?"Exit layout edit":"Adjust layout heights"}>
            ⠿
          </button>
        </div>

        {/* Right: history · undo · redo · dark · swap */}
        <div style={{display:"flex",alignItems:"center",gap:bp(1),flexShrink:0}}>
          <button onClick={()=>setHistoryOpen(true)} style={{background:"none",border:"none",color:config.tm?"#C4B5FD":"var(--text-muted)",cursor:"pointer",padding:`${bp(3)}px ${bp(4)}px`,display:"flex",alignItems:"center"}}>{IC.history}</button>
          <button onClick={undo} disabled={log.length<=matchStartIdx&&log[log.length-1]?.type!=="LER-STRIKE"} style={{background:"none",border:"none",color:(log.length>matchStartIdx||log[log.length-1]?.type==="LER-STRIKE")?(config.tm?"#C4B5FD":"var(--text-muted)"):"var(--text-disabled)",cursor:(log.length>matchStartIdx||log[log.length-1]?.type==="LER-STRIKE")?"pointer":"default",padding:`${bp(3)}px ${bp(4)}px`,display:"flex",alignItems:"center"}}>{IC.undo}</button>
          <button onClick={redo} disabled={!future.length} style={{background:"none",border:"none",color:future.length?"#EA580C":"var(--text-disabled)",cursor:future.length?"pointer":"default",padding:`${bp(3)}px ${bp(4)}px`,display:"flex",alignItems:"center"}}>{IC.redo}</button>
          <button onClick={toggleDark} style={{background:"none",border:"none",cursor:"pointer",padding:`${bp(3)}px ${bp(3)}px`,fontSize:bf(14),lineHeight:1}}>{dark?"☀️":"🌙"}</button>
          {currentSides.p1Side&&(
            <button type="button" onClick={()=>{
              // Toggle display order only — canonical p1/p2, sets[], pts[], setScores[] are untouched.
              // Sides follow the display: after swap, left slot shows p2's side label and vice versa.
              setSwapped(s=>!s);
              setCurrentSides(cs=>({p1Side:cs.p2Side,p2Side:cs.p1Side}));
              setSideAssign(a=>a?{...a,p1Side:a.p2Side||"",p2Side:a.p1Side||""}:a);
            }}
              style={{padding:`${bp(2)}px ${bp(5)}px`,borderRadius:bp(6),border:config.tm?"1px solid rgba(255,255,255,0.3)":"1px solid var(--border2)",background:config.tm?"rgba(255,255,255,0.15)":"var(--surface)",color:config.tm?"#E9D5FF":"var(--text-secondary)",fontSize:bf(9),fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
              ⇄ Swap
            </button>
          )}
        </div>
      </div>



      {/* ── Score block ── */}

        const PING_REASONS = ["Challenge","Rules Question","General Escalation","Other"];
        // Build the comment that gets sent: reason + stadium + any typed note
        const buildComment = () => {
          const parts = [];
          if(pingReason) parts.push(`Reason: ${pingReason}`);
          if(pingStadium) parts.push(`Stadium: ${pingStadium}`);
          if(pingComment.trim()) parts.push(pingComment.trim());
          return parts.join(" | ");
        };
        return (
          <div onClick={()=>{if(!pingSending) closePing();}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 20px"}}>
            <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface)",borderRadius:bp(18),padding:`${bp(20)}px ${bp(20)}px`,width:"100%",maxWidth:340,boxShadow:"0 12px 40px rgba(0,0,0,0.4)",border:"2px solid #DC2626"}}>
              {pingSent?(
                <div style={{textAlign:"center",padding:`${bp(12)}px 0`}}>
                  <div style={{fontSize:40,marginBottom:bp(10)}}>✅</div>
                  <p style={{fontSize:bf(14),fontWeight:900,color:"var(--text-primary)",marginBottom:bp(6)}}>TO Notified</p>
                  <p style={{fontSize:bf(10),color:"var(--text-muted)",marginBottom:bp(16)}}>Your ping has been sent.</p>
                  <button type="button" onClick={closePing} style={{width:"100%",padding:`${bp(10)}px`,borderRadius:bp(10),border:"none",background:"var(--surface3)",color:"var(--text-primary)",fontSize:bf(11),fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>Close</button>
                </div>
              ):(
                <>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:bp(14)}}>
                    <div>
                      <p style={{fontSize:bf(14),fontWeight:900,color:"#DC2626",margin:0}}>🚨 Contact TO</p>
                      <p style={{fontSize:bf(9),color:"var(--text-muted)",margin:0,marginTop:2}}>Ping the tournament organizer</p>
                    </div>
                    <button type="button" onClick={closePing} style={{background:"var(--surface3)",border:"none",borderRadius:bp(6),width:bp(26),height:bp(26),display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"var(--text-muted)",fontSize:bf(11),fontWeight:700}}>✕</button>
                  </div>
                  {/* Auto-included match info */}
                  <div style={{background:"var(--surface2)",borderRadius:bp(10),padding:`${bp(10)}px ${bp(12)}px`,marginBottom:bp(14),border:"1px solid var(--border)"}}>
                    <p style={{fontSize:bf(8),color:"var(--text-faint)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,margin:"0 0 4px"}}>Match Info (auto-included)</p>
                    <p style={{fontSize:bf(10),fontWeight:800,color:"var(--text-primary)",margin:0}}>{p1||"?"} vs {p2||"?"}</p>
                    {judge&&<p style={{fontSize:bf(9),color:"var(--text-muted)",margin:"2px 0 0"}}>Judge: {judge}</p>}
                  </div>
                  {/* Reason selector */}
                  <p style={{fontSize:bf(9),fontWeight:700,color:"var(--text-secondary)",marginBottom:bp(6),textTransform:"uppercase",letterSpacing:0.8}}>Reason</p>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:bp(14)}}>
                    {PING_REASONS.map(r=>{
                      const sel = pingReason===r;
                      return (
                        <button key={r} type="button" onClick={()=>setPingReason(sel?null:r)}
                          style={{padding:`${bp(8)}px ${bp(6)}px`,borderRadius:bp(9),border:`2px solid ${sel?"#DC2626":"var(--border2)"}`,background:sel?"#DC262618":"var(--surface2)",color:sel?"#DC2626":"var(--text-secondary)",fontSize:bf(9),fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer",textAlign:"center",lineHeight:1.2}}>
                          {r}
                        </button>
                      );
                    })}
                  </div>
                  {/* Stadium selector */}
                  <p style={{fontSize:bf(9),fontWeight:700,color:"var(--text-secondary)",marginBottom:bp(6),textTransform:"uppercase",letterSpacing:0.8}}>Stadium</p>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:5,marginBottom:bp(14)}}>
                    {[1,2,3,4,5,6].map(n=>{
                      const sel = pingStadium===n;
                      return (
                        <button key={n} type="button" onClick={()=>setPingStadium(sel?null:n)}
                          style={{padding:`${bp(8)}px 0`,borderRadius:bp(9),border:`2px solid ${sel?"#DC2626":"var(--border2)"}`,background:sel?"#DC262618":"var(--surface2)",color:sel?"#DC2626":"var(--text-secondary)",fontSize:bf(13),fontWeight:900,fontFamily:"'Outfit',sans-serif",cursor:"pointer",textAlign:"center"}}>
                          {n}
                        </button>
                      );
                    })}
                  </div>
                  {/* Optional typed note */}
                  <p style={{fontSize:bf(9),fontWeight:700,color:"var(--text-secondary)",marginBottom:bp(6),textTransform:"uppercase",letterSpacing:0.8}}>Additional Note (optional)</p>
                  <textarea
                    value={pingComment}
                    onChange={e=>setPingComment(e.target.value)}
                    placeholder="Any extra details…"
                    rows={2}
                    style={{width:"100%",borderRadius:bp(10),border:"1px solid var(--border2)",background:"var(--input-bg)",color:"var(--text-primary)",fontSize:bf(10),fontFamily:"'Outfit',sans-serif",padding:`${bp(8)}px ${bp(10)}px`,resize:"none",outline:"none",boxSizing:"border-box"}}
                  />
                  <button type="button" disabled={pingSending} onClick={async()=>{
                    setPingSending(true);
                    try {
                      await fetch(`${OVERLAY_WORKER}/pings/send`, {
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({slug:challongeSlug,judge,p1,p2,comment:buildComment()}),
                      });
                      setPingSent(true);
                    } catch(_) { alert("Failed to send ping. Check your connection."); }
                    finally { setPingSending(false); }
                  }} style={{marginTop:bp(12),width:"100%",padding:`${bp(12)}px`,borderRadius:bp(10),border:"none",background:pingSending?"#991B1B":"#DC2626",color:"#fff",fontSize:bf(12),fontWeight:900,fontFamily:"'Outfit',sans-serif",cursor:pingSending?"not-allowed":"pointer",opacity:pingSending?0.7:1}}>
                    {pingSending?"Sending…":"🚨 Send Ping to TO"}
                  </button>
                </>
              )}
            </div>
          </div>
        );
      })()}

      {/* Match history slide-over (kept from BottomBar, triggered by strip button) */}
      <div style={{position:"fixed",top:0,right:0,bottom:0,width:historyOpen?Math.min(340,window.innerWidth-40):0,background:"var(--surface)",boxShadow:historyOpen?"-4px 0 24px rgba(0,0,0,0.25)":"none",transition:"width 0.25s ease",overflow:"hidden",zIndex:100}}>
        <div style={{width:Math.min(340,window.innerWidth-40),padding:"20px 16px",overflowY:"auto",height:"100%"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"var(--text-primary)"}}>Match Log</h2>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {log.length>0&&<button onClick={()=>setHistoryConfirmClear(true)} style={{background:"none",border:"none",color:"#EF4444",fontSize:11,fontWeight:600,fontFamily:"'Outfit',sans-serif",cursor:"pointer",opacity:0.7,padding:"4px 6px"}}>Clear</button>}
              <button onClick={()=>setHistoryOpen(false)} style={{background:"var(--surface3)",border:"none",borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"var(--text-muted)"}}>{IC.x}</button>
            </div>
          </div>
          {historyConfirmClear&&(
            <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.5)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
              <div style={{background:"var(--surface)",borderRadius:18,padding:"24px 20px",maxWidth:320,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",border:"1px solid var(--border)"}}>
                <p style={{fontSize:16,fontWeight:800,color:"var(--text-primary)",marginBottom:8,textAlign:"center"}}>Clear Match Log?</p>
                <p style={{fontSize:13,color:"var(--text-secondary)",textAlign:"center",marginBottom:20,lineHeight:1.5}}>This will permanently delete all <strong style={{color:"#EF4444"}}>{log.length} battle records</strong> from the log. This cannot be undone.</p>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setHistoryConfirmClear(false)}
                    style={{flex:1,padding:"12px 0",borderRadius:10,border:"2px solid var(--border)",background:"var(--surface)",color:"var(--text-secondary)",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                    Cancel
                  </button>
                  <button onClick={()=>{setLog([]);sSave(KEYS.matchLog,[]);setHistoryConfirmClear(false);setHistoryOpen(false);}}
                    style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:"#EF4444",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                    Clear All
                  </button>
                </div>
              </div>
            </div>
          )}
          {log.length===0&&<p style={{color:"var(--text-disabled)",fontSize:13,fontStyle:"italic"}}>No battles yet</p>}
          {log.slice().reverse().map((e,i)=>(
            <div key={i} style={{padding:"10px 12px",borderRadius:10,marginBottom:8,background:e.scorerIdx===0?"#EFF6FF22":"#FEF2F222",borderLeft:`4px solid ${e.scorerIdx===0?"#2563EB":"#DC2626"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <span style={{fontWeight:700,color:e.scorerIdx===0?"#2563EB":"#DC2626",fontSize:14}}>{e.scorer}</span>
                <span style={{fontSize:11,fontWeight:600,color:"var(--text-muted)"}}>R{log.length-i} · Set {e.set}</span>
              </div>
              <div style={{fontSize:12,color:"var(--text-secondary)",marginBottom:2}}><span style={{fontWeight:700,color:e.scorerIdx===0?"#2563EB":"#DC2626"}}>{e.typeName}</span> (+{e.points})</div>
              <div style={{fontSize:11,color:"var(--text-muted)"}}>Won with: <span style={{fontWeight:600}}>{e.winnerCombo}</span></div>
              <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2,fontWeight:600}}>{e.p1Name} {e.p1Score}–{e.p2Score} {e.p2Name}</div>
            </div>
          ))}
        </div>
      </div>
      {historyOpen&&<div onClick={()=>setHistoryOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.2)",zIndex:99}}/>}
    </div></ErrorBoundary>
  );
}


/* ═══════════════════════════════════════
   PLAYER APP ENTRY (embedded from player view)
   All components above prefixed/namespaced to avoid collision.
═══════════════════════════════════════ */


/* ─── Player-only helpers ──────────────────────────────────────── */
async function workerGet(path, signal){
  const res = await fetch(`${OVERLAY_WORKER}${path}`,{signal});
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// Aliases — player deck builder uses these names; they point to the judge-side constants
const DEFAULT_BLADES   = DEFAULT_PARTS.blades;
const DEFAULT_RATCHETS = DEFAULT_PARTS.ratchets;
const DEFAULT_BITS     = DEFAULT_PARTS.bits;
const TOP10_BLADES   = TOP10.blades;
const TOP10_RATCHETS = TOP10.ratchets;
const TOP10_BITS     = TOP10.bits;
const STORAGE_KEY = "ncblast-player-v1"; // player session storage key

/* ─── Part Button (player deck builder) ───────────────────────── */
function PartBtn({name, selected, taken, accent, onClick}){
  const words = name.split(" ").filter(Boolean);
  return (
    <button onClick={()=>!taken&&onClick()} disabled={taken}
      style={{
        padding:"8px 4px", borderRadius:9, cursor:taken?"not-allowed":"pointer",
        border: selected ? `2px solid ${accent||"var(--accent)"}` : taken ? "2px solid #334155" : accent ? `2px solid ${accent}50` : "2px solid var(--border2)",
        background: selected ? (accent||"var(--accent)") : taken ? "var(--surface3)" : accent ? accent+"18" : "var(--surface2)",
        color: selected ? "#fff" : taken ? "var(--text-faint)" : "var(--text-primary)",
        opacity: taken ? 0.4 : 1,
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        textAlign:"center",lineHeight:1.1,fontFamily:"'Outfit',sans-serif",
        position:"relative",width:"100%",minHeight:42,
      }}>
      {words.map((w,i)=><span key={i} style={{fontSize:words.length>1?11:13,fontWeight:800}}>{w}</span>)}
      {taken&&<span style={{position:"absolute",bottom:2,fontSize:7,fontWeight:700,color:"var(--text-faint)"}}>IN USE</span>}
    </button>
  );
}

/* ─── Deck Builder (3 combos, linear flow, same UX as judge) ──── */
function DeckBuilder({playerName, initialDeck, onSave, onCancel, savedCombos=[]}){
  const emptyC = ()=>({blade:null,ratchet:null,bit:null});
  const [deck, setDeck] = useState(()=>initialDeck||[emptyC(),emptyC(),emptyC()]);
  const [step, setStep] = useState(null); // null=review | {slot,cat} | {cx,...}
  const [search, setSearch] = useState("");
  const [cxPicker, setCxPicker] = useState(null);
  const [cxOpen, setCxOpen] = useState(false);
  const [crossoverOpen, setCrossoverOpen] = useState(false);
  const stepHistory = useRef([]);

  const allReady = deck.every(c=>c.blade&&c.bit&&(c.ratchet||NO_RATCHET_BLADES.includes(c.blade)));

  // Taken parts (across all slots, excluding current slot)
  const takenFor = (slot, cat) => {
    if(cat==="blade") return deck.filter((_,i)=>i!==slot).map(c=>c.blade).filter(Boolean);
    if(cat==="ratchet") return deck.filter((_,i)=>i!==slot).map(c=>c.ratchet).filter(Boolean);
    if(cat==="bit") return deck.filter((_,i)=>i!==slot).map(c=>c.bit).filter(Boolean);
    return [];
  };

  const openStep = (s) => {
    // Skip ratchet step if Bullet Griffon is already selected in that slot
    if(s?.cat === "ratchet" && NO_RATCHET_BLADES.includes(deck[s.slot]?.blade)) {
      s = {...s, cat: "bit"};
    }
    if(step) stepHistory.current.push(step);
    setStep(s); setSearch(""); setCxOpen(false); setCrossoverOpen(false);
  };
  const goBack = () => {
    const prev = stepHistory.current.pop();
    setStep(prev||null); setSearch(""); setCxPicker(null); setCxOpen(false); setCrossoverOpen(false);
  };

  const setPart = (slot, cat, val) => {
    const nd = [...deck]; nd[slot]={...nd[slot],[cat]:val}; setDeck(nd);
  };

  const advanceAfter = (slot, cat, pickedName) => {
    const cats=["blade","ratchet","bit"];
    const ci=cats.indexOf(cat);
    if(ci<2){
      let nextCat = cats[ci+1];
      // Use pickedName when advancing from blade — avoids reading stale React state after setPart
      const bladeName = cat==="blade" ? pickedName : deck[slot]?.blade;
      if(nextCat==="ratchet" && NO_RATCHET_BLADES.includes(bladeName)) nextCat="bit";
      openStep({slot,cat:nextCat});
    } else if(slot<2) openStep({slot:slot+1,cat:"blade"});
    else { setStep(null); stepHistory.current=[]; }
  };

  const startBuild = () => openStep({slot:0,cat:"blade"});

  // ── Review screen ──
  if(!step){
    const comboNames = ["First","Second","Third"];
    return (
      <div style={{display:"flex",flexDirection:"column",gap:0,height:"100%"}}>
        <div style={{padding:"16px 16px 12px",borderBottom:"1px solid var(--border)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:2}}>
            <button onClick={onCancel} style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",padding:"2px 0",fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif"}}>← Back</button>
          </div>
          <h2 style={{fontSize:20,fontWeight:900,color:"var(--text-primary)",margin:0}}>Your Deck</h2>
          <p style={{fontSize:12,color:"var(--text-muted)",marginTop:2}}>Build 3 combos for <strong style={{color:"var(--accent2)"}}>{playerName}</strong></p>
        </div>

        {/* Saved combos quick-load */}
        {savedCombos.length > 0 && (
          <div style={{padding:"12px 16px 0"}}>
            <p style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>⏱ Previous Combos</p>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {savedCombos.slice(0,3).map((c,i)=>{
                const nc = normalizeCombo(c);
                const str = comboStr(nc);
                if(!str) return null;
                return (
                  <button key={i} onClick={()=>{
                    // Fill into first available empty slot
                    const emptyIdx = deck.findIndex(s=>!s.blade);
                    const targetIdx = emptyIdx>=0 ? emptyIdx : 0;
                    const nd=[...deck]; nd[targetIdx]={...nc}; setDeck(nd);
                  }}
                    style={{padding:"9px 12px",borderRadius:10,border:"1px solid #EA580C40",background:"#EA580C0D",color:"var(--text-primary)",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer",textAlign:"left"}}>
                    <span style={{color:"var(--accent)",fontSize:10,marginRight:6}}>⚡</span>{str}
                  </button>
                );
              })}
            </div>
          </div>
        )}

        <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
          {deck.map((c,i)=>{
            const nc = normalizeCombo(c);
            const isNoRatchet = NO_RATCHET_BLADES.includes(nc.blade);
            const ready = nc.blade&&nc.bit&&(nc.ratchet||isNoRatchet);
            return (
              <div key={i} style={{marginBottom:10,padding:"12px 14px",borderRadius:13,border:`2px solid ${ready?"#22C55E40":"var(--border)"}`,background:ready?"#22C55E08":"var(--surface2)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontSize:10,fontWeight:700,color:ready?"#22C55E":"var(--text-faint)",letterSpacing:1,textTransform:"uppercase"}}>{comboNames[i]} Combo {ready?"✓":""}</span>
                  <button onClick={()=>openStep({slot:i,cat:"blade"})}
                    style={{fontSize:11,fontWeight:700,color:"var(--accent2)",background:"none",border:"none",cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>
                    {ready?"Edit":"Build →"}
                  </button>
                </div>
                {ready ? (
                  <div style={{display:"flex",gap:6}}>
                    {(isNoRatchet?["blade","bit"]:["blade","ratchet","bit"]).map(cat=>(
                      <button key={cat} onClick={()=>openStep({slot:i,cat,returnToReview:true})}
                        style={{flex:1,padding:"7px 4px",borderRadius:8,border:"1px solid var(--border2)",background:"var(--surface3)",color:"var(--text-secondary)",fontSize:10,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer",textAlign:"center",lineHeight:1.2}}>
                        <div style={{fontSize:8,color:"var(--text-faint)",marginBottom:2,textTransform:"uppercase",letterSpacing:0.5}}>{cat}</div>
                        {nc[cat]}
                      </button>
                    ))}
                  </div>
                ):(
                  <p style={{fontSize:12,color:"var(--text-faint)",margin:0}}>Tap Build to add a combo</p>
                )}
              </div>
            );
          })}
        </div>

        <div style={{padding:"12px 16px 20px",borderTop:"1px solid var(--border)"}}>
          {!allReady && (
            <button onClick={startBuild} style={{display:"block",width:"100%",padding:"14px 0",borderRadius:12,border:"none",background:"var(--accent)",color:"#fff",fontSize:15,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer",marginBottom:8}}>
              {deck.some(c=>c.blade) ? "Continue Building" : "Start Building →"}
            </button>
          )}
          {allReady && (
            <button onClick={()=>onSave(deck)} style={{display:"block",width:"100%",padding:"14px 0",borderRadius:12,border:"none",background:"#22C55E",color:"#fff",fontSize:15,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer",marginBottom:8}}>
              ✓ Save Deck Registration
            </button>
          )}
          <button onClick={onCancel} style={{display:"block",width:"100%",padding:"11px 0",borderRadius:12,border:"2px solid var(--border)",background:"transparent",color:"var(--text-muted)",fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
            Cancel
          </button>
        </div>
      </div>
    );
  }

  // ── CX picker ──
  if(step?.cx){
    const {slot,cxStep,chip,blade,overBlade,returnToReview} = step;
    const usedCxBlades = deck.filter((_,i)=>i!==slot).map(c=>{
      if(!c.blade) return null;
      const match = c.blade.match(/(?:Standard|Emperor|Valkyrie)\s+(\w+)|^(\w+)\s+(?:Heavy|Wheel|Slash|Free|Dual|Round|Bumper|Turn|Charge|Jaggy|Assault|Massive|Zillion|Knuckle|Vertical|Erase)/);
      return null; // simplified — just prevent same full blade string
    }).filter(Boolean);

    const buildFinalName = (assist) => {
      const base = overBlade ? `${blade} ${overBlade}` : blade;
      return chip==="Standard" ? `${base} ${assist}` : `${chip} ${base} ${assist}`;
    };
    const advanceCx = (finalBladeName) => {
      setPart(slot, "blade", finalBladeName);
      if(returnToReview){ setStep({slot,cat:"ratchet",returnToReview:true}); return; }
      openStep({slot,cat:"ratchet"});
    };

    return (
      <div style={{position:"fixed",inset:0,background:"var(--bg)",display:"flex",flexDirection:"column",zIndex:10}}>
        <div style={{padding:"14px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10}}>
          <button onClick={goBack} style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif"}}>← Back</button>
          <span style={{fontSize:15,fontWeight:800,color:"#0D9488"}}>CX Builder</span>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"16px"}}>
          {cxStep==="chip"&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <p style={{fontSize:14,fontWeight:700,color:"var(--text-secondary)",marginBottom:8}}>Choose Gear Chip</p>
              {CX_CHIPS.map(ch=>(
                <button key={ch} onClick={()=>setStep({...step,cxStep:"blade",chip:ch})}
                  style={{padding:"16px 20px",borderRadius:12,border:"2px solid #0D948840",background:"var(--surface2)",color:"var(--text-primary)",fontSize:15,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer",textAlign:"left"}}>
                  {ch}
                  {ch==="Standard"&&<span style={{fontSize:11,fontWeight:500,color:"var(--text-muted)",display:"block",marginTop:2}}>Multiple allowed</span>}
                </button>
              ))}
            </div>
          )}
          {cxStep==="blade"&&(
            <div>
              <p style={{fontSize:14,fontWeight:700,color:"var(--text-secondary)",marginBottom:12}}>Choose CX Blade</p>
              <div style={{marginBottom:12,background:"#0D948818",borderRadius:10,padding:"10px",border:"1px solid #0D948830"}}>
                <p style={{fontSize:9,fontWeight:700,color:"#0D9488",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>★ Most Popular</p>
                <button onClick={()=>setStep({...step,cxStep:"assist",blade:"Blast"})}
                  style={{width:"100%",padding:"12px",borderRadius:9,border:"2px solid #0D9488",background:"#0D948822",color:"var(--text-primary)",fontSize:14,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                  Blast
                </button>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:6}}>
                  {["Heavy","Wheel"].map(assist=>{
                    const fn = chip==="Standard"?`Blast ${assist}`:`${chip} Blast ${assist}`;
                    return (
                      <button key={assist} onClick={()=>advanceCx(fn)}
                        style={{padding:"8px 4px",borderRadius:8,border:"2px solid #0D948860",background:"#0D948818",color:"var(--text-primary)",fontSize:10,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                        Blast {assist}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                {CX_BLADES.filter(b=>b!=="Blast").map(b=>(
                  <button key={b} onClick={()=>setStep({...step,cxStep:"assist",blade:b})}
                    style={{padding:"10px 4px",borderRadius:9,border:"2px solid var(--border2)",background:"var(--surface2)",color:"var(--text-primary)",fontSize:11,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer",minHeight:40,textAlign:"center"}}>
                    {b}
                  </button>
                ))}
              </div>
              <div style={{marginTop:12,borderTop:"2px dashed var(--border)",paddingTop:12}}>
                <p style={{fontSize:9,fontWeight:700,color:"#A855F7",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>CXE Blades</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                  {CXE_BLADES.map(b=>(
                    <button key={b} onClick={()=>setStep({...step,cxStep:"over_blade",blade:b,isCXE:true})}
                      style={{padding:"12px 4px",borderRadius:9,border:"2px solid #A855F760",background:"#A855F715",color:"var(--text-primary)",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer",minHeight:44,textAlign:"center"}}>
                      {b}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}
          {cxStep==="over_blade"&&(
            <div>
              <p style={{fontSize:14,fontWeight:700,color:"var(--text-secondary)",marginBottom:12}}>Choose Over Blade for <strong style={{color:"#A855F7"}}>{blade}</strong></p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                {CXE_OVER_BLADES.map(ob=>(
                  <button key={ob} onClick={()=>setStep({...step,cxStep:"assist",overBlade:ob})}
                    style={{padding:"16px 4px",borderRadius:12,border:"2px solid #A855F760",background:"#A855F715",color:"var(--text-primary)",fontSize:15,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer",minHeight:56,textAlign:"center"}}>
                    {ob}
                  </button>
                ))}
              </div>
            </div>
          )}
          {cxStep==="assist"&&(
            <div>
              <p style={{fontSize:14,fontWeight:700,color:"var(--text-secondary)",marginBottom:12}}>Choose Assist for <strong style={{color:"#0D9488"}}>{blade}{overBlade?` ${overBlade}`:""}</strong></p>
              <div style={{marginBottom:10,background:"#0F766E0D",borderRadius:10,padding:"8px 10px",border:"1px solid #0F766E30"}}>
                <p style={{fontSize:9,fontWeight:700,color:"#0F766E",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>★ Top 5</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
                  {CX_ASSIST_TOP5.map(a=>(
                    <button key={a} onClick={()=>advanceCx(buildFinalName(a))}
                      style={{padding:"10px 4px",borderRadius:8,border:"2px solid #0F766E60",background:"#0F766E14",color:"var(--text-primary)",fontSize:10,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer",minHeight:36,textAlign:"center"}}>
                      {a}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                {CX_ASSISTS.filter(a=>!CX_ASSIST_TOP5.includes(a)).map(a=>(
                  <button key={a} onClick={()=>advanceCx(buildFinalName(a))}
                    style={{padding:"10px 4px",borderRadius:9,border:"2px solid var(--border2)",background:"var(--surface2)",color:"var(--text-primary)",fontSize:10,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer",minHeight:36,textAlign:"center"}}>
                    {a}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Part picker ──
  const {slot, cat, returnToReview} = step;
  const taken = takenFor(slot, cat);
  const current = deck[slot]?.[cat]||null;
  const comboNames = ["First","Second","Third"];
  const comboLabel = comboNames[slot];

  let list, top10;
  if(cat==="blade"){ list=DEFAULT_BLADES; top10=TOP10_BLADES; }
  else if(cat==="ratchet"){ list=DEFAULT_RATCHETS; top10=TOP10_RATCHETS; }
  else { list=DEFAULT_BITS; top10=TOP10_BITS; }

  const rest = list.filter(n=>!top10.includes(n));
