                </button>
              </div>
            )}
            {allPlayersDone&&cs.voidConfirm&&(
              <div style={{background:"#FEF2F2",borderRadius:10,padding:"12px",border:"1px solid #FECACA"}}>
                <p style={{fontSize:12,fontWeight:700,color:"#DC2626",marginBottom:6}}>🚫 Void — Organizer Required</p>
                <p style={{fontSize:11,color:"#64748B",marginBottom:10,lineHeight:1.5}}>This match will be saved locally only. The Tournament Organizer must confirm. <strong>Judge: locate the Organizer before proceeding.</strong></p>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setConfirmState({...cs,voidConfirm:false})}
                    style={{flex:1,padding:"9px 0",borderRadius:8,border:"2px solid #E2E8F0",background:"#fff",color:"#475569",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>← Cancel</button>
                  <button onClick={()=>{setConfirmState({...cs,judgeok:true});onDownloadCSV(log.slice(matchStartIdx),{p1,p2,sets,config,winner,shuffles:shuf});}}
                    style={{flex:2,padding:"9px 0",borderRadius:8,border:"none",background:"#DC2626",color:"#fff",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>Organizer Confirms — Void</button>
                </div>
              </div>
            )}
            {!allPlayersDone&&<p style={{...S.hint,marginTop:8}}>Both players must confirm before judge can act</p>}
          </div>
        )}

        {/* ── Actions ── */}
        {(!config.tm||submitted)&&<button style={S.pri} onClick={()=>{setSheetsStatus(null);reset();}}>New Match</button>}
        <button style={{...S.sec,width:"100%",justifyContent:"center"}} onClick={()=>onDownloadCSV(log.slice(matchStartIdx),{p1,p2,sets,config,winner,shuffles:shuf})}>{IC.download} Download CSV</button>

        {/* ── Challonge score submission ── */}
        {challongeSlug&&challongeMatchId&&(()=>{
          const winnerIsP1 = sets[0] >= need;
          // Use participant IDs stored at match-selection time — always correct
          const winnerId = winnerIsP1 ? challongeP1ParticipantId : challongeP2ParticipantId;
          const p1FinalScore = sets[0];
          const p2FinalScore = sets[1];
          return (
            <div style={{marginTop:10,padding:"12px 14px",borderRadius:10,background:"#FFF7ED",border:"2px solid #EA580C40"}}>
              <p style={{fontSize:11,fontWeight:700,color:"#C2410C",marginBottom:8}}>⚔️ Submit to Challonge</p>
              <p style={{fontSize:11,color:"#92400E",marginBottom:10,lineHeight:1.5}}>
                Winner: <strong>{winner}</strong> · Score: {p1FinalScore}–{p2FinalScore}
              </p>
              {challongeSubmitStatus==="ok"&&(
                <div style={{padding:"8px 12px",borderRadius:8,background:"#F0FDF4",border:"1px solid #86EFAC",fontSize:12,fontWeight:600,color:"#15803D",textAlign:"center"}}>
                  ✓ Result submitted to Challonge
                </div>
              )}
              {challongeSubmitStatus&&challongeSubmitStatus!=="ok"&&challongeSubmitStatus!=="loading"&&(
                <div style={{padding:"8px 12px",borderRadius:8,background:"#FEF2F2",border:"1px solid #FCA5A5",fontSize:11,fontWeight:600,color:"#DC2626",textAlign:"center",marginBottom:8}}>
                  ✕ {challongeSubmitStatus}
                </div>
              )}
              {challongeSubmitStatus!=="ok"&&(
                <button type="button"
                  disabled={challongeSubmitStatus==="loading"}
                  onClick={()=>submitChallongeScore(challongeMatchId, p1FinalScore, p2FinalScore, winnerId)}
                  style={{display:"block",width:"100%",padding:"10px 0",borderRadius:9,border:"none",background:challongeSubmitStatus==="loading"?"#CBD5E1":"#EA580C",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:challongeSubmitStatus==="loading"?"not-allowed":"pointer"}}>
                  {challongeSubmitStatus==="loading"?"Submitting…":`Submit Result to Challonge${winnerId?"":" ⚠️ no ID"}`}
                </button>
              )}
            </div>
          );
        })()}

        {config.tm&&sheetsStatus==="success"&&(
          <div style={{marginTop:10,padding:"10px 14px",borderRadius:10,background:"#F0FDF4",border:"1px solid #86EFAC",fontSize:12,fontWeight:600,color:"#15803D",textAlign:"center"}}>
            ✓ Results submitted to Google Sheets
          </div>
        )}
        {config.tm&&sheetsStatus==="error"&&(
          <div style={{marginTop:10,padding:"10px 14px",borderRadius:10,background:"#FEF2F2",border:"1px solid #FCA5A5",fontSize:12,fontWeight:600,color:"#DC2626",textAlign:"center"}}>
            ✕ Sheets submission failed — download CSV manually
          </div>
        )}
      </div>
    );
  }

  // Battle screen (merged: combo pick + scoring in one view)
  const comboOf = (deck, idx) => deck[idx] || {};
  const battlesInThisSet = log.slice(matchStartIdx).filter(e=>e.set===curSet).length + 1;
  const sc2 = S.page.maxWidth / 480;
  const bp = (n) => Math.round(n * sc2);
  const bf = (n) => Math.round(n * sc2);

  // Portrait = taller than wide → stack combos vertically; landscape → side by side
  const comboLayout = window.innerHeight > window.innerWidth ? "column" : "row";

  const bothCombosSelected = r1 !== null && r2 !== null;
  const pending1 = pendingFinish?.pi===0 ? pendingFinish.fin : null;
  const pending2 = pendingFinish?.pi===1 ? pendingFinish.fin : null;

  // Battle screen: position:fixed full viewport, combo row pinned at bottom
  const COMBO_ROW_H = bp(54); // fixed height for combo picker row at bottom
  const STRIP_H = bp(36);     // top strip height
  return (
    <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",background:"var(--bg-solid)",boxSizing:"border-box",overflow:"hidden"}}>

      {/* ── Top strip: Back · pills · mini action bar · Swap ── */}
      <div style={{height:STRIP_H,display:"flex",alignItems:"center",gap:bp(5),padding:`0 ${bp(10)}px`,flexShrink:0,borderBottom:"1px solid var(--border)"}}>
        <button style={{...S.back,marginBottom:0,flexShrink:0,fontSize:bf(12)}} onClick={goBack}>{IC.back}</button>
        {config.bo>1&&<span style={{...S.pill,flexShrink:0,margin:0}}>Set {curSet}/{config.bo}</span>}
        <span style={{...S.pill,flexShrink:0,margin:0}}>B{battlesInThisSet}</span>
        {config.bo>1&&<span style={{...S.pill,flexShrink:0,margin:0}}>{sets[0]}–{sets[1]}</span>}
        {/* Mini action bar — history, undo, redo, dark, settings */}
        <div style={{display:"flex",alignItems:"center",gap:bp(2),marginLeft:"auto",flexShrink:0}}>
          <button onClick={()=>setHistoryOpen(true)} style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",padding:`${bp(3)}px ${bp(5)}px`,display:"flex",alignItems:"center"}}>{IC.history}</button>
          <button onClick={undo} disabled={log.length<=matchStartIdx} style={{background:"none",border:"none",color:log.length>matchStartIdx?"var(--text-muted)":"var(--text-disabled)",cursor:log.length>matchStartIdx?"pointer":"default",padding:`${bp(3)}px ${bp(5)}px`,display:"flex",alignItems:"center"}}>{IC.undo}</button>
          <button onClick={redo} disabled={!future.length} style={{background:"none",border:"none",color:future.length?"#EA580C":"var(--text-disabled)",cursor:future.length?"pointer":"default",padding:`${bp(3)}px ${bp(5)}px`,display:"flex",alignItems:"center"}}>{IC.redo}</button>
          <button onClick={toggleDark} style={{background:"none",border:"none",cursor:"pointer",padding:`${bp(3)}px ${bp(4)}px`,fontSize:bf(14),lineHeight:1}}>{dark?"☀️":"🌙"}</button>
          <button onClick={onOpenLib} style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",padding:`${bp(3)}px ${bp(4)}px`,display:"flex",alignItems:"center"}}>{IC.gear}</button>
          {currentSides.p1Side&&(
            <button type="button" onClick={()=>setSideSwapConfirm(true)}
              style={{padding:`${bp(2)}px ${bp(6)}px`,borderRadius:bp(6),border:"1px solid var(--border2)",background:"var(--surface)",color:"var(--text-secondary)",fontSize:bf(9),fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer",marginLeft:bp(2)}}>
              ⇄
            </button>
          )}
        </div>
      </div>

      {/* ── Side swap confirmation modal ── */}
      {sideSwapConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.6)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
          <div style={{background:"var(--surface)",borderRadius:18,padding:"24px 20px",maxWidth:320,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.25)",border:"1px solid var(--border)"}}>
            <p style={{fontSize:16,fontWeight:800,color:"var(--text-primary)",marginBottom:8,textAlign:"center"}}>Swap Sides?</p>
            <p style={{fontSize:13,color:"var(--text-secondary)",textAlign:"center",marginBottom:4,lineHeight:1.5}}>
              <strong style={{color:"#2563EB"}}>{p1}</strong> → <strong>{currentSides.p1Side==="B"?"X":"B"} Side</strong>
            </p>
            <p style={{fontSize:13,color:"var(--text-secondary)",textAlign:"center",marginBottom:20,lineHeight:1.5}}>
              <strong style={{color:"#DC2626"}}>{p2}</strong> → <strong>{currentSides.p2Side==="B"?"X":"B"} Side</strong>
            </p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setSideSwapConfirm(false)}
                style={{flex:1,padding:"12px 0",borderRadius:10,border:"2px solid var(--border)",background:"var(--surface)",color:"var(--text-secondary)",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                Cancel
              </button>
              <button onClick={()=>{
                const newP1Side=currentSides.p1Side==="B"?"X":"B";
                const newP2Side=currentSides.p2Side==="B"?"X":"B";
                setCurrentSides({p1Side:newP1Side,p2Side:newP2Side});
                setSideAssign(a=>a?{...a,p1Side:newP1Side,p2Side:newP2Side}:a);
                setSideSwapConfirm(false);
              }} style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:"#2563EB",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                Confirm Swap
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Score block ── */}
      <div style={{background:"var(--surface)",borderRadius:bp(12),padding:`${bp(8)}px ${bp(12)}px ${bp(6)}px`,marginBottom:bp(5),boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1px solid var(--border)",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:bp(6)}}>
          <span style={{fontSize:bf(p1&&p1.length>10?18:24),fontWeight:900,color:"#2563EB",fontFamily:"'Outfit',sans-serif",maxWidth:"38vw",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p1}{currentSides.p1Side?<span style={{fontSize:bf(10),fontWeight:600,color:"#93C5FD",marginLeft:bp(3)}}>{currentSides.p1Side}</span>:""}</span>
          <span style={{fontSize:bf(10),fontWeight:700,color:"var(--text-primary)"}}>{["First","Second","Third","Fourth","Fifth"][curSet-1]||`Set ${curSet}`} Set</span>
          <span style={{fontSize:bf(p2&&p2.length>10?18:24),fontWeight:900,color:"#DC2626",fontFamily:"'Outfit',sans-serif",maxWidth:"38vw",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textAlign:"right"}}>{p2}{currentSides.p2Side?<span style={{fontSize:bf(10),fontWeight:600,color:"#FCA5A5",marginLeft:bp(3)}}>{currentSides.p2Side}</span>:""}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{flex:1,textAlign:"center"}}>
            <span style={{fontSize:bf(52),fontWeight:900,color:"#2563EB",lineHeight:1,fontFamily:"'Outfit',sans-serif"}}>{pts[0]}</span>
          </div>
          <div style={{textAlign:"center",minWidth:bp(40)}}>
            <span style={{fontSize:bf(22),fontWeight:800,color:"var(--border2)"}}>–</span>
            {config.pts>0&&<p style={{fontSize:bf(8),fontWeight:700,color:"var(--text-primary)",marginTop:bp(2),letterSpacing:1}}>TO {config.pts}</p>}
          </div>
          <div style={{flex:1,textAlign:"center"}}>
            <span style={{fontSize:bf(52),fontWeight:900,color:"#DC2626",lineHeight:1,fontFamily:"'Outfit',sans-serif"}}>{pts[1]}</span>
          </div>
        </div>
      </div>

      {/* ── Active combo display — updates live as combos are selected ── */}
      <div style={{display:"flex",gap:bp(6),marginBottom:bp(5),flexShrink:0}}>
        {[{name:p1,deck:d1,ri:r1,cl:"#2563EB"},{name:p2,deck:d2,ri:r2,cl:"#DC2626"}].map((side,si)=>{
          const c = side.ri !== null ? comboOf(side.deck, side.ri) : null;
          const bladeText = c?.blade || "—";
          const rbText = c?.ratchet && c?.bit ? `${c.ratchet} ${c.bit}` : c ? "—" : "Pick combo ↓";
          const bladeFz = bf(bladeText.length > 14 ? 13 : bladeText.length > 10 ? 15 : 18);
          const rbFz = bf(rbText.length > 10 ? 11 : 13);
          const hasCombo = side.ri !== null;
          return (
            <div key={si} style={{flex:1,borderRadius:bp(12),border:`2px solid ${hasCombo ? side.cl+"60" : "var(--border)"}`,background:hasCombo?`${side.cl}0D`:"var(--surface2)",padding:`${bp(8)}px ${bp(6)}px`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:bp(44),gap:bp(2)}}>
              <span style={{fontSize:bladeFz,fontWeight:900,color:hasCombo?side.cl:"var(--text-muted)",textAlign:"center",lineHeight:1.15,fontFamily:"'Outfit',sans-serif"}}>{bladeText}</span>
              <span style={{fontSize:rbFz,fontWeight:600,color:hasCombo?side.cl:"var(--text-faint)",textAlign:"center",lineHeight:1.2,opacity:0.9,fontFamily:"'Outfit',sans-serif"}}>{rbText}</span>
            </div>
          );
        })}
      </div>

      {/* ── Two-column scoring (fills remaining space; buttons scale to fit) ── */}
      <div style={{display:"flex",gap:bp(6),flex:1,minHeight:0,padding:`${bp(4)}px ${bp(10)}px 0`}}>
        {[{i:0,cl:"#2563EB",name:p1,dk:d1,sel:r1,setSel:setR1,used:used1,pending:pending1},
          {i:1,cl:"#DC2626",name:p2,dk:d2,sel:r2,setSel:setR2,used:used2,pending:pending2}].map(side=>{
          const canConfirm = side.sel !== null && side.pending;
          return (
            <div key={side.i} style={{flex:1,display:"flex",flexDirection:"column",gap:bp(2),minHeight:0}}>

              {/* Finish buttons + LER + Confirm — each flex:1 so they share available height equally */}
              {[...FINISH,...PENALTY.filter(f=>f.id!=="LER")].map(f=>{
                const isSel = side.pending?.id===f.id;
                const isFinish = !f.penalty;
                const label = f.id==="OF2"?"Own ×2":f.id==="OF3"?"Own ×3":f.name;
                return (
                  <button key={f.id} type="button"
                    disabled={!bothCombosSelected}
                    onClick={()=>{if(bothCombosSelected)setPendingFinish(isSel?null:{pi:side.i,fin:f});}}
                    style={{flex:1,minHeight:0,borderRadius:bp(7),border:`2px solid ${!bothCombosSelected?"var(--border)":isSel?side.cl:isFinish?`${side.cl}50`:"var(--border2)"}`,background:!bothCombosSelected?"var(--surface2)":isSel?side.cl:isFinish?`${side.cl}10`:"var(--surface2)",color:!bothCombosSelected?"var(--text-disabled)":isSel?"#fff":"var(--text-primary)",fontFamily:"'Outfit',sans-serif",cursor:bothCombosSelected?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"space-between",padding:`0 ${bp(7)}px`,opacity:bothCombosSelected?1:0.45}}>
                    <span style={{fontSize:bf(9),fontWeight:800,lineHeight:1}}>{label}</span>
                    <span style={{background:!bothCombosSelected?"var(--border2)":isSel?"rgba(255,255,255,0.3)":side.cl,color:"#fff",padding:`${bp(1)}px ${bp(4)}px`,borderRadius:bp(3),fontSize:bf(8),fontWeight:900,flexShrink:0}}>+{f.p}</span>
                  </button>
                );
              })}

              {/* LER — strike system, flex:1 like the other buttons */}
              {(()=>{
                const lerLocked = !bothCombosSelected;
                const hasStrike = lerStrikes[side.i]===1;
                const lerFin = PENALTY.find(f=>f.id==="LER");
                return (
                  <button type="button" disabled={lerLocked}
                    onClick={()=>{
                      if(lerLocked) return;
                      if(!hasStrike){
                        const strikeEntry = {
                          set:curSet,shuffle:shuf,round:log.slice(matchStartIdx).length+1,
                          scorer:side.i===0?p1:p2,scorerIdx:side.i,judge:judge,penalty:true,
                          type:"LER-STRIKE",typeName:"LER Strike",points:0,
                          p1Score:pts[0],p2Score:pts[1],p1Name:p1,p2Name:p2,
                          p1Combo:{...d1[r1]},p2Combo:{...d2[r2]},
                          p1ComboIdx:r1,p2ComboIdx:r2,
                          p1Side:currentSides.p1Side||"",p2Side:currentSides.p2Side||"",
                          winnerCombo:"",time:new Date().toISOString(),
                          _pp:[...pts],_ps:[...sets],_cs:curSet,
                          _u1:[...used1],_u2:[...used2],_sh:shuf,_ls:[...lerStrikes],
                          _lerStrikeFor:side.i,
                        };
                        const newLog=[...log,strikeEntry];
                        setLog(newLog); sSave(KEYS.matchLog,newLog); setFuture([]);
                        setLerStrikes(s=>{const n=[...s];n[side.i]=1;return n;});
                      } else {
                        setLerStrikes([0,0]);
                        doScore(side.i,lerFin);
                      }
                    }}
                    style={{flex:1,minHeight:0,display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:`0 ${bp(7)}px`,borderRadius:bp(7),border:hasStrike?`2px solid #F59E0B`:"1px dashed var(--border2)",background:hasStrike?"#FEF9C3":"var(--surface2)",color:lerLocked?"var(--text-disabled)":"var(--text-primary)",fontFamily:"'Outfit',sans-serif",cursor:lerLocked?"not-allowed":"pointer",boxSizing:"border-box",opacity:lerLocked?0.5:1}}>
                    <span style={{fontSize:bf(9),fontWeight:700,color:hasStrike?"#B45309":"inherit"}}>{hasStrike?"⚠️ Strike — tap again":"Launch Error"}</span>
                    <span style={{background:hasStrike?"#F59E0B":"var(--surface3)",color:"#fff",padding:`${bp(1)}px ${bp(4)}px`,borderRadius:bp(3),fontSize:bf(8),fontWeight:800}}>LER</span>
                  </button>
                );
              })()}

              {/* Confirm button — flex:1, slightly more weight visually */}
              <button type="button" disabled={!canConfirm}
                onClick={()=>{ if(canConfirm){ doScore(side.i,side.pending); setPendingFinish(null); } }}
                style={{flex:1,minHeight:0,display:"flex",alignItems:"center",justifyContent:"center",width:"100%",borderRadius:bp(7),border:"none",background:canConfirm?side.cl:"var(--surface3)",color:canConfirm?"#fff":"var(--text-disabled)",fontSize:bf(10),fontWeight:900,fontFamily:"'Outfit',sans-serif",cursor:canConfirm?"pointer":"not-allowed",boxSizing:"border-box",transition:"background 0.15s"}}>
                {canConfirm ? `Confirm ${side.pending.name} →` : side.pending ? "Pick combo ↓" : side.sel!==null ? "Pick finish ↑" : "Pick combo ↓"}
              </button>
            </div>
          );
        })}
      </div>

      {/* ── Combo picker row — ALWAYS pinned at bottom, exactly COMBO_ROW_H tall ── */}
      <div style={{height:COMBO_ROW_H,display:"flex",gap:bp(6),padding:`${bp(4)}px ${bp(10)}px`,flexShrink:0}}>
        {[{i:0,cl:"#2563EB",dk:d1,sel:r1,setSel:setR1,used:used1},
          {i:1,cl:"#DC2626",dk:d2,sel:r2,setSel:setR2,used:used2}].map(side=>(
          <div key={side.i} style={{flex:1,display:"flex",gap:bp(4)}}>
            {side.dk.map((c,i)=>{
              const isUsed = side.used.includes(i);
              const isSel = side.sel===i;
              return (
                <button key={i} type="button" disabled={isUsed}
                  onClick={()=>{ if(!isUsed) side.setSel(isSel?null:i); }}
                  style={{flex:1,height:"100%",borderRadius:bp(7),position:"relative",border:`2px solid ${isUsed?"var(--border)":isSel?side.cl:"var(--border2)"}`,background:isUsed?"var(--surface2)":isSel?side.cl:"var(--surface)",color:isUsed?"var(--text-disabled)":isSel?"#fff":"var(--text-primary)",fontFamily:"'Outfit',sans-serif",cursor:isUsed?"not-allowed":"pointer",opacity:isUsed?0.4:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:bp(1),padding:`${bp(2)}px`,boxSizing:"border-box"}}>
                  {isUsed&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><svg width="18" height="18" viewBox="0 0 40 40" fill="none" stroke="#DC2626" strokeWidth="4" strokeLinecap="round" opacity="0.5"><line x1="8" y1="8" x2="32" y2="32"/><line x1="32" y1="8" x2="8" y2="32"/></svg></div>}
                  <span style={{fontWeight:800,fontSize:bf(10),lineHeight:1.1,textAlign:"center"}}>{c.blade||"—"}</span>
                  <span style={{fontSize:bf(8),fontWeight:600,opacity:0.8,textAlign:"center"}}>{c.ratchet&&c.bit?`${c.ratchet} ${c.bit}`:"—"}</span>
                </button>
              );
            })}
          </div>
        ))}
      </div>

      {/* Match history slide-over (kept from BottomBar, triggered by strip button) */}
      <div style={{position:"fixed",top:0,right:0,bottom:0,width:historyOpen?Math.min(340,window.innerWidth-40):0,background:"var(--surface)",boxShadow:historyOpen?"-4px 0 24px rgba(0,0,0,0.25)":"none",transition:"width 0.25s ease",overflow:"hidden",zIndex:100}}>
        <div style={{width:Math.min(340,window.innerWidth-40),padding:"20px 16px",overflowY:"auto",height:"100%"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"var(--text-primary)"}}>Match Log</h2>
            <button onClick={()=>setHistoryOpen(false)} style={{background:"var(--surface3)",border:"none",borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"var(--text-muted)"}}>{IC.x}</button>
          </div>
          {log.length===0&&<p style={{color:"var(--text-disabled)",fontSize:13,fontStyle:"italic"}}>No battles yet</p>}
          {log.slice().reverse().map((e,i)=>(
            <div key={i} style={{padding:"10px 12px",borderRadius:10,marginBottom:8,background:e.scorerIdx===0?"#EFF6FF22":"#FEF2F222",borderLeft:`4px solid ${e.scorerIdx===0?"#2563EB":"#DC2626"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <span style={{fontWeight:700,color:e.scorerIdx===0?"#2563EB":"#DC2626",fontSize:14}}>{e.scorer}</span>
                <span style={{fontSize:11,fontWeight:600,color:"var(--text-muted)"}}>R{log.length-i} · Set {e.set}</span>
              </div>
              <div style={{fontSize:12,color:"var(--text-secondary)",marginBottom:2}}><span style={{fontWeight:700,color:e.scorerIdx===0?"#2563EB":"#DC2626"}}>{e.typeName}</span> (+{e.points})</div>
              <div style={{fontSize:11,color:"var(--text-muted)"}}>Won with: <span style={{fontWeight:600}}>{e.winnerCombo}</span></div>
              <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2,fontWeight:600}}>{e.p1Name} {e.p1Score}–{e.p2Score} {e.p2Name}</div>
            </div>
          ))}
        </div>
      </div>
      {historyOpen&&<div onClick={()=>setHistoryOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.2)",zIndex:99}}/>}
    </div>
  );
}

/* ═══════════════════════════════════════
   MAIN APP
═══════════════════════════════════════ */
function BeyJudgeApp() {
  const sc = useScale();
  S = makeS(sc); // update module-level S so all components see it
  const [dark,setDark] = useState(()=>{
    try{return localStorage.getItem("ncblast-dark")==="1";}catch{return false;}
  });
  const toggleDark = () => setDark(d=>{
    const next=!d;
    try{localStorage.setItem("ncblast-dark",next?"1":"0");}catch{}
    return next;
  });
  // Apply dark class to body
  useEffect(()=>{
    document.body.classList.toggle("dark",dark);
  },[dark]);
  const [screen,setScreen] = useState("format");
  const [config,setConfig] = useState({pts:4,bo:3,tm:false,tournamentName:""});
  const [parts,setParts] = useState({blades:[],ratchets:[],bits:[]});
  const [players,setPlayers] = useState([]);
  const [libOpen,setLibOpen] = useState(false);
  const [judge,setJudge] = useState("");
  const [sheetsStatus,setSheetsStatus] = useState(null); // null | "success" | "error"
  const [challongeSlug,setChallongeSlug] = useState("");
  const [challongeParticipants,setChallongeParticipants] = useState({}); // { displayName: challongeId }

  useEffect(()=>{
    const saved=sGet(KEYS.parts,{});
    const merged=mergeWithDefaults(saved);
    setParts(merged); sSave(KEYS.parts,merged);
    setPlayers(sGet(KEYS.players,[]));
    // Restore last Challonge tournament context
    const savedMap = sGet(KEYS.challongeMap, {});
    if(savedMap.slug) setChallongeSlug(savedMap.slug);
    if(savedMap.participants) setChallongeParticipants(savedMap.participants);
  },[]);

  const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzvb5LkqMDXaMVJNFNQSf7dsUJK_0vbTfQ4gRRISGsRWg4mINvawLROxn0SaPqJ5o9E/exec";

  // Download CSV to device — always available, never sends to sheets
  const handleDownloadCSV = (roundLog,meta) => {
    let csv="Round,Set,Shuffle,Judge,Tournament,Winner,WinnerCombo,FinishType,Points,Penalty,P1,P1Side,P1Score,P1Combo,P2,P2Side,P2Score,P2Combo,Timestamp\n";
    roundLog.forEach(r=>{csv+=`${r.round},${r.set},${r.shuffle},"${r.judge||""}","${meta.config?.tournamentName||""}","${r.scorer}","${r.winnerCombo}",${r.type},${r.points},${r.penalty?1:0},"${r.p1Name}",${r.p1Side||""},"${r.p1Score}","${comboStr(r.p1Combo)}","${r.p2Name}",${r.p2Side||""},"${r.p2Score}","${comboStr(r.p2Combo)}",${r.time}\n`;});
    const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`ncblast_${meta.p1||"p1"}_vs_${meta.p2||"p2"}_${new Date().toISOString().slice(0,10)}.csv`; a.click(); URL.revokeObjectURL(url);
  };

  // Send to Google Sheets only — no CSV download
  const handleSendSheets = async (roundLog,meta) => {
    // Sheet 1: existing summary rows
    const rows = roundLog.map(r=>[
      r.time,
      r.judge||"",
      meta.config?.tournamentName||"",
      `${r.p1Name} vs ${r.p2Name}`,
      r.p1Name, r.p1Side||"", r.p2Name, r.p2Side||"",
      r.set, r.shuffle, r.round,
      r.scorer, r.winnerCombo,
      r.typeName, r.points,
      r.penalty?1:0,
      r.p1Score, r.p2Score,
      comboStr(r.p1Combo), comboStr(r.p2Combo)
    ]);

    // Sheet 2: one row per battle with specific battle-level detail
    const battleRows = roundLog.map(r=>{
      // Format time as PST XX:XXam/pm
      const d = new Date(r.time);
      const pst = new Date(d.toLocaleString("en-US",{timeZone:"America/Los_Angeles"}));
      const h = pst.getHours(); const m = pst.getMinutes();
      const ampm = h>=12?"pm":"am";
      const h12 = h%12||12;
      const mm = String(m).padStart(2,"0");
      const mo = String(pst.getMonth()+1).padStart(2,"0");
      const dy = String(pst.getDate()).padStart(2,"0");
      const yr = pst.getFullYear();
      const dateTime = `${mo}/${dy}/${yr} ${h12}:${mm}${ampm}`;

      // Win condition: e.g. "XTR+3", "OVR+2", "OF+2", "LER+1"
      const winCondition = r.penalty
        ? `${r.type===("OF2")||r.type===("OF3")?"OF":"LER"}+${r.points}`
        : `${r.type}+${r.points}`;

      const winnerIsP1 = r.scorerIdx===0;
      const winnerName = winnerIsP1 ? r.p1Name : r.p2Name;
      const loserName  = winnerIsP1 ? r.p2Name : r.p1Name;
      const winnerSide = winnerIsP1 ? (r.p1Side||"") : (r.p2Side||"");
      const loserSide  = winnerIsP1 ? (r.p2Side||"") : (r.p1Side||"");
      const winnerCombo = r.winnerCombo;
      const loserCombo  = winnerIsP1 ? comboStr(r.p2Combo) : comboStr(r.p1Combo);

      return [
        dateTime,
        r.judge||"",
        r.p1Name, r.p1Side||"", comboStr(r.p1Combo),
        r.p2Name, r.p2Side||"", comboStr(r.p2Combo),
        winnerName, winnerCombo,
        winCondition,
        loserCombo, loserName
      ];
    });

    try {
      const resp = await fetch(SHEETS_URL, {
        method:"POST",
        body: JSON.stringify({rows, battleRows}),
      });
      const result = await resp.json();
      setSheetsStatus(result.status==="ok"?"success":"error");
    } catch(err) {
      setSheetsStatus("error");
    }
  };


  return (
    <div style={{background:"var(--bg)",minHeight:"100vh",fontFamily:"'Outfit',sans-serif"}}>
      {libOpen&&<LibraryManager parts={parts} setParts={setParts} onClose={()=>setLibOpen(false)}/>}
      {screen==="format"&&<FormatScreen config={config} setConfig={setConfig} parts={parts} onNext={()=>setScreen("players")} onOpenLib={()=>setLibOpen(true)} dark={dark} toggleDark={toggleDark}/>}
      {screen==="players"&&<PlayersScreen players={players} setPlayers={setPlayers} onNext={()=>setScreen("match")} onBack={()=>setScreen("format")} toggleDark={toggleDark} dark={dark} onChallongeImport={(slug,pmap)=>{setChallongeSlug(slug);setChallongeParticipants(pmap);sSave(KEYS.challongeMap,{slug,participants:pmap});}}/>}
      {screen==="match"&&<MatchScreen config={config} parts={parts} players={players} judge={judge} setJudge={setJudge} sheetsStatus={sheetsStatus} setSheetsStatus={setSheetsStatus} onBack={()=>setScreen("players")} onDownloadCSV={handleDownloadCSV} onSendSheets={handleSendSheets} onOpenLib={()=>setLibOpen(true)} dark={dark} toggleDark={toggleDark} challongeSlug={challongeSlug} challongeParticipants={challongeParticipants}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BeyJudgeApp/>);
</script>
</body>
</html>
