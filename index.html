        </div>
      </div>
      {historyOpen&&<div onClick={()=>setHistoryOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.2)",zIndex:99}}/>}
      <div style={{position:"fixed",bottom:0,left:0,right:0,display:"flex",justifyContent:"center",padding:"10px 16px 20px",background:"linear-gradient(transparent 0%, #F0F4F8 40%)",zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:2,background:"var(--surface)",borderRadius:20,padding:"5px 6px",boxShadow:"0 2px 12px rgba(0,0,0,0.15), 0 0 0 1px var(--border)"}}>
          <button onClick={()=>setHistoryOpen(true)} style={S.barBtn}>{IC.history}</button>
          <div style={S.barDiv}/>
          <button onClick={undo} disabled={log.length<=matchStartIdx} style={{...S.barBtn,opacity:log.length>matchStartIdx?1:0.3}}>{IC.undo} <span style={S.barLbl}>Undo</span></button>
          <button onClick={redo} disabled={!future.length} style={{...S.barBtn,opacity:future.length?1:0.3,color:"#EA580C"}}><span style={{...S.barLbl,color:"#EA580C"}}>Redo</span> {IC.redo}</button>
          <div style={S.barDiv}/>
          <button onClick={toggleDark} style={{...S.barBtn,fontSize:16,lineHeight:1}} title="Toggle dark mode">{dark?"☀️":"🌙"}</button>
          <div style={S.barDiv}/>
          <button onClick={onOpenLib} style={S.barBtn}>{IC.gear}</button>
        </div>
      </div>
    </>
  );
}

/* ═══════════════════════════════════════
   SCREEN 3 — MATCH
═══════════════════════════════════════ */
function MatchScreen({config,parts,players,judge,setJudge,sheetsStatus,setSheetsStatus,onBack,onDownloadCSV,onSendSheets,onOpenLib,dark,toggleDark}) {
  const [phase,setPhase] = useState("pick");
  const [abandonConfirm,setAbandonConfirm] = useState(false);
  const [overBackConfirm,setOverBackConfirm] = useState(false);
  const [p1,setP1] = useState(null);
  const [p2,setP2] = useState(null);
  const [d1,setD1] = useState([emptyCombo(),emptyCombo(),emptyCombo()]);
  const [d2,setD2] = useState([emptyCombo(),emptyCombo(),emptyCombo()]);
  const [r1,setR1] = useState(null);
  const [r2,setR2] = useState(null);
  const [used1,setUsed1] = useState([]);
  const [used2,setUsed2] = useState([]);
  const [pts,setPts] = useState([0,0]);
  const [sets,setSets] = useState([0,0]);
  const [curSet,setCurSet] = useState(1);
  const [shuf,setShuf] = useState(0);
  const [log,setLog] = useState(()=>sGet(KEYS.matchLog,[]));
  const [future,setFuture] = useState([]);
  const [matchStartIdx,setMatchStartIdx] = useState(0);
  const [picker,setPicker] = useState(null);
  const openPicker = (val) => { setPicker(val); setPickerSearch(""); setCrossoverOpen(false); setCxPicker(null); };
  const [historyOpen,setHistoryOpen] = useState(false);
  const [confirmState,setConfirmState] = useState(null);
  const [manualJudge,setManualJudge] = useState(false);
  const [setScores,setSetScores] = useState([]);
  const [sideAssign,setSideAssign] = useState(null);
  const [sidePicker,setSidePicker] = useState(null);
  const [currentSides,setCurrentSides] = useState({p1Side:"",p2Side:""});
  const [pickerSearch,setPickerSearch] = useState("");
  const [crossoverOpen,setCrossoverOpen] = useState(false);
  const [cxPicker,setCxPicker] = useState(null); // null | {step,who,slot,chip?,blade?,returnToReview?}
  const [deckReview,setDeckReview] = useState(false); // true = show review screen, false = in picker flow

  const need = Math.ceil(config.bo/2);
  const cReady = d1.every(comboReady)&&d2.every(comboReady);

  const doScore = (pi,fin) => {
    // penalty: listed under loser pi, points go to opponent
    const scoringPi = fin.penalty ? 1-pi : pi;
    const raw=[pts[0],pts[1]]; raw[scoringPi]+=fin.p;

    // Cap winning score at the point threshold — no going over
    const cap = config.pts > 0 ? config.pts : Infinity;
    const np = [Math.min(raw[0],cap), Math.min(raw[1],cap)];

    const entry = {
      set:curSet,shuffle:shuf,round:log.slice(matchStartIdx).length+1,
      scorer:scoringPi===0?p1:p2,scorerIdx:scoringPi,judge:judge,penalty:fin.penalty||false,
      type:fin.id,typeName:fin.name,points:fin.p,
      p1Score:np[0],p2Score:np[1],p1Name:p1,p2Name:p2,
      p1Combo:{...d1[r1]},p2Combo:{...d2[r2]},
      p1ComboIdx:r1,p2ComboIdx:r2,
      p1Side:currentSides.p1Side||"",p2Side:currentSides.p2Side||"",
      winnerCombo:comboStr(scoringPi===0?d1[r1]:d2[r2]),
      time:new Date().toISOString(),
      _pp:[...pts],_ps:[...sets],_cs:curSet,
      _u1:[...used1],_u2:[...used2],_sh:shuf,
    };
    const newLog=[...log,entry];
    setLog(newLog); sSave(KEYS.matchLog, newLog); setFuture([]); setPts(np);

    const setWon = config.pts>0 && np[scoringPi]>=config.pts;

    // Launch Error (LER) = redo: award point, stay on battle screen for rematch
    if(fin.id==="LER"){
      if(setWon){
        const ns=[sets[0],sets[1]]; ns[scoringPi]+=1; setSets(ns);
        setSetScores(ss=>[...ss,{p1:np[0],p2:np[1]}]);
        if(ns[scoringPi]>=need){ saveCombosToStorage(); setPhase("over"); }
        else {
          if(config.tm){const loserPi=1-scoringPi;setSideAssign({pickPriority:loserPi});setSidePicker({priority:loserPi});}
          setCurSet(c=>c+1); setPts([0,0]); setUsed1([]); setUsed2([]); setShuf(s=>s+1); setPhase("selectRound");
        }
      }
      // else stay on battle screen — same combos, immediate rematch
      return;
    }

    const nu1=[...used1,r1]; const nu2=[...used2,r2];
    setUsed1(nu1); setUsed2(nu2); setR1(null); setR2(null);
    if(setWon){
      const ns=[sets[0],sets[1]]; ns[scoringPi]+=1; setSets(ns);
      setSetScores(ss=>[...ss,{p1:np[0],p2:np[1]}]);
      if(ns[scoringPi]>=need){ saveCombosToStorage(); setPhase("over"); }
      else {
        if(config.tm){ const loserPi=1-scoringPi; setSideAssign({pickPriority:loserPi}); setSidePicker({priority:loserPi}); }
        setCurSet(c=>c+1); setPts([0,0]); setUsed1([]); setUsed2([]); setShuf(s=>s+1); setPhase("selectRound");
      }
    } else {
      if(nu1.length>=3&&nu2.length>=3){ setUsed1([]); setUsed2([]); setShuf(s=>s+1); }
      setPhase("selectRound");
    }
  };

  const undo = () => {
    // Never undo past the start of the current match
    if(log.length<=matchStartIdx) return;
    const l=log[log.length-1];
    const undoLog = log.slice(0,-1); setFuture([l,...future]); setLog(undoLog); sSave(KEYS.matchLog, undoLog);
    setPts(l._pp); setSets(l._ps); setCurSet(l._cs);
    setUsed1(l._u1); setUsed2(l._u2); setShuf(l._sh);
    setPhase("selectRound");
  };

  const redo = () => {
    if(!future.length)return;
    const n=future[0]; setFuture(future.slice(1));
    const redoLog=[...log,n]; setLog(redoLog); sSave(KEYS.matchLog, redoLog); setPts([n.p1Score,n.p2Score]);
    const nu1=[...n._u1,n.p1ComboIdx]; const nu2=[...n._u2,n.p2ComboIdx];
    if(nu1.length>=3&&nu2.length>=3){ setUsed1([]); setUsed2([]); setShuf(n._sh+1); }
    else { setUsed1(nu1); setUsed2(nu2); setShuf(n._sh); }
    if(config.pts>0&&(n.p1Score>=config.pts||n.p2Score>=config.pts)){
      const ns=[sets[0],sets[1]]; ns[n.scorerIdx]+=1; setSets(ns);
      if(ns[n.scorerIdx]>=need)setPhase("over");
      else { setCurSet(c=>c+1); setPts([0,0]); setUsed1([]); setUsed2([]); setShuf(s=>s+1); setPhase("selectRound"); }
    }
  };

  const saveCombosToStorage = () => {
    // Save combos for all modes
    const saved = sGet(KEYS.combos, {});
    // Save each player 3 combos (only complete ones)
    [[p1, d1],[p2, d2]].forEach(([name, deck])=>{
      if(!name) return;
      const prev = saved[name] || [];
      deck.forEach(combo=>{
        if(!comboReady(combo)) return;
        const str = comboStr(combo);
        if(!prev.some(c=>comboStr(c)===str)) prev.push({...combo});
      });
      saved[name] = prev;
    });
    sSave(KEYS.combos, saved);
  };

  const reset = () => { setP1(null);setP2(null);setD1([emptyCombo(),emptyCombo(),emptyCombo()]);setD2([emptyCombo(),emptyCombo(),emptyCombo()]);setPts([0,0]);setSets([0,0]);setCurSet(1);setShuf(0);setFuture([]);setR1(null);setR2(null);setUsed1([]);setUsed2([]);setPhase("pick");setSheetsStatus(null);setConfirmState(null);setJudge("");setSetScores([]);setSideAssign(null);setSidePicker(null);setCurrentSides({p1Side:"",p2Side:""});setPickerSearch("");setDeckReview(false);setManualJudge(false);setMatchStartIdx(sGet(KEYS.matchLog,[]).length); };

  // Navigation helpers
  // Unified back navigation — context-aware, no stale closure issues
  const pushPhase = (newPhase) => { setPhase(newPhase); }; // kept for call-site compat
  const goBack = () => {
    // Layer 1: CX picker open — close it, return to blade picker
    if(cxPicker){ setCxPicker(null); return; }
    // Layer 2: part picker open — close it, return to deck review
    if(picker){ setPicker(null); setDeckReview(true); return; }
    // Layer 3: deck review open — go back to pick phase
    if(phase==="deck"&&deckReview){ setDeckReview(false); setPhase("pick"); return; }
    // Layer 4: side picker modal - dismiss it
    if(sidePicker){ setSidePicker(null); setSideAssign(null); return; }
    // Layer 5: in battle or selectRound with battles logged — warn before abandoning
    if((phase==="battle"||phase==="selectRound")&&log.slice(matchStartIdx).length>0){
      setAbandonConfirm(true); return;
    }
    // Layer 6: in selectRound with no battles yet — safe to go back to deck
    if(phase==="selectRound"){ setPhase("deck"); setDeckReview(true); return; }
    // Layer 7: in battle with no battles yet - back to selectRound
    if(phase==="battle"){ setPhase("selectRound"); return; }
    // Layer 8: in deck phase — back to pick
    if(phase==="deck"){ setPhase("pick"); return; }
    // Layer 9: in pick — back to players screen
    if(phase==="pick"){ onBack(); return; }
    // Layer 10: over screen handled separately via overBackConfirm
    onBack();
  };
  const abandonMatch = () => {
    // Void match: remove its battles from the log and return to pick
    const trimmed = log.slice(0, matchStartIdx);
    setLog(trimmed); sSave(KEYS.matchLog, trimmed);
    setAbandonConfirm(false);
    reset();
  };


  // ── Abandon confirm overlay — rendered first so it always shows instantly ──
  if(abandonConfirm){
    return (
      <div style={{...S.page,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh"}}>
        <div style={{background:"var(--surface)",borderRadius:18,padding:"24px 20px",maxWidth:340,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.25)",border:"2px solid var(--border)"}}>
          <p style={{fontSize:16,fontWeight:800,color:"var(--text-primary)",marginBottom:8,textAlign:"center"}}>Abandon Match?</p>
          <p style={{fontSize:13,color:"var(--text-secondary)",textAlign:"center",marginBottom:6,lineHeight:1.5}}>
            This match has <strong style={{color:"#EF4444"}}>{log.slice(matchStartIdx).length} battle{log.slice(matchStartIdx).length!==1?"s":""}</strong> in progress.
          </p>
          <p style={{fontSize:12,color:"var(--text-faint)",textAlign:"center",marginBottom:20,lineHeight:1.4}}>
            Abandoning will void all battles from this match and return to player selection.
          </p>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setAbandonConfirm(false)}
              style={{flex:1,padding:"12px 0",borderRadius:10,border:"2px solid var(--border)",background:"var(--surface)",color:"var(--text-secondary)",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
              Keep Playing
            </button>
            <button onClick={abandonMatch}
              style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:"#EF4444",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
              Void & Exit
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── CX Picker ──────────────────────────────────────────────────────────────
  if(cxPicker){
    const {step,who,slot,chip,blade,returnToReview} = cxPicker;
    const deck = who===1?d1:d2; const setDeck = who===1?setD1:setD2;
    const pColor = who===1?"#2563EB":"#DC2626";
    const playerName = who===1?p1:p2;
    const comboLabel = ["First","Second","Third"][slot];

    // Parse all CX/CXE parts already used in OTHER slots for this player
    const otherBlades = deck.map((c,i)=>i!==slot?c.blade:null).filter(Boolean);
    const usedCxParts = { chips:[], blades:[], overBlades:[], assists:[] };
    otherBlades.forEach(name=>{
      const p = name.split(" ");
      // Determine if this is a CXE combo by checking if any word is a CXE blade
      const cxeIdx = p.findIndex(w=>CXE_BLADES.includes(w));
      if(cxeIdx>=0){
        // CXE: [Chip?] CxeBlade OverBlade Assist
        if(cxeIdx>0) usedCxParts.chips.push(p[0]);
        usedCxParts.blades.push(p[cxeIdx]);
        if(p[cxeIdx+1]) usedCxParts.overBlades.push(p[cxeIdx+1]);
        if(p[cxeIdx+2]) usedCxParts.assists.push(p[cxeIdx+2]);
      } else if(p.length===3){
        usedCxParts.chips.push(p[0]); usedCxParts.blades.push(p[1]); usedCxParts.assists.push(p[2]);
      } else if(p.length===2){
        usedCxParts.blades.push(p[0]); usedCxParts.assists.push(p[1]);
      }
    });
    // Taken non-Standard chips
    const takenChips = usedCxParts.chips.filter(ch=>ch!=="Standard"&&CX_CHIPS.includes(ch));

    const {overBlade, isCXE} = cxPicker || {};
    const advance = (finalName) => {
      const nd=[...deck]; nd[slot]={...nd[slot],blade:finalName}; setDeck(nd);
      setCxPicker(null);
      if(returnToReview){ setPicker(null); setDeckReview(true); return; }
      openPicker({who,slot,cat:"ratchet"});
    };
    // Build final name helper for assist step
    const buildFinalName = (a) => {
      if(isCXE){
        return chip==="Standard" ? `${blade} ${overBlade} ${a}` : `${chip} ${blade} ${overBlade} ${a}`;
      }
      return chip==="Standard" ? `${blade} ${a}` : `${chip} ${blade} ${a}`;
    };

    const stepLabels = {chip:"Gear Chip",blade:"Blade",over_blade:"Over Blade",assist:"Assist"};
    const stepOrder = ["chip","blade","over_blade","assist"];
    const progress = stepOrder.indexOf(step);
    const totalStepsInFlow = cxPicker?.isCXE ? 4 : 3;

    return (
      <div style={S.page}>
        <button style={S.back} onClick={goBack}>
          {IC.back} Back to Blades
        </button>

        {/* Progress bar */}
        <div style={{height:4,background:"#E2E8F0",borderRadius:2,marginBottom:14,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.round((progress/totalStepsInFlow)*100)}%`,background:"#0F766E",borderRadius:2}}/>
        </div>

        <div style={{marginBottom:16}}>
          <p style={{fontSize:11,fontWeight:700,color:pColor,letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>{playerName} — {comboLabel} Combo · CX</p>
          <h1 style={{...S.title,color:"#0F766E",textAlign:"left",margin:0}}>Select {stepLabels[step]}</h1>
          {chip&&<p style={{fontSize:12,color:"#64748B",marginTop:4}}>{chip==="Standard"?"Standard chip":chip+" chip"}{blade?` · ${blade}`:""}{cxPicker?.overBlade?` · ${cxPicker.overBlade}`:""}</p>}
        </div>

        {step==="chip"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {CX_CHIPS.map(ch=>{
              const isTaken = takenChips.includes(ch); // Standard never taken
              return (
                <button key={ch} disabled={isTaken}
                  onClick={()=>setCxPicker({...cxPicker,step:"blade",chip:ch})}
                  style={{padding:"18px 20px",borderRadius:12,border:`2px solid ${isTaken?"#E2E8F0":"#0F766E40"}`,background:isTaken?"#F1F5F9":"#F0FDF9",color:isTaken?"var(--text-disabled)":"var(--text-primary)",fontSize:16,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:isTaken?"not-allowed":"pointer",textAlign:"left",opacity:isTaken?0.45:1}}>
                  {ch}
                  {ch==="Standard"&&<span style={{fontSize:11,fontWeight:500,color:"#475569",display:"block",marginTop:2}}>Multiple allowed per deck</span>}
                  {isTaken&&<span style={{fontSize:11,fontWeight:600,color:"#94A3B8",display:"block",marginTop:2}}>Already used</span>}
                </button>
              );
            })}
          </div>
        )}

        {step==="blade"&&(
          <div>
            {/* Blast is priority */}
            <div style={{marginBottom:10,background:"#0D948818",borderRadius:10,padding:"8px 10px 6px",border:"1px solid #0D948830"}}>
              <p style={{fontSize:9,fontWeight:700,color:"#0D9488",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>★ Most Popular</p>
              {(()=>{
                // Extract CX blade names already used in other slots for this player
                const blastTaken = usedCxParts.blades.includes("Blast");
                return (
                  <button disabled={blastTaken} onClick={()=>!blastTaken&&setCxPicker({...cxPicker,step:"assist",blade:"Blast"})}
                    style={{width:"100%",padding:"12px",borderRadius:9,border:"2px solid #0D9488",background:blastTaken?"#F1F5F9":"#0D948822",color:blastTaken?"#CBD5E1":"#1E293B",fontSize:14,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:blastTaken?"not-allowed":"pointer",opacity:blastTaken?0.45:1}}>
                    Blast{blastTaken?" — IN USE":""}
                  </button>
                );
              })()}
              {/* Blast quick combos */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:6}}>
                {["Heavy","Wheel"].map(assist=>{
                  const finalName = chip==="Standard"?`Blast ${assist}`:`${chip} Blast ${assist}`;
                  const blastTaken = usedCxParts.blades.includes("Blast");
                  const assistTaken = usedCxParts.assists.includes(assist);
                  const anyTaken = blastTaken||assistTaken;
                  return (
                    <button key={assist} disabled={anyTaken}
                      onClick={()=>{
                        if(anyTaken)return;
                        const nd=[...deck]; nd[slot]={...nd[slot],blade:finalName}; setDeck(nd);
                        setCxPicker(null);
                        if(returnToReview){ setPicker(null); setDeckReview(true); return; }
                        openPicker({who,slot,cat:"ratchet"});
                      }}
                      style={{padding:"8px 4px",borderRadius:8,border:`2px solid ${anyTaken?"#E2E8F0":"#0D948860"}`,background:anyTaken?"#F1F5F9":"#0D948818",color:anyTaken?"var(--text-disabled)":"var(--text-primary)",fontSize:10,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:anyTaken?"not-allowed":"pointer",opacity:anyTaken?0.45:1}}>
                      Blast {assist}
                      {anyTaken&&<span style={{display:"block",fontSize:7,color:"#94A3B8"}}>IN USE</span>}
                    </button>
                  );
                })}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
              {CX_BLADES.filter(b=>b!=="Blast").map(b=>{
                // Grey out if this CX blade name appears in any other combo slot
                const bladeTaken = usedCxParts.blades.includes(b);
                return (
                  <button key={b} disabled={bladeTaken} onClick={()=>!bladeTaken&&setCxPicker({...cxPicker,step:"assist",blade:b})}
                    style={{padding:"10px 4px",borderRadius:9,border:`2px solid ${bladeTaken?"#E2E8F0":"#CBD5E1"}`,background:bladeTaken?"#F1F5F9":"#F8FAFC",color:bladeTaken?"var(--text-disabled)":"var(--text-primary)",fontSize:11,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:bladeTaken?"not-allowed":"pointer",minHeight:40,textAlign:"center",opacity:bladeTaken?0.45:1}}>
                    {b}
                    {bladeTaken&&<span style={{display:"block",fontSize:7,fontWeight:700,color:"#94A3B8",marginTop:2}}>IN USE</span>}
                  </button>
                );
              })}
            </div>
            {/* CXE Blades section */}
            <div style={{marginTop:12,borderTop:"2px dashed #E2E8F0",paddingTop:12}}>
              <p style={{fontSize:9,fontWeight:700,color:"#7C3AED",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>CXE Blades</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {CXE_BLADES.map(b=>{
                  const bladeTaken = usedCxParts.blades.includes(b);
                  return (
                    <button key={b} disabled={bladeTaken}
                      onClick={()=>!bladeTaken&&setCxPicker({...cxPicker,step:"over_blade",blade:b,isCXE:true})}
                      style={{padding:"12px 4px",borderRadius:9,border:`2px solid ${bladeTaken?"#E2E8F0":"#7C3AED60"}`,background:bladeTaken?"#F1F5F9":"#F5F3FF",color:bladeTaken?"var(--text-disabled)":"var(--text-primary)",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:bladeTaken?"not-allowed":"pointer",minHeight:44,textAlign:"center",opacity:bladeTaken?0.45:1}}>
                      {b}
                      {bladeTaken&&<span style={{display:"block",fontSize:7,fontWeight:700,color:"#94A3B8",marginTop:2}}>IN USE</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {step==="over_blade"&&(
          <div>
            <p style={{fontSize:12,color:"#64748B",marginBottom:12}}>Selected CXE Blade: <strong style={{color:"#7C3AED"}}>{blade}</strong></p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {CXE_OVER_BLADES.map(ob=>{
                const taken = usedCxParts.overBlades.includes(ob);
                return (
                  <button key={ob} disabled={taken}
                    onClick={()=>!taken&&setCxPicker({...cxPicker,step:"assist",overBlade:ob})}
                    style={{padding:"16px 4px",borderRadius:12,border:`2px solid ${taken?"#E2E8F0":"#7C3AED60"}`,background:taken?"#F1F5F9":"#F5F3FF",color:taken?"var(--text-disabled)":"var(--text-primary)",fontSize:15,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:taken?"not-allowed":"pointer",minHeight:56,textAlign:"center",opacity:taken?0.45:1}}>
                    {ob}
                    {taken&&<span style={{display:"block",fontSize:7,fontWeight:700,color:"#94A3B8",marginTop:2}}>IN USE</span>}
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {step==="assist"&&(
          <div>
            {/* Top 5 assists */}
            <div style={{marginBottom:10,background:"#0F766E0D",borderRadius:10,padding:"8px 10px 6px",border:"1px solid #0F766E30"}}>
              <p style={{fontSize:9,fontWeight:700,color:"#0F766E",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>★ Top 5</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
                {CX_ASSIST_TOP5.map(a=>{
                  const finalName = buildFinalName(a);
                  const taken = usedCxParts.assists.includes(a);
                  return (
                    <button key={a} disabled={taken} onClick={()=>!taken&&advance(finalName)}
                      style={{padding:"10px 4px",borderRadius:9,border:`2px solid ${taken?"#E2E8F0":"#0F766E"}`,background:taken?"#F1F5F9":"#0F766E18",color:taken?"var(--text-disabled)":"var(--text-primary)",fontSize:11,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:taken?"not-allowed":"pointer",minHeight:40,textAlign:"center",position:"relative",opacity:taken?0.45:1}}>
                      {a}
                      {taken&&<span style={{position:"absolute",bottom:2,fontSize:7,fontWeight:700,color:"#94A3B8",letterSpacing:0.3}}>IN USE</span>}
                    </button>
                  );
                })}
              </div>
            </div>
            {/* Rest of assists */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
              {CX_ASSISTS.filter(a=>!CX_ASSIST_TOP5.includes(a)).map(a=>{
                const finalName = buildFinalName(a);
                const taken = usedCxParts.assists.includes(a);
                return (
                  <button key={a} disabled={taken} onClick={()=>!taken&&advance(finalName)}
                    style={{padding:"10px 4px",borderRadius:9,border:`2px solid ${taken?"#E2E8F0":"#CBD5E1"}`,background:taken?"#F1F5F9":"#F8FAFC",color:taken?"var(--text-disabled)":"var(--text-primary)",fontSize:11,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:taken?"not-allowed":"pointer",minHeight:40,textAlign:"center",position:"relative",opacity:taken?0.45:1}}>
                    {a}
                    {taken&&<span style={{position:"absolute",bottom:2,fontSize:7,fontWeight:700,color:"#94A3B8",letterSpacing:0.3}}>IN USE</span>}
                  </button>
                );
              })}
            </div>
          </div>
        )}
      </div>
    );
  }

  if(picker){
    const {who,slot,cat}=picker;
    const list=parts[cat+"s"];
    const cc={blade:"#EA580C",ratchet:"#1D4ED8",bit:"#15803D"}[cat];
    const deck=who===1?d1:d2; const setDeck=who===1?setD1:setD2;
    const current=deck[slot][cat];
    const takenByOtherSlots=deck.map((c,i)=>i!==slot?c[cat]:null).filter(Boolean);
    const top10=TOP10[cat+"s"]||[];
    const allCxNames=[...CX_BLADES,...CXE_BLADES,...CX_ASSISTS,...CXE_OVER_BLADES];
    const rest=list.filter(n=>!top10.includes(n)&&!CROSSOVER_BLADES.includes(n)&&!allCxNames.includes(n));

    const searchLower=pickerSearch.toLowerCase();
    const filteredRest=pickerSearch
      ? rest.filter(n=>n.toLowerCase().includes(searchLower))
      : rest;

    const PartBtn = ({name,isTop})=>{
      const sel=current===name;
      const taken=takenByOtherSlots.includes(name)&&!sel;
      // Determine button accent color
      const bladeColor = cat==="blade" && isTop ? BLADE_COLORS[name] : null;
      const accent = bladeColor || (isTop ? cc : null);
      // Non-top, non-selected: black text/border. Top 10: individual accent color.
      const idleColor  = "var(--text-primary)";
      const idleBorder = accent ? `2px solid ${accent}` : "2px solid #CBD5E1";
      const idleBg     = accent ? accent+"18" : "var(--surface2)";
      return (
        <button disabled={taken}
          onClick={()=>{
            if(taken)return;
            const nd=[...deck];nd[slot]={...nd[slot],[cat]:name};setDeck(nd);
            // If editing a single part from review screen, return to review
            if(picker.returnToReview){
              setPicker(null);
              setDeckReview(true);
              return;
            }
            // Auto-advance to next step in linear flow
            const cats=["blade","ratchet","bit"];
            const catIdx=cats.indexOf(cat);
            if(catIdx<2){
              openPicker({who,slot,cat:cats[catIdx+1]});
            } else if(slot<2){
              openPicker({who,slot:slot+1,cat:"blade"});
            } else if(who===1){
              openPicker({who:2,slot:0,cat:"blade"});
            } else {
              setPicker(null);
              setDeckReview(true);
            }
          }}
          style={{padding:"8px 4px",borderRadius:9,
            border:sel?`2px solid ${accent||cc}`:taken?"2px solid #E2E8F0":idleBorder,
            background:sel?(accent||cc):taken?"var(--surface3)":idleBg,
            color:sel?"#fff":taken?"#CBD5E1":idleColor,
            cursor:taken?"not-allowed":"pointer",
            opacity:taken?0.45:1,
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
            textAlign:"center",lineHeight:1.1,
            position:"relative",minHeight:48,width:"100%",
            fontFamily:"'Outfit',sans-serif",
          }}>
          {sel&&<span style={{fontSize:9,marginBottom:1}}>{IC.check}</span>}
          <PartLabel name={name} size={splitPartName(name,cat!=="bit").length>1?12:13} keepDash={cat!=="bit"}/>
          {taken&&<span style={{position:"absolute",bottom:2,fontSize:7,fontWeight:700,color:"#94A3B8",letterSpacing:0.3}}>IN USE</span>}
        </button>
      );
    };

    const comboLabel = ["First","Second","Third"][slot];
    const playerName = who===1?p1:p2;
    const pColor = who===1?"#2563EB":"#DC2626";
    const catLabels = {blade:"Blade",ratchet:"Ratchet",bit:"Bit"};
    // Progress: 0-5 for P1 combos, 6-11 for P2
    const stepNum = (who===1?0:9) + slot*3 + ["blade","ratchet","bit"].indexOf(cat);
    const totalSteps = 18;
    const pct = Math.round((stepNum/totalSteps)*100);

    return (
      <div style={S.page}>
        <button style={S.back} onClick={goBack}>{IC.back} Back</button>

        {/* Progress bar */}
        <div style={{height:4,background:"#E2E8F0",borderRadius:2,marginBottom:14,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:pColor,borderRadius:2,transition:"width 0.2s"}}/>
        </div>

        <div style={{marginBottom:12}}>
          <p style={{fontSize:11,fontWeight:700,color:pColor,letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>{playerName} — {comboLabel} Combo</p>
          <h1 style={{...S.title,color:cc,textAlign:"left",margin:0}}>Select {catLabels[cat]}</h1>
        </div>

        {/* Previous Combos — blade screen only, tournament mode */}
        {cat==="blade"&&(()=>{
          const savedAll = sGet(KEYS.combos, {});
          const prevCombos = (savedAll[who===1?p1:p2] || []).filter(c=>comboReady(c));
          if(!prevCombos.length) return null;
          return (
            <div style={{marginBottom:12}}>
              <p style={{fontSize:9,fontWeight:700,color:"#7C3AED",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>🕐 Previous Combos</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                {prevCombos.map((c,ci)=>{
                  const bTaken=takenByOtherSlots.includes(c.blade);
                  const rTaken=(who===1?d1:d2).map((dc,i)=>i!==slot?dc.ratchet:null).filter(Boolean).includes(c.ratchet);
                  const bitTaken=(who===1?d1:d2).map((dc,i)=>i!==slot?dc.bit:null).filter(Boolean).includes(c.bit);
                  const anyTaken=bTaken||rTaken||bitTaken;
                  const bladeColor=BLADE_COLORS[c.blade]||"#64748B";
                  return (
                    <button key={ci} disabled={anyTaken}
                      onClick={()=>{
                        if(anyTaken)return;
                        const nd=who===1?[...d1]:[...d2];
                        nd[slot]={blade:c.blade,ratchet:c.ratchet,bit:c.bit};
                        if(who===1)setD1(nd); else setD2(nd);
                        if(picker?.returnToReview){ setPicker(null); setDeckReview(true); return; }
                        if(slot<2){ openPicker({who,slot:slot+1,cat:"blade"}); }
                        else if(who===1){ openPicker({who:2,slot:0,cat:"blade"}); }
                        else { setPicker(null); setDeckReview(true); }
                      }}
                      style={{padding:"8px 4px",borderRadius:9,border:`2px solid ${anyTaken?"#E2E8F0":bladeColor+"50"}`,background:anyTaken?"#F1F5F9":bladeColor+"10",color:anyTaken?"var(--text-disabled)":"var(--text-primary)",fontSize:11,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:anyTaken?"not-allowed":"pointer",textAlign:"center",lineHeight:1.3,opacity:anyTaken?0.4:1,minHeight:56,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                      <span style={{fontSize:13,fontWeight:800}}>{c.blade}</span>
                      <span style={{fontSize:11,opacity:0.65}}>{c.ratchet} · {c.bit}</span>
                      {anyTaken&&<span style={{fontSize:9,color:"#94A3B8"}}>IN USE</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {/* Quick Combos — blade screen only */}
        {cat==="blade"&&!pickerSearch&&(
          <div style={{marginBottom:12}}>
            <p style={{fontSize:9,fontWeight:700,color:cc,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>⚡ Quick Combos</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
              {QUICK_COMBOS.map((qc,qi)=>{
                const bTaken=takenByOtherSlots.includes(qc.blade);
                const rTaken=(who===1?d1:d2).map((c,i)=>i!==slot?c.ratchet:null).filter(Boolean).includes(qc.ratchet);
                const bitTaken=(who===1?d1:d2).map((c,i)=>i!==slot?c.bit:null).filter(Boolean).includes(qc.bit);
                const anyTaken=bTaken||rTaken||bitTaken;
                const bladeColor=BLADE_COLORS[qc.blade]||cc;
                return (
                  <button key={qi} disabled={anyTaken}
                    onClick={()=>{
                      if(anyTaken)return;
                      const nd=who===1?[...d1]:[...d2];
                      nd[slot]={blade:qc.blade,ratchet:qc.ratchet,bit:qc.bit};
                      if(who===1)setD1(nd); else setD2(nd);
                      // advance past this combo entirely
                      if(picker?.returnToReview){ setPicker(null); setDeckReview(true); return; }
                      if(slot<2){ openPicker({who,slot:slot+1,cat:"blade"}); }
                      else if(who===1){ openPicker({who:2,slot:0,cat:"blade"}); }
                      else { setPicker(null); setDeckReview(true); }
                    }}
                    style={{padding:"8px 4px",borderRadius:9,border:`2px solid ${anyTaken?"#E2E8F0":bladeColor+"60"}`,background:anyTaken?"#F1F5F9":bladeColor+"12",color:anyTaken?"var(--text-disabled)":"var(--text-primary)",fontSize:11,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:anyTaken?"not-allowed":"pointer",textAlign:"center",lineHeight:1.3,opacity:anyTaken?0.4:1,minHeight:52,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                    <span style={{fontSize:13,fontWeight:800}}>{qc.blade}</span>
                    <span style={{fontSize:11,opacity:0.7}}>{qc.ratchet} · {qc.bit}</span>
                    {anyTaken&&<span style={{fontSize:9,color:"#94A3B8"}}>IN USE</span>}
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Top 10 group */}
        <div style={{marginBottom:12,background:cc+"0D",borderRadius:12,padding:"10px 10px 8px",border:`1px solid ${cc}30`}}>
          <p style={{fontSize:9,fontWeight:700,color:cc,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>★ Top 10</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
            {top10.map(name=><PartBtn key={name} name={name} isTop={true}/>)}
          </div>
        </div>

        {/* Search bar + CX button (blades only) */}
        <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
          <div style={{flex:1,position:"relative"}}>
            <input
              style={{...S.inp,width:"100%",paddingLeft:32,borderColor:cc+"40"}}
              placeholder={`Search ${cat}s...`}
              value={pickerSearch}
              onChange={e=>setPickerSearch(e.target.value)}
              autoComplete="off"
            />
            <svg style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",opacity:0.35}} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={cc} strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            {pickerSearch&&<button onClick={()=>setPickerSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#94A3B8",cursor:"pointer",fontSize:14,lineHeight:1}}>✕</button>}
          </div>
          {cat==="blade"&&(
            <button onClick={()=>setCxPicker({step:"chip",who,slot,returnToReview:picker?.returnToReview||false})}
              style={{padding:"9px 14px",borderRadius:10,border:"2px solid #0F766E",background:"#F0FDF9",color:"#0F766E",fontSize:13,fontWeight:800,fontFamily:"'Outfit',sans-serif",cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>
              CX
            </button>
          )}
        </div>

        {/* Rest of parts */}
        {filteredRest.length>0?(
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
            {filteredRest.map(name=><PartBtn key={name} name={name}/>)}
          </div>
        ):(
          pickerSearch
            ? <p style={{...S.empty,marginTop:8}}>No matches for "{pickerSearch}"</p>
            : null
        )}

        {/* Crossover Blades dropdown — blades only */}
        {cat==="blade"&&(
          <div style={{marginTop:14}}>
            <button
              onClick={()=>setCrossoverOpen(o=>!o)}
              style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"10px 14px",borderRadius:10,border:"2px solid #7C3AED40",background:crossoverOpen?"#7C3AED":"#F5F3FF",color:crossoverOpen?"#fff":"#7C3AED",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
              <span>🌐 Crossover Blades ({CROSSOVER_BLADES.length})</span>
              <span style={{fontSize:16,lineHeight:1}}>{crossoverOpen?"▲":"▼"}</span>
            </button>
            {crossoverOpen&&(
              <div style={{marginTop:8,padding:"10px",background:"#F5F3FF",borderRadius:10,border:"1px solid #7C3AED30"}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
                  {CROSSOVER_BLADES.filter(n=>!pickerSearch||n.toLowerCase().includes(pickerSearch.toLowerCase())).map(name=>(
                    <PartBtn key={name} name={name}/>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  if(phase==="pick"){
    // In tournament mode: 3 clicks — P1, P2, then Judge. In casual: 2 clicks — P1, P2.
    const playersSelected = p1 && p2;
    // Which step are we on?
    const step = !p1 ? 1 : !p2 ? 2 : (config.tm && !judge.trim()) ? 3 : "done";
    const stepLabel = step===1?"Select P1":step===2?"Select P2":step===3?"Select Judge on Duty":"Ready";
    const stepColor = step===1?"#2563EB":step===2?"#DC2626":step===3?"#B45309":"#15803D";

    const handleNameClick = (name) => {
      if(step===1){ setP1(name); return; }
      if(step===2){
        if(name===p1){ setP1(null); return; } // deselect P1
        setP2(name); return;
      }
      if(step===3){
        if(name===p1||name===p2){ return; } // players cannot be judge
        setJudge(name);
        return;
      }
      // done: deselect if clicked
      if(name===p1){setP1(null);if(config.tm)setJudge("");}
      else if(name===p2){setP2(null);if(config.tm)setJudge("");}
      else if(config.tm&&name===judge){setJudge("");setManualJudge(false);}
    };

    const getButtonStyle = (name) => {
      const isP1=p1===name, isP2=p2===name, isJudge=judge===name&&config.tm;
      if(isP1) return {border:"2px solid #2563EB",background:"#2563EB",color:"#fff"};
      if(isP2) return {border:"2px solid #DC2626",background:"#DC2626",color:"#fff"};
      if(isJudge) return {border:"2px solid #B45309",background:"#F59E0B",color:"#fff"};
      // Dim players in judge step so they cannot be selected
      if(step===3&&(name===p1||name===p2)) return {border:"2px solid #E2E8F0",background:"#F1F5F9",color:"#CBD5E1",opacity:0.4,cursor:"not-allowed"};
      return {border:"2px solid #E2E8F0",background:"#F1F5F9",color:"#334155"};
    };

    const canProceed = p1 && p2 && (!config.tm || judge.trim());

    return (
      <div style={S.page}><button style={S.back} onClick={goBack}>{IC.back} Back</button>
        <h1 style={S.title}>Select Match</h1>

        {/* Step indicator */}
        <div style={{background:"#F8FAFC",borderRadius:12,padding:"10px 14px",marginBottom:12,border:`2px solid ${stepColor}30`,display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:stepColor,flexShrink:0}}/>
          <span style={{fontSize:13,fontWeight:700,color:stepColor}}>{stepLabel}</span>
          {step!==1&&<span style={{fontSize:11,color:"#94A3B8",marginLeft:"auto"}}>
            {p1&&<span style={{color:"#2563EB",fontWeight:600}}>{p1} </span>}
            {p1&&p2&&<span style={{color:"#94A3B8"}}>vs </span>}
            {p2&&<span style={{color:"#DC2626",fontWeight:600}}>{p2}</span>}
            {config.tm&&judge&&<span style={{color:"#B45309",fontWeight:600}}> · ⚖️{judge}</span>}
          </span>}
        </div>

        {/* Player grid */}
        <div style={S.card}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>
            {players.map(name=>{
              const isDisabled = step===3&&(name===p1||name===p2);
              const btnStyle = getButtonStyle(name);
              const tag = p1===name?"P1":p2===name?"P2":(judge===name&&config.tm)?"Judge":null;
              return (
                <button key={name} disabled={isDisabled} onClick={()=>handleNameClick(name)}
                  style={{padding:"12px 8px",borderRadius:10,fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif",cursor:isDisabled?"not-allowed":"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,...btnStyle}}>
                  {name}
                  {tag&&<span style={{fontSize:9,fontWeight:800,letterSpacing:1,opacity:0.85}}>{tag}</span>}
                </button>
              );
            })}
          </div>
          {/* Manual judge entry */}
          {config.tm&&step===3&&(
            <div style={{marginTop:10,borderTop:"1px solid #F1F5F9",paddingTop:10}}>
              {!manualJudge?(
                <button onClick={()=>setManualJudge(true)} style={{...S.upBtn,marginBottom:0,justifyContent:"center"}}>
                  Name not present — enter manually
                </button>
              ):(
                <input style={{...S.inp,width:"100%",borderColor:"#F59E0B60",color:"var(--text-primary)"}} placeholder="Enter judge name..." value={judge} autoFocus
                  onChange={e=>setJudge(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&judge.trim()&&setManualJudge(false)}/>
              )}
            </div>
          )}
        </div>

        <button style={{...S.pri,opacity:canProceed?1:0.4}} disabled={!canProceed} onClick={()=>{setMatchStartIdx(log.length);setFuture([]);setDeckReview(false);setPhase("deck");}}>Build Decks →</button>
        {config.tm&&playersSelected&&!judge.trim()&&<p style={{...S.hint,color:"#D97706"}}>Select the judge on duty to continue</p>}
      </div>
    );
  }

  if(phase==="deck"){
    // If not in review mode and picker is not open, auto-start on P1 first blade
    if(!deckReview&&!picker){
      openPicker({who:1,slot:0,cat:"blade"});
      return null;
    }

    // Review screen — shown when deckReview=true or picker is closed after finishing
    // Show a summary of what has been built so far with option to start or edit
    const comboNames=["First","Second","Third"];
    const allDone=cReady;
    return (
      <div style={S.page}>
        <button style={S.back} onClick={goBack}>{IC.back} Back</button>
        <h1 style={S.title}>Deck Review</h1>
        <p style={S.sub}>Tap any part to change it</p>
        {[{who:1,name:p1,deck:d1,setDeck:setD1,cl:"#2563EB"},{who:2,name:p2,deck:d2,setDeck:setD2,cl:"#DC2626"}].map(pl=>(
          <div key={pl.who} style={{...S.card,borderLeft:`4px solid ${pl.cl}`,marginBottom:12}}>
            <p style={{fontSize:13,fontWeight:800,color:pl.cl,marginBottom:8}}>{pl.name}</p>
            {[0,1,2].map(slot=>(
              <div key={slot} style={{marginBottom:slot<2?8:0}}>
                <p style={{fontSize:10,fontWeight:700,color:"#94A3B8",letterSpacing:1,marginBottom:4}}>{comboNames[slot].toUpperCase()} COMBO</p>
                <div style={{display:"flex",gap:6}}>
                  {["blade","ratchet","bit"].map(cat=>{
                    const cc={blade:"#EA580C",ratchet:"#1D4ED8",bit:"#15803D"}[cat];
                    const val=pl.deck[slot][cat];
                    return (
                      <button key={cat} onClick={()=>openPicker({who:pl.who,slot,cat,returnToReview:true})}
                        style={{flex:1,padding:"8px 4px",borderRadius:8,border:`2px solid ${val?cc:"#E2E8F0"}`,background:val?cc+"14":"var(--surface2)",color:val?cc:"var(--text-faint)",fontFamily:"'Outfit',sans-serif",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:44,gap:0}}>
                        {val ? <PartLabel name={val} size={splitPartName(val,cat!=="bit").length>1?10:12} keepDash={cat!=="bit"}/> : <span style={{fontSize:12,fontWeight:700}}>—</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        ))}
        <button style={{...S.pri,opacity:allDone?1:0.4}} disabled={!allDone} onClick={()=>{
          if(config.tm){setSideAssign({pickPriority:null});setSidePicker({priority:null});}
          setPhase("selectRound");
        }}>Start Match ⚔️</button>
        {!allDone&&<p style={S.hint}>Tap any missing part above to continue</p>}
      </div>
    );
  }

  // ── Side Assignment Modal ──────────────────────────────────────────────────
  if(phase==="selectRound"&&sidePicker){
    const priorityKnown = sidePicker.priority !== null;
    const priorityName = priorityKnown ? (sidePicker.priority===0?p1:p2) : null;
    const priorityColor = priorityKnown ? (sidePicker.priority===0?"#2563EB":"#DC2626") : "#475569";
    const otherName = priorityKnown ? (sidePicker.priority===0?p2:p1) : null;

    return (
      <div style={{...S.page,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"70vh",gap:0}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <p style={{fontSize:11,fontWeight:700,letterSpacing:2,color:"#94A3B8",textTransform:"uppercase",marginBottom:8}}>Assign Pick Priority · Set {curSet}</p>
          <h1 style={{fontSize:28,fontWeight:900,color:"#1E293B",margin:"0 0 6px"}}>Select Sides</h1>
          {!priorityKnown&&<p style={{fontSize:13,color:"#64748B"}}>Judge: who has pick priority this set?</p>}
          {priorityKnown&&<p style={{fontSize:13,color:"#64748B"}}><span style={{color:priorityColor,fontWeight:700}}>{priorityName}</span> has pick priority — choose a side</p>}
        </div>

        {/* Step 1: Judge picks which player has priority (set 1 only / no prior loser) */}
        {!priorityKnown&&(
          <div style={{width:"100%",marginBottom:12}}>
            <div style={{display:"flex",gap:12}}>
              {[{name:p1,pi:0,cl:"#2563EB"},{name:p2,pi:1,cl:"#DC2626"}].map(pl=>(
                <button key={pl.pi} onClick={()=>setSidePicker({priority:pl.pi})}
                  style={{flex:1,padding:"22px 0",borderRadius:16,border:`3px solid ${pl.cl}40`,background:`${pl.cl}0D`,color:pl.cl,fontSize:20,fontWeight:900,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                  {pl.name}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Step 2: Priority player picks their side */}
        {priorityKnown&&(
          <>
            <div style={{width:"100%",marginBottom:20}}>
              <p style={{fontSize:11,fontWeight:700,color:priorityColor,textAlign:"center",marginBottom:10,letterSpacing:0.5}}>{priorityName} plays on:</p>
              <div style={{display:"flex",gap:12}}>
                {["B","X"].map(side=>(
                  <button key={side} onClick={()=>{
                    const p1Side = sidePicker.priority===0 ? side : (side==="B"?"X":"B");
                    const p2Side = sidePicker.priority===0 ? (side==="B"?"X":"B") : side;
                    setSideAssign({pickPriority:sidePicker.priority,p1Side,p2Side});
                    setCurrentSides({p1Side,p2Side});
                    setSidePicker(null);
                  }} style={{flex:1,padding:"28px 0",borderRadius:16,border:`3px solid ${priorityColor}40`,background:`${priorityColor}0D`,color:priorityColor,fontSize:32,fontWeight:900,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                    {side} Side
                  </button>
                ))}
              </div>
            </div>
            <div style={{width:"100%",background:"#F8FAFC",borderRadius:12,padding:"12px 16px",border:"1px solid #E2E8F0",textAlign:"center"}}>
              <p style={{fontSize:11,color:"#94A3B8"}}>The opposite side will be assigned to <strong style={{color:"#475569"}}>{otherName}</strong> automatically.</p>
            </div>
          </>
        )}
      </div>
    );
  }

  if(phase==="selectRound"){
    // Count battles in this set: total rounds logged in this set number
    const battlesInSet = log.slice(matchStartIdx).filter(e=>e.set===curSet).length + 1;
    const isBO1 = config.bo===1;
    return (
      <div style={{...S.page,paddingBottom:100}}>
        <button style={S.back} onClick={goBack}>{IC.back} Back</button>

        {/* ── MATCH SCORE (small, top) ── */}
        {!isBO1&&(
          <div style={{background:"#F1F5F9",borderRadius:12,padding:"8px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:10,fontWeight:700,color:"#94A3B8",letterSpacing:1}}>MATCH SCORE</span>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:16,fontWeight:900,color:"#2563EB"}}>{sets[0]}</span>
              <span style={{fontSize:13,fontWeight:700,color:"#CBD5E1"}}>–</span>
              <span style={{fontSize:16,fontWeight:900,color:"#DC2626"}}>{sets[1]}</span>
            </div>
            <span style={{fontSize:10,fontWeight:600,color:"#94A3B8"}}>Best of {config.bo}</span>
          </div>
        )}

        {/* ── SET + BATTLE counters ── */}
        <div style={{display:"grid",gridTemplateColumns:isBO1?"1fr":"1fr 1fr",gap:10,marginBottom:10}}>
          {!isBO1&&(
            <div style={{background:"#fff",borderRadius:14,padding:"10px 12px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",textAlign:"center"}}>
              <p style={{fontSize:9,fontWeight:700,color:"#94A3B8",letterSpacing:1,marginBottom:3}}>CURRENT SET</p>
              <p style={{fontSize:28,fontWeight:900,color:"#1E293B",lineHeight:1}}>{curSet}</p>
            </div>
          )}
          <div style={{background:"#fff",borderRadius:14,padding:"10px 12px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",textAlign:"center"}}>
            <p style={{fontSize:9,fontWeight:700,color:"#94A3B8",letterSpacing:1,marginBottom:3}}>BATTLE</p>
            <p style={{fontSize:28,fontWeight:900,color:"#1E293B",lineHeight:1}}>{battlesInSet}</p>
          </div>
        </div>

        {/* ── SET SCORE (big, with player names) ── */}
        <div style={{background:"#fff",borderRadius:16,padding:"16px 20px",boxShadow:"0 2px 8px rgba(0,0,0,0.08)",marginBottom:14,border:"2px solid #E2E8F0"}}>
          <p style={{fontSize:9,fontWeight:700,color:"#94A3B8",letterSpacing:1,textAlign:"center",marginBottom:10}}>SET SCORE</p>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:0}}>
            <div style={{flex:1,textAlign:"center"}}>
              <p style={{fontSize:26,fontWeight:900,color:"#2563EB",marginBottom:4,fontFamily:"'Outfit',sans-serif"}}>{p1}{currentSides.p1Side?<span style={{fontSize:13,fontWeight:600,color:"#93C5FD",marginLeft:6}}>{currentSides.p1Side} Side</span>:""}</p>
              <p style={{fontSize:58,fontWeight:900,color:"#2563EB",lineHeight:1}}>{pts[0]}</p>
            </div>
            <div style={{textAlign:"center",padding:"0 8px",minWidth:40}}>
              <p style={{fontSize:28,fontWeight:800,color:"#E2E8F0",lineHeight:1}}>–</p>
              {config.pts>0&&<p style={{fontSize:9,fontWeight:600,color:"#94A3B8",marginTop:4}}>First to {config.pts}</p>}
            </div>
            <div style={{flex:1,textAlign:"center"}}>
              <p style={{fontSize:26,fontWeight:900,color:"#DC2626",marginBottom:4,fontFamily:"'Outfit',sans-serif"}}>{p2}{currentSides.p2Side?<span style={{fontSize:13,fontWeight:600,color:"#FCA5A5",marginLeft:6}}>{currentSides.p2Side} Side</span>:""}</p>
              <p style={{fontSize:58,fontWeight:900,color:"#DC2626",lineHeight:1}}>{pts[1]}</p>
            </div>
          </div>
        </div>

        {/* ── Combo selectors — tiny, judge-only ── */}
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          {[{w:1,n:p1,dk:d1,sel:r1,setSel:setR1,cl:"#2563EB",used:used1},{w:2,n:p2,dk:d2,sel:r2,setSel:setR2,cl:"#DC2626",used:used2}].map(s=>(
            <div key={s.w} style={{flex:1}}>
              <p style={{fontSize:8,fontWeight:700,color:s.cl,marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}}>{s.n}</p>
              <div style={{display:"flex",gap:3}}>
                {s.dk.map((c,i)=>{
                  const isUsed=s.used.includes(i); const isSel=s.sel===i;
                  return (
                    <button key={i} disabled={isUsed} onClick={()=>{if(!isUsed)s.setSel(i);}}
                      style={{flex:1,padding:"4px 2px",borderRadius:6,position:"relative",border:`2px solid ${isUsed?"#E2E8F0":isSel?s.cl:"#CBD5E1"}`,background:isUsed?"#F1F5F9":isSel?s.cl:"#FAFBFC",color:isUsed?"#CBD5E1":isSel?"#fff":"#475569",fontSize:8,fontWeight:600,fontFamily:"'Outfit',sans-serif",cursor:isUsed?"not-allowed":"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,opacity:isUsed?0.45:1}}>
                      {isUsed&&(<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><svg width="20" height="20" viewBox="0 0 40 40" fill="none" stroke="#DC2626" strokeWidth="4" strokeLinecap="round" opacity="0.7"><line x1="8" y1="8" x2="32" y2="32"/><line x1="32" y1="8" x2="8" y2="32"/></svg></div>)}
                      <span style={{fontWeight:700,fontSize:8}}>#{i+1}</span>
                      <span style={{fontSize:7,lineHeight:1.2,textAlign:"center"}}>{c.blade||"—"}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:6}}>
          <button style={{...S.pri,flex:2,margin:0,padding:"10px 0",fontSize:13}} disabled={r1===null||r2===null} onClick={()=>setPhase("battle")}>Battle! →</button>
          <button style={{...S.sec,flex:1,justifyContent:"center",fontSize:11,padding:"10px 8px"}} onClick={()=>setPhase("deck")}>✏️ Decks</button>
        </div>
        <BottomBar log={log} future={future} undo={undo} redo={redo} historyOpen={historyOpen} setHistoryOpen={setHistoryOpen} p1={p1} p2={p2} onOpenLib={onOpenLib} onClearLog={()=>{setLog([]);sSave(KEYS.matchLog,[]);}} dark={dark} toggleDark={toggleDark} matchStartIdx={matchStartIdx}/>
      </div>
    );
  }

  if(phase==="over"){
    const winner=sets[0]>=need?p1:p2;
    const loserName=winner===p1?p2:p1;
    const cs=confirmState||{p1ok:false,p2ok:false,judgeok:false,voidConfirm:false};
    const allPlayersDone=cs.p1ok&&cs.p2ok;
    const submitted=cs.judgeok;

    // Undo the deciding battle and return to active play
    const undoMatchEnd = () => {
      if(!log.length) return;
      const last = log[log.length-1];
      // Restore all state from the last entry snapshot
      const restoredLog = log.slice(0,-1);
      setLog(restoredLog); sSave(KEYS.matchLog, restoredLog);
      setFuture([last, ...future]);
      setPts(last._pp);
      setSets(last._ps);
      setCurSet(last._cs);
      setUsed1(last._u1);
      setUsed2(last._u2);
      setShuf(last._sh);
      setSetScores(ss => ss.slice(0,-1));
      setConfirmState(null);
      setOverBackConfirm(false);
      setPhase("selectRound");
    };

    return (
      <div style={{...S.page,paddingBottom:60}}>

        {/* ── Back button + confirm modal ── */}
        {!submitted&&(
          <button style={S.back} onClick={()=>setOverBackConfirm(true)}>{IC.back} Back</button>
        )}
        {overBackConfirm&&(
          <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.6)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
            <div style={{background:"#fff",borderRadius:18,padding:"24px 20px",maxWidth:320,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}}>
              <p style={{fontSize:16,fontWeight:800,color:"#1E293B",marginBottom:8,textAlign:"center"}}>Go Back?</p>
              <p style={{fontSize:13,color:"#64748B",textAlign:"center",marginBottom:6,lineHeight:1.5}}>
                This will undo the last battle and return to the Pick Combo screen for the deciding set.
              </p>
              <p style={{fontSize:12,color:"#94A3B8",textAlign:"center",marginBottom:20,lineHeight:1.4}}>
                The match result will be reversed. Use this only if a scoring error was made.
              </p>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setOverBackConfirm(false)}
                  style={{flex:1,padding:"12px 0",borderRadius:10,border:"2px solid #E2E8F0",background:"#fff",color:"#475569",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                  Stay Here
                </button>
                <button onClick={undoMatchEnd}
                  style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:"#EA580C",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                  Undo & Go Back
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ── Winner hero ── */}
        <div style={{background:"linear-gradient(135deg,#1D4ED8 0%,#2563EB 100%)",borderRadius:20,padding:"28px 20px 24px",textAlign:"center",marginBottom:12,boxShadow:"0 8px 24px rgba(37,99,235,0.35)"}}>
          {config.tm&&config.tournamentName&&(
            <p style={{fontSize:10,fontWeight:700,letterSpacing:2,color:"rgba(255,255,255,0.55)",marginBottom:10,textTransform:"uppercase"}}>{config.tournamentName}</p>
          )}
          <p style={{fontSize:10,fontWeight:700,letterSpacing:3,color:"rgba(255,255,255,0.6)",marginBottom:8,textTransform:"uppercase"}}>Winner</p>
          <p style={{fontSize:42,fontWeight:900,color:"#fff",lineHeight:1.05,margin:"0 0 6px"}}>{winner}</p>
          <p style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.6)"}}>defeats {loserName}</p>
        </div>

        {/* ── Match score ── */}
        {config.bo>1&&(
          <div style={{...S.card,padding:"16px 20px",marginBottom:12}}>
            <p style={{fontSize:9,fontWeight:700,letterSpacing:2,color:"#94A3B8",textAlign:"center",marginBottom:12,textTransform:"uppercase"}}>Match Score</p>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{flex:1,textAlign:"center"}}>
                <p style={{fontSize:20,fontWeight:900,color:"#2563EB",marginBottom:4}}>{p1}{winner===p1?" 🏆":""}</p>
                <p style={{fontSize:52,fontWeight:900,color:winner===p1?"#2563EB":"#94A3B8",lineHeight:1}}>{sets[0]}</p>
              </div>
              <p style={{fontSize:22,fontWeight:800,color:"#E2E8F0",minWidth:32,textAlign:"center"}}>–</p>
              <div style={{flex:1,textAlign:"center"}}>
                <p style={{fontSize:20,fontWeight:900,color:"#DC2626",marginBottom:4}}>{winner===p2?"🏆 ":""}{p2}</p>
                <p style={{fontSize:52,fontWeight:900,color:winner===p2?"#DC2626":"#94A3B8",lineHeight:1}}>{sets[1]}</p>
              </div>
            </div>
            {setScores.length>0&&(
              <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"center",flexWrap:"wrap"}}>
                {setScores.map((ss,i)=>{
                  const p1w=ss.p1>ss.p2;
                  return(
                    <div key={i} style={{textAlign:"center",background:p1w?"#EFF6FF":"#FEF2F2",borderRadius:10,padding:"8px 14px",border:`1px solid ${p1w?"#BFDBFE":"#FECACA"}`}}>
                      <p style={{fontSize:8,fontWeight:700,color:p1w?"#3B82F6":"#EF4444",letterSpacing:1,marginBottom:4}}>SET {i+1}</p>
                      <p style={{fontSize:18,fontWeight:900,lineHeight:1}}>
                        <span style={{color:p1w?"#2563EB":"#94A3B8"}}>{ss.p1}</span>
                        <span style={{color:"#CBD5E1",margin:"0 4px",fontSize:14}}>–</span>
                        <span style={{color:!p1w?"#DC2626":"#94A3B8"}}>{ss.p2}</span>
                      </p>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── Stats row ── */}
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {[{label:"Battles",val:log.length},{label:"Shuffles",val:shuf},{label:"Judge",val:judge||"—"}].map((s,i)=>(
            <div key={i} style={{flex:1,background:"#F8FAFC",borderRadius:12,padding:"10px 8px",textAlign:"center",border:"1px solid #E2E8F0"}}>
              <p style={{fontSize:9,fontWeight:700,color:"#94A3B8",letterSpacing:1,marginBottom:3,textTransform:"uppercase"}}>{s.label}</p>
              <p style={{fontSize:14,fontWeight:800,color:"#475569"}}>{s.val}</p>
            </div>
          ))}
        </div>

        {/* ── Match history ── */}
        <div style={{...S.card,marginBottom:12}}>
          <p style={{fontSize:12,fontWeight:700,color:"#334155",marginBottom:8}}>Match History</p>
          {log.slice(matchStartIdx).map((e,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:i<log.slice(matchStartIdx).length-1?"1px solid #F1F5F9":"none"}}>
              <span style={{fontSize:11,color:"#64748B"}}>B{e.round} · Set {e.set}{e.p1Side?` · ${e.p1Side}/${e.p2Side}`:""}</span>
              <span style={{fontSize:11,fontWeight:700,color:e.scorerIdx===0?"#2563EB":"#DC2626"}}>{e.scorer} — {e.typeName} +{e.points}{e.penalty?" (pen)":""}</span>
              <span style={{fontSize:11,color:"#94A3B8"}}>{e.p1Score}–{e.p2Score}</span>
            </div>
          ))}
        </div>

        {/* ── Tournament confirmation (only if tm and not yet submitted) ── */}
        {config.tm&&!submitted&&(
          <div style={{...S.card,border:"2px solid #7C3AED30",background:"#F5F3FF",marginBottom:12}}>
            <p style={{fontSize:11,fontWeight:700,color:"#7C3AED",marginBottom:10,textAlign:"center",letterSpacing:1}}>CONFIRM RESULT</p>
            <p style={{fontSize:11,color:"#64748B",textAlign:"center",marginBottom:12}}>Both players confirm, then the judge submits.</p>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <button onClick={()=>setConfirmState({...cs,p1ok:true})} disabled={cs.p1ok}
                style={{flex:1,padding:"11px 0",borderRadius:10,border:"none",background:cs.p1ok?"#15803D":"#2563EB",color:"#fff",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:cs.p1ok?"default":"pointer",opacity:cs.p1ok?0.75:1}}>
                {cs.p1ok?"✓ "+p1:p1+" — Confirm"}
              </button>
              <button onClick={()=>setConfirmState({...cs,p2ok:true})} disabled={cs.p2ok}
                style={{flex:1,padding:"11px 0",borderRadius:10,border:"none",background:cs.p2ok?"#15803D":"#DC2626",color:"#fff",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:cs.p2ok?"default":"pointer",opacity:cs.p2ok?0.75:1}}>
                {cs.p2ok?"✓ "+p2:p2+" — Confirm"}
              </button>
            </div>
            {allPlayersDone&&!cs.voidConfirm&&(
              <div style={{display:"flex",gap:8}}>
                <button onClick={async()=>{setConfirmState({...cs,judgeok:true});await onSendSheets(log.slice(matchStartIdx),{p1,p2,sets,config,winner,shuffles:shuf});}}
                  style={{flex:2,padding:"12px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#7C3AED,#6D28D9)",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                  ⚖️ Judge Confirms &amp; Submit
                </button>
                <button onClick={()=>setConfirmState({...cs,voidConfirm:true})}
                  style={{flex:1,padding:"12px 0",borderRadius:10,border:"2px solid #DC262640",background:"#FEF2F2",color:"#DC2626",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                  🚫 Void
                </button>
              </div>
            )}
            {allPlayersDone&&cs.voidConfirm&&(
              <div style={{background:"#FEF2F2",borderRadius:10,padding:"12px",border:"1px solid #FECACA"}}>
                <p style={{fontSize:12,fontWeight:700,color:"#DC2626",marginBottom:6}}>🚫 Void — Organizer Required</p>
                <p style={{fontSize:11,color:"#64748B",marginBottom:10,lineHeight:1.5}}>This match will be saved locally only. The Tournament Organizer must confirm. <strong>Judge: locate the Organizer before proceeding.</strong></p>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setConfirmState({...cs,voidConfirm:false})}
                    style={{flex:1,padding:"9px 0",borderRadius:8,border:"2px solid #E2E8F0",background:"#fff",color:"#475569",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>← Cancel</button>
                  <button onClick={()=>{setConfirmState({...cs,judgeok:true});onDownloadCSV(log.slice(matchStartIdx),{p1,p2,sets,config,winner,shuffles:shuf});}}
                    style={{flex:2,padding:"9px 0",borderRadius:8,border:"none",background:"#DC2626",color:"#fff",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>Organizer Confirms — Void</button>
                </div>
              </div>
            )}
            {!allPlayersDone&&<p style={{...S.hint,marginTop:8}}>Both players must confirm before judge can act</p>}
          </div>
        )}

        {/* ── Actions ── */}
        {(!config.tm||submitted)&&<button style={S.pri} onClick={()=>{setSheetsStatus(null);reset();}}>New Match</button>}
        <button style={{...S.sec,width:"100%",justifyContent:"center"}} onClick={()=>onDownloadCSV(log.slice(matchStartIdx),{p1,p2,sets,config,winner,shuffles:shuf})}>{IC.download} Download CSV</button>

        {config.tm&&sheetsStatus==="success"&&(
          <div style={{marginTop:10,padding:"10px 14px",borderRadius:10,background:"#F0FDF4",border:"1px solid #86EFAC",fontSize:12,fontWeight:600,color:"#15803D",textAlign:"center"}}>
            ✓ Results submitted to Google Sheets
          </div>
        )}
        {config.tm&&sheetsStatus==="error"&&(
          <div style={{marginTop:10,padding:"10px 14px",borderRadius:10,background:"#FEF2F2",border:"1px solid #FCA5A5",fontSize:12,fontWeight:600,color:"#DC2626",textAlign:"center"}}>
            ✕ Sheets submission failed — download CSV manually
          </div>
        )}
      </div>
    );
  }

  // Battle screen
  const comboOf = (deck, idx) => deck[idx] || {};
  const battlesInThisSet = log.slice(matchStartIdx).filter(e=>e.set===curSet).length + 1;
  return (
    <div style={{...S.page,paddingBottom:120}}>
      <button style={S.back} onClick={goBack}>{IC.back} Back</button>

      {/* ── Context strip: set + battle number ── */}
      <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {config.bo>1&&<span style={{...S.pill,fontSize:12,fontWeight:700,padding:"4px 14px"}}>Set {curSet} of {config.bo}</span>}
        <span style={{...S.pill,fontSize:12,fontWeight:700,padding:"4px 14px"}}>Battle {battlesInThisSet}</span>
        {config.bo>1&&<span style={{...S.pill,fontSize:12,fontWeight:700,padding:"4px 14px"}}>Match: {sets[0]}–{sets[1]}</span>}
      </div>

      {/* ── Main score block ── */}
      <div style={{background:"#fff",borderRadius:20,padding:"18px 16px 14px",marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.08)",border:"1px solid #E2E8F0"}}>
        {/* Player names */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:28,fontWeight:900,color:"#2563EB",fontFamily:"'Outfit',sans-serif"}}>{p1}{currentSides.p1Side?<span style={{fontSize:13,fontWeight:600,color:"#93C5FD",marginLeft:6}}>{currentSides.p1Side}</span>:""}</span>
          <span style={{fontSize:11,fontWeight:600,color:"#CBD5E1"}}>SET SCORE</span>
          <span style={{fontSize:28,fontWeight:900,color:"#DC2626",fontFamily:"'Outfit',sans-serif"}}>{p2}{currentSides.p2Side?<span style={{fontSize:13,fontWeight:600,color:"#FCA5A5",marginLeft:6}}>{currentSides.p2Side}</span>:""}</span>
        </div>
        {/* Big scores */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{flex:1,textAlign:"center"}}>
            <span style={{fontSize:80,fontWeight:900,color:"#2563EB",lineHeight:1,fontFamily:"'Outfit',sans-serif"}}>{pts[0]}</span>
          </div>
          <div style={{textAlign:"center",minWidth:48,padding:"0 4px"}}>
            <span style={{fontSize:32,fontWeight:800,color:"#E2E8F0"}}>–</span>
            {config.pts>0&&<p style={{fontSize:9,fontWeight:700,color:"#CBD5E1",marginTop:4,letterSpacing:1}}>FIRST TO {config.pts}</p>}
          </div>
          <div style={{flex:1,textAlign:"center"}}>
            <span style={{fontSize:80,fontWeight:900,color:"#DC2626",lineHeight:1,fontFamily:"'Outfit',sans-serif"}}>{pts[1]}</span>
          </div>
        </div>
      </div>

      {/* ── Combo cards (compact, below score) ── */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {[{name:p1,deck:d1,ri:r1,cl:"#2563EB",used:used1},{name:p2,deck:d2,ri:r2,cl:"#DC2626",used:used2}].map((side,si)=>{
          const c=comboOf(side.deck,side.ri);
          return (
            <div key={si} style={{flex:1,borderRadius:12,border:`2px solid ${side.cl}30`,background:`${side.cl}08`,padding:"8px 10px"}}>
              <div style={{marginBottom:5}}>
                <span style={{fontWeight:700,fontSize:11,color:side.cl}}>{side.name}</span>
              </div>
              <div style={{background:side.cl,color:"#fff",borderRadius:6,padding:"3px 7px",fontSize:11,fontWeight:700,marginBottom:3}}>{c.blade||"—"}</div>
              <div style={{display:"flex",gap:3}}>
                <div style={{flex:1,background:"#F1F5F9",borderRadius:5,padding:"2px 5px",fontSize:10,fontWeight:600,color:"#64748B",textAlign:"center"}}>{c.ratchet||"—"}</div>
                <div style={{flex:1,background:"#F1F5F9",borderRadius:5,padding:"2px 5px",fontSize:10,fontWeight:600,color:"#64748B",textAlign:"center"}}>{c.bit||"—"}</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* ── Scoring buttons — compact, judge-only ── */}
      <div style={{display:"flex",gap:6,marginTop:4}}>
        {[{i:0,cl:"#2563EB",name:p1},{i:1,cl:"#DC2626",name:p2}].map(side=>(
          <div key={side.i} style={{flex:1}}>
            <p style={{textAlign:"center",fontSize:8,fontWeight:800,color:side.cl,marginBottom:4,letterSpacing:0.5,textTransform:"uppercase"}}>{side.name}</p>
            <div style={{display:"flex",flexDirection:"column",gap:3}}>
              {FINISH.map(f=>(
                <button key={f.id} onClick={()=>doScore(side.i,f)}
                  style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"5px 8px",borderRadius:7,border:`1px solid ${side.cl}60`,background:`${side.cl}12`,color:side.cl,fontSize:10,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                  <span>{f.id}</span>
                  <span style={{background:side.cl,color:"#fff",padding:"1px 5px",borderRadius:4,fontSize:9,fontWeight:800}}>+{f.p}</span>
                </button>
              ))}
              {PENALTY.map(f=>(
                <button key={f.id} onClick={()=>doScore(side.i,f)}
                  style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"4px 8px",borderRadius:7,border:"1px dashed #CBD5E1",background:"#F8FAFC",color:"#94A3B8",fontSize:9,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:"pointer"}}>
                  <span>{f.id}</span>
                  <span style={{background:"#E2E8F0",color:"#64748B",padding:"1px 5px",borderRadius:4,fontSize:8,fontWeight:800}}>+{f.p}</span>
                </button>
              ))}
            </div>
          </div>
        ))}
      </div>
      <BottomBar log={log} future={future} undo={undo} redo={redo} historyOpen={historyOpen} setHistoryOpen={setHistoryOpen} p1={p1} p2={p2} onOpenLib={onOpenLib} onClearLog={()=>{setLog([]);sSave(KEYS.matchLog,[]);}} dark={dark} toggleDark={toggleDark} matchStartIdx={matchStartIdx}/>

    </div>
  );
}

/* ═══════════════════════════════════════
   MAIN APP
═══════════════════════════════════════ */
function BeyJudgeApp() {
  const sc = useScale();
  S = makeS(sc); // update module-level S so all components see it
  const [dark,setDark] = useState(()=>{
    try{return localStorage.getItem("ncblast-dark")==="1";}catch{return false;}
  });
  const toggleDark = () => setDark(d=>{
    const next=!d;
    try{localStorage.setItem("ncblast-dark",next?"1":"0");}catch{}
    return next;
  });
  // Apply dark class to body
  useEffect(()=>{
    document.body.classList.toggle("dark",dark);
  },[dark]);
  const [screen,setScreen] = useState("format");
  const [config,setConfig] = useState({pts:4,bo:3,tm:false,tournamentName:""});
  const [parts,setParts] = useState({blades:[],ratchets:[],bits:[]});
  const [players,setPlayers] = useState([]);
  const [libOpen,setLibOpen] = useState(false);
  const [judge,setJudge] = useState("");
  const [sheetsStatus,setSheetsStatus] = useState(null); // null | "success" | "error"

  useEffect(()=>{
    const saved=sGet(KEYS.parts,{});
    const merged=mergeWithDefaults(saved);
    setParts(merged); sSave(KEYS.parts,merged);
    setPlayers(sGet(KEYS.players,[]));
  },[]);

  const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzvb5LkqMDXaMVJNFNQSf7dsUJK_0vbTfQ4gRRISGsRWg4mINvawLROxn0SaPqJ5o9E/exec";

  // Download CSV to device — always available, never sends to sheets
  const handleDownloadCSV = (roundLog,meta) => {
    let csv="Round,Set,Shuffle,Judge,Tournament,Winner,WinnerCombo,FinishType,Points,Penalty,P1,P1Side,P1Score,P1Combo,P2,P2Side,P2Score,P2Combo,Timestamp\n";
    roundLog.forEach(r=>{csv+=`${r.round},${r.set},${r.shuffle},"${r.judge||""}","${meta.config?.tournamentName||""}","${r.scorer}","${r.winnerCombo}",${r.type},${r.points},${r.penalty?1:0},"${r.p1Name}",${r.p1Side||""},"${r.p1Score}","${comboStr(r.p1Combo)}","${r.p2Name}",${r.p2Side||""},"${r.p2Score}","${comboStr(r.p2Combo)}",${r.time}\n`;});
    const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`ncblast_${meta.p1||"p1"}_vs_${meta.p2||"p2"}_${new Date().toISOString().slice(0,10)}.csv`; a.click(); URL.revokeObjectURL(url);
  };

  // Send to Google Sheets only — no CSV download
  const handleSendSheets = async (roundLog,meta) => {
    // Sheet 1: existing summary rows
    const rows = roundLog.map(r=>[
      r.time,
      r.judge||"",
      meta.config?.tournamentName||"",
      `${r.p1Name} vs ${r.p2Name}`,
      r.p1Name, r.p1Side||"", r.p2Name, r.p2Side||"",
      r.set, r.shuffle, r.round,
      r.scorer, r.winnerCombo,
      r.typeName, r.points,
      r.penalty?1:0,
      r.p1Score, r.p2Score,
      comboStr(r.p1Combo), comboStr(r.p2Combo)
    ]);

    // Sheet 2: one row per battle with specific battle-level detail
    const battleRows = roundLog.map(r=>{
      // Format time as PST XX:XXam/pm
      const d = new Date(r.time);
      const pst = new Date(d.toLocaleString("en-US",{timeZone:"America/Los_Angeles"}));
      const h = pst.getHours(); const m = pst.getMinutes();
      const ampm = h>=12?"pm":"am";
      const h12 = h%12||12;
      const mm = String(m).padStart(2,"0");
      const mo = String(pst.getMonth()+1).padStart(2,"0");
      const dy = String(pst.getDate()).padStart(2,"0");
      const yr = pst.getFullYear();
      const dateTime = `${mo}/${dy}/${yr} ${h12}:${mm}${ampm}`;

      // Win condition: e.g. "XTR+3", "OVR+2", "OF+2", "LER+1"
      const winCondition = r.penalty
        ? `${r.type===("OF2")||r.type===("OF3")?"OF":"LER"}+${r.points}`
        : `${r.type}+${r.points}`;

      const winnerIsP1 = r.scorerIdx===0;
      const winnerName = winnerIsP1 ? r.p1Name : r.p2Name;
      const loserName  = winnerIsP1 ? r.p2Name : r.p1Name;
      const winnerSide = winnerIsP1 ? (r.p1Side||"") : (r.p2Side||"");
      const loserSide  = winnerIsP1 ? (r.p2Side||"") : (r.p1Side||"");
      const winnerCombo = r.winnerCombo;
      const loserCombo  = winnerIsP1 ? comboStr(r.p2Combo) : comboStr(r.p1Combo);

      return [
        dateTime,
        r.judge||"",
        r.p1Name, r.p1Side||"", comboStr(r.p1Combo),
        r.p2Name, r.p2Side||"", comboStr(r.p2Combo),
        winnerName, winnerCombo,
        winCondition,
        loserCombo, loserName
      ];
    });

    try {
      const resp = await fetch(SHEETS_URL, {
        method:"POST",
        body: JSON.stringify({rows, battleRows}),
      });
      const result = await resp.json();
      setSheetsStatus(result.status==="ok"?"success":"error");
    } catch(err) {
      setSheetsStatus("error");
    }
  };


  return (
    <div style={{background:"var(--bg)",minHeight:"100vh",fontFamily:"'Outfit',sans-serif"}}>
      {libOpen&&<LibraryManager parts={parts} setParts={setParts} onClose={()=>setLibOpen(false)}/>}
      {screen==="format"&&<FormatScreen config={config} setConfig={setConfig} parts={parts} onNext={()=>setScreen("players")} onOpenLib={()=>setLibOpen(true)} dark={dark} toggleDark={toggleDark}/>}
      {screen==="players"&&<PlayersScreen players={players} setPlayers={setPlayers} onNext={()=>setScreen("match")} onBack={()=>setScreen("format")} toggleDark={toggleDark} dark={dark}/>}
      {screen==="match"&&<MatchScreen config={config} parts={parts} players={players} judge={judge} setJudge={setJudge} sheetsStatus={sheetsStatus} setSheetsStatus={setSheetsStatus} onBack={()=>setScreen("players")} onDownloadCSV={handleDownloadCSV} onSendSheets={handleSendSheets} onOpenLib={()=>setLibOpen(true)} dark={dark} toggleDark={toggleDark}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BeyJudgeApp/>);
</script>
</body>
</html>
