<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>NC BLAST Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Barlow', sans-serif;
  }

  /* ── CSS VARIABLES ─────────────────────────── */
  :root {
    --p1-hue: 210; /* blue */
    --p2-hue: 15;  /* orange */
    --p1-color: hsl(var(--p1-hue), 90%, 58%);
    --p2-color: hsl(var(--p2-hue), 90%, 58%);
    --p1-glow: hsl(var(--p1-hue), 90%, 58%);
    --p2-glow: hsl(var(--p2-hue), 90%, 58%);
    --gold: #FFD700;
    --dark: #080C14;
    --panel: rgba(8, 12, 22, 0.92);
    --border-bright: rgba(255,255,255,0.12);
    --text: #F0F4FF;
    --muted: rgba(240,244,255,0.5);
  }

  /* ── FULL-WIDTH CONTAINER ──────────────────── */
  #widget {
    width: 100%;
  }

  /* ── MAIN CARD ─────────────────────────────── */
  .card {
    background: var(--panel);
    border: 1px solid var(--border-bright);
    border-radius: 6px;
    overflow: hidden;

    position: relative;
  }

  /* Animated gradient border on top */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg,
      var(--p1-color) 0%,
      transparent 45%,
      transparent 55%,
      var(--p2-color) 100%
    );
    z-index: 10;
  }

  /* ── TOURNAMENT BAR ────────────────────────── */
  .tourney-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center;
    padding: 5px 12px;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid var(--border-bright);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    gap: 8px;
  }
  .tourney-bar .brand {
    color: var(--gold);
    font-weight: 900;
    letter-spacing: 0.12em;
    font-size: 14px;
    white-space: nowrap;
  }
  .tourney-bar .tourney-center {
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: rgba(240,244,255,0.8);
    font-size: 13px;
  }
  .tourney-bar .judge-label {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tourney-bar .judge-label strong {
    color: rgba(240,244,255,0.9);
    font-weight: 700;
  }

  /* ── SCOREBOARD ROW ────────────────────────── */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 10px 14px 8px;
    gap: 10px;
  }

  /* Player block */
  .player {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .player.right {
    align-items: flex-end;
    text-align: right;
  }

  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(22px, 3.2vw, 34px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
  }
  .p1 .player-name { color: var(--p1-color); text-shadow: 0 0 20px var(--p1-glow); }
  .p2 .player-name { color: var(--p2-color); text-shadow: 0 0 20px var(--p2-glow); }

  .player-side {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Combo display under name */
  .combo-display {
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .player.right .combo-display { align-items: flex-end; }

  .combo-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0.7;
  }

  .combo-parts {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  .player.right .combo-parts { justify-content: flex-end; }

  .combo-part {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }
  .p1 .combo-part {
    background: rgba(59, 130, 246, 0.22);
    color: #93C5FD;
    border: 1px solid rgba(147,197,253,0.45);
    text-shadow: 0 0 10px rgba(147,197,253,0.5);
  }
  .p2 .combo-part {
    background: rgba(249, 115, 22, 0.22);
    color: #FCA97A;
    border: 1px solid rgba(252,169,122,0.45);
    text-shadow: 0 0 10px rgba(252,169,122,0.5);
  }
  .combo-dot {
    color: rgba(240,244,255,0.35);
    font-size: 10px;
  }

  /* ── CENTER SCORE ──────────────────────────── */
  .center-score {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .pts-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pts-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(40px, 6vw, 64px);
    font-weight: 900;
    line-height: 1;
    min-width: 44px;
    text-align: center;
    transition: color 0.1s;
  }
  .pts-num.p1-pts { color: var(--p1-color); text-shadow: 0 0 20px var(--p1-glow); }
  .pts-num.p2-pts { color: var(--p2-color); text-shadow: 0 0 20px var(--p2-glow); }
  .pts-num.pop { color: #fff; }

  .pts-divider {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--muted);
    line-height: 1;
    margin-bottom: 4px;
  }

  /* Point limit label */
  .pts-limit {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Set win dots */
  .sets-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .set-dots {
    display: flex;
    gap: 4px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--border-bright);
    transition: background 0.1s;
  }
  .dot.won { transform: scale(1.15); }
  .dot.p1-dot.won { background: var(--p1-color); border-color: var(--p1-color); box-shadow: 0 0 8px var(--p1-glow); }
  .dot.p2-dot.won { background: var(--p2-color); border-color: var(--p2-color); box-shadow: 0 0 8px var(--p2-glow); }
  .dot.empty { background: transparent; }
  .sets-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── FINISH FLASH BANNER ───────────────────── */
  #finish-flash {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 50;
    border-radius: 6px;
    overflow: hidden;
  }
  #finish-flash.visible { display: flex; }
  #finish-flash.p1-win { background: rgba(59,130,246,0.25); }
  #finish-flash.p2-win { background: rgba(249,115,22,0.25); }

  .flash-type {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 52px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .flash-winner {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
  }



  /* ── OFFLINE STATE ─────────────────────────── */
  #offline-msg {
    padding: 18px 24px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    display: none;
  }
  #offline-msg.visible { display: block; }

  /* ── SCALE WRAPPER ─────────────────────────── */
  #scale-wrap {
    width: 100%;
  }

</style>
</head>
<body>

<button id="reset-btn" onclick="resetOverlay()" style="
  position: fixed; top: 12px; right: 12px;
  background: rgba(220,38,38,0.85); color: #fff;
  border: none; border-radius: 8px;
  padding: 8px 16px; font-size: 14px; font-weight: 700;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; z-index: 9999;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
">⟳ Reset Overlay</button>

<div id="widget">
  <div id="scale-wrap">
    <div class="card" id="main-card">

      <!-- Finish flash overlay (sits on top of card content) -->
      <div id="finish-flash">
        <div class="flash-type" id="flash-type-text">XTR</div>
        <div class="flash-winner" id="flash-winner-text">Player wins</div>
      </div>

      <!-- Tournament bar -->
      <div class="tourney-bar">
        <span class="brand" id="brand-text">NC BLAST</span>
        <span class="tourney-center" id="tourney-name"></span>
        <span class="judge-label" id="judge-label" style="display:none">Current Judge: <strong id="judge-name"></strong></span>
      </div>

      <!-- Offline message (shown when no data) -->
      <div id="offline-msg">Waiting for match data…</div>

      <!-- Main scoreboard -->
      <div class="scoreboard" id="scoreboard" style="display:none">

        <!-- P1 (left) -->
        <div class="player p1" id="p1-block">
          <div class="player-name" id="p1-name">—</div>
          <div class="player-side" id="p1-side"></div>
          <div class="combo-display" id="p1-combo">
            <div class="combo-label">Combo</div>
            <div class="combo-parts" id="p1-parts"></div>
          </div>
        </div>

        <!-- Center -->
        <div class="center-score">
          <div class="pts-row">
            <span class="pts-num p1-pts" id="p1-pts">0</span>
            <span class="pts-divider">–</span>
            <span class="pts-num p2-pts" id="p2-pts">0</span>
          </div>
          <div class="pts-limit" id="pts-limit"></div>
          <div class="sets-row" id="sets-row" style="display:none">
            <div class="set-dots" id="p1-dots"></div>
            <div class="sets-label" id="set-label">Sets</div>
            <div class="set-dots" id="p2-dots"></div>
          </div>
        </div>

        <!-- P2 (right) -->
        <div class="player p2 right" id="p2-block">
          <div class="player-name" id="p2-name">—</div>
          <div class="player-side" id="p2-side"></div>
          <div class="combo-display" id="p2-combo">
            <div class="combo-label">Combo</div>
            <div class="combo-parts" id="p2-parts"></div>
          </div>
        </div>

      </div>

    </div><!-- .card -->
  </div><!-- #scale-wrap -->
</div><!-- #widget -->

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const WORKER = "https://challonge-proxy.danny61734.workers.dev";
const params = new URLSearchParams(location.search);
const SLOT = parseInt(params.get("slot") || "1");

// ── STATE ────────────────────────────────────────────────────────
let lastEtag = null;
let lastState = null;
let flashTimer = null;
let p1PopTimer = null;
let p2PopTimer = null;

// ── ELEMENTS ─────────────────────────────────────────────────────
const widget     = document.getElementById("widget");
const scaleWrap  = document.getElementById("scale-wrap");
const scoreboard = document.getElementById("scoreboard");
const offlineMsg = document.getElementById("offline-msg");
const flashEl    = document.getElementById("finish-flash");
const flashType  = document.getElementById("flash-type-text");
const flashWinner= document.getElementById("flash-winner-text");

const el = id => document.getElementById(id);

// ── RENDER COMBO ─────────────────────────────────────────────────
function renderCombo(containerId, combo, playerClass) {
  const container = el(containerId);
  if (!combo || !combo.blade) {
    container.closest(".combo-display").style.display = "none";
    return;
  }
  container.closest(".combo-display").style.display = "";
  const parts = [combo.blade, combo.ratchet, combo.bit].filter(Boolean);
  container.innerHTML = parts.map((p, i) => {
    const dot = i < parts.length - 1 ? `<span class="combo-dot">·</span>` : "";
    return `<span class="combo-part ${playerClass}">${p}</span>${dot}`;
  }).join("");
}

// ── RENDER SET DOTS ───────────────────────────────────────────────
function renderDots(containerId, won, needed, playerClass) {
  const container = el(containerId);
  let html = "";
  for (let i = 0; i < needed; i++) {
    const active = i < won ? "won" : "empty";
    html += `<div class="dot ${playerClass} ${active}"></div>`;
  }
  container.innerHTML = html;
}

// ── POP ANIMATION (simple color flash, no scale) ───────────────────
function popScore(elId, timerRef) {
  const node = el(elId);
  node.classList.add("pop");
  clearTimeout(timerRef);
  return setTimeout(() => node.classList.remove("pop"), 200);
}

// ── FINISH FLASH ──────────────────────────────────────────────────
const FINISH_LABELS = {
  XTR: "XTREME",
  OVR: "OVER",
  BST: "BURST",
  OF: "OUT OF BOUNDS",
  OF2: "OUT — P2 PENALTY",
  OF3: "OUT — P1 PENALTY",
  "LER-STRIKE": "LER STRIKE",
};

function showFlash(type, scorerIdx, p1Name, p2Name, p1Color, p2Color) {
  const label = FINISH_LABELS[type] || type;
  const winner = scorerIdx === 0 ? p1Name : p2Name;
  flashType.textContent = label;
  flashType.style.color = scorerIdx === 0 ? p1Color : p2Color;
  flashType.style.textShadow = `0 0 30px ${scorerIdx === 0 ? p1Color : p2Color}`;
  flashWinner.textContent = (winner || "Player") + " SCORES";
  flashEl.className = "visible " + (scorerIdx === 0 ? "p1-win" : "p2-win");

  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => {
    flashEl.className = "";
  }, 2200);
}

// ── RENDER STATE ──────────────────────────────────────────────────
function renderState(state, prevState) {
  if (!state) {
    scoreboard.style.display = "none";
    offlineMsg.classList.add("visible");
    return;
  }

  offlineMsg.classList.remove("visible");
  scoreboard.style.display = "";

  // Names
  el("p1-name").textContent = state.p1 || "Player 1";
  el("p2-name").textContent = state.p2 || "Player 2";

  // Sides
  el("p1-side").textContent = state.p1Side || "";
  el("p2-side").textContent = state.p2Side || "";

  // Tournament + judge bar
  el("tourney-name").textContent = state.tournamentName || "";
  const judgeLabelEl = el("judge-label");
  const judgeNameEl = el("judge-name");
  if (state.judge) {
    judgeNameEl.textContent = state.judge;
    judgeLabelEl.style.display = "";
  } else {
    judgeLabelEl.style.display = "none";
  }

  // Points — pop if changed
  const p1pts = (state.pts || [0,0])[0];
  const p2pts = (state.pts || [0,0])[1];
  const prevP1 = prevState ? (prevState.pts || [0,0])[0] : p1pts;
  const prevP2 = prevState ? (prevState.pts || [0,0])[1] : p2pts;
  el("p1-pts").textContent = p1pts;
  el("p2-pts").textContent = p2pts;
  if (prevState && p1pts !== prevP1) p1PopTimer = popScore("p1-pts", p1PopTimer);
  if (prevState && p2pts !== prevP2) p2PopTimer = popScore("p2-pts", p2PopTimer);

  // Point limit label
  const limit = state.pointLimit;
  el("pts-limit").textContent = limit ? `First to ${limit} pts` : "";

  // Sets
  const setsNeeded = state.setsNeeded || 1;
  const p1Sets = (state.sets || [0,0])[0];
  const p2Sets = (state.sets || [0,0])[1];
  const setsRow = el("sets-row");
  if (setsNeeded > 1) {
    setsRow.style.display = "";
    renderDots("p1-dots", p1Sets, setsNeeded, "p1-dot");
    renderDots("p2-dots", p2Sets, setsNeeded, "p2-dot");
    el("set-label").textContent = `SET ${state.curSet || 1}`;
  } else {
    setsRow.style.display = "none";
  }

  // Combos
  renderCombo("p1-parts", state.p1ActiveCombo, "p1");
  renderCombo("p2-parts", state.p2ActiveCombo, "p2");

  // Finish flash — trigger only when lastFinish changes
  if (state.lastFinish && prevState) {
    const same =
      prevState.lastFinish &&
      prevState.lastFinish.type === state.lastFinish.type &&
      JSON.stringify(prevState.pts) === JSON.stringify(state.pts);
    if (!same) {
      const p1Color = getComputedStyle(document.documentElement)
        .getPropertyValue("--p1-color").trim() || "#60A5FA";
      const p2Color = getComputedStyle(document.documentElement)
        .getPropertyValue("--p2-color").trim() || "#FB923C";
      showFlash(
        state.lastFinish.type,
        state.lastFinish.scorerIdx,
        state.p1, state.p2,
        p1Color, p2Color
      );
    }
  }

}

// ── POLLING LOOP ──────────────────────────────────────────────────
async function poll() {
  while (true) {
    try {
      const url = lastEtag
        ? `${WORKER}/overlay/poll?slot=${SLOT}&etag=${lastEtag}`
        : `${WORKER}/overlay/state?slot=${SLOT}`;

      const res = await fetch(url, { signal: AbortSignal.timeout(30000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      if (data.etag && data.etag !== lastEtag) {
        const prev = lastState;
        lastState = data.state;
        lastEtag = data.etag;
        renderState(data.state, prev);
      } else if (!lastEtag) {
        // First load with no data yet
        renderState(null, null);
      }
    } catch (e) {
      // Network error — show offline, retry in 3s
      renderState(null, null);
      await new Promise(r => setTimeout(r, 3000));
    }

    // Short pause between polls (long-poll already waited up to 25s server-side)
    await new Promise(r => setTimeout(r, 200));
  }
}

// ── INIT ──────────────────────────────────────────────────────────
// Show slot number in brand if multiple slots
if (SLOT > 1) {
  el("brand-text").textContent = `NC BLAST · T${SLOT}`;
}

// ── RESET ────────────────────────────────────────────────────────────
function resetOverlay() {
  lastEtag = null;
  lastState = null;
  clearTimeout(flashTimer);
  clearTimeout(p1PopTimer);
  clearTimeout(p2PopTimer);
  flashEl.className = "";
  el("p1-name").textContent = "—";
  el("p2-name").textContent = "—";
  el("p1-side").textContent = "";
  el("p2-side").textContent = "";
  el("p1-pts").textContent = "0";
  el("p2-pts").textContent = "0";
  el("pts-limit").textContent = "";
  el("tourney-name").textContent = "";
  el("judge-label").style.display = "none";
  el("p1-parts").innerHTML = "";
  el("p2-parts").innerHTML = "";
  el("p1-parts").closest(".combo-display").style.display = "none";
  el("p2-parts").closest(".combo-display").style.display = "none";
  el("sets-row").style.display = "none";
  scoreboard.style.display = "none";
  offlineMsg.classList.add("visible");
}

// Start polling
renderState(null, null);
poll();
</script>
</body>
</html>
